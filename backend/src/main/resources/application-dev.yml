server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:clubportal;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false

app:
  public:
    base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
  security:
    cors:
      allowed-origin-patterns: ${APP_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

jwt:
  secret: ${JWT_SECRET:dev-local-jwt-secret-12345678901234567890}
