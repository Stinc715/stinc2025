<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com https://*.googleusercontent.com https://www.google.com https://www.gstatic.com; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://maps.googleapis.com; connect-src 'self' https://accounts.google.com https://maps.googleapis.com https://api.stripe.com; frame-src 'self' https://accounts.google.com https://js.stripe.com; form-action 'self' https://accounts.google.com">
<title>Club onboarding - Set up your club profile</title>
  <link rel="stylesheet" href="theme.css?v=20260402a">
  <link rel="stylesheet" href="onboarding.css?v=20260402a">
  <script>
    (function() {
      const query = new URLSearchParams(window.location.search);
      const editMode = String(query.get('mode') || '').trim().toLowerCase();
      if (editMode === 'name-edit' || editMode === 'category-edit') return;
      if (window.__clubOnboardingBackGuardInstalled) return;
      window.__clubOnboardingBackGuardInstalled = true;

      const pushOnboardingLockState = () => {
        const currentState = (window.history.state && typeof window.history.state === 'object')
          ? window.history.state
          : {};
        window.history.pushState({ ...currentState, onboardingLock: true }, '', window.location.href);
      };

      const initialState = (window.history.state && typeof window.history.state === 'object')
        ? window.history.state
        : {};
      window.history.replaceState({ ...initialState, onboardingEntry: true }, '', window.location.href);
      pushOnboardingLockState();

      window.addEventListener('popstate', () => {
        pushOnboardingLockState();
      });

      window.addEventListener('pageshow', (event) => {
        if (!event.persisted) return;
        const state = (window.history.state && typeof window.history.state === 'object')
          ? window.history.state
          : {};
        if (!state.onboardingLock) {
          pushOnboardingLockState();
        }
      });
    })();
  </script>
  <style>
    .header-side {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 40px;
    }
</style>
<link rel="stylesheet" href="desktop-consistency.css?v=20260403a">
<script src="auth-session.js?v=20260331b"></script>
</head>
<body class="page-with-footer desktop-consistency desktop-page--onboarding">
  <header style="position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e5e7eb; background: white; padding: 12px 0;">
    <div class="wrap" style="width: min(1760px, calc(100vw - 56px)); max-width: none; margin: 0 auto; padding: 0 32px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px;">
      <div class="header-side" aria-hidden="true"></div>
      <h2 style="margin: 0; font-size: 18px; font-weight: 600; justify-self: center;">Club profile</h2>
      <div></div>
    </div>
  </header>
  <main class="wrap desktop-shell-main">
    <header class="hero">
      <span class="hero-kicker">Club setup</span>
      <h1>Set up your club profile</h1>
    </header>

    <section class="panel desktop-form-shell">
      <div class="panel-header">
        <div>
          <h2>Profile details</h2>
        </div>
        <span class="panel-badge">Step 1 of 3</span>
      </div>

      <div class="form-block">
        <label for="displayName" class="label">Club name</label>
        <input id="displayName" type="text" placeholder="The name members will see" autocomplete="name">
      </div>

      <div class="form-block">
        <div class="label">Club type</div>
        <div id="sportsGrid" class="sports-grid" aria-label="Choose sports your club offers" role="list">
          <!-- chips injected by onboarding.js -->
        </div>
        <div class="custom-type-block">
          <div class="custom-type-title">Add your own type</div>
          <div id="customTypeList" class="custom-type-list" aria-label="Add custom club types"></div>
          <button id="addCustomType" class="btn ghost custom-type-add" type="button">Add another</button>
        </div>
      </div>

      <div class="actions">
        <button id="btnSave" class="btn primary" type="button" disabled>Save and continue</button>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer__wrap desktop-shell-wrap">
      <span class="site-footer__text">&copy; 2026 Club Booking Portal</span>
      <div class="site-footer__actions">
        <button class="site-footer__btn info-trigger" type="button" data-info="privacy">Privacy</button>
        <button class="site-footer__btn info-trigger" type="button" data-info="terms">Terms</button>
        <button class="site-footer__btn info-trigger" type="button" data-info="help">Help</button>
      </div>
    </div>
  </footer>

  <script src="info-content.js?v=20260413b"></script>
  <script src="info-modal.js?v=20260413b"></script>
  <script type="module" src="onboarding.js?v=20260327f"></script>
  <script type="module" src="auth-modal.js?v=20260324a"></script>
</body>
