<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com https://*.googleusercontent.com https://www.google.com https://www.gstatic.com; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://maps.googleapis.com; connect-src 'self' https://accounts.google.com https://maps.googleapis.com https://api.stripe.com; frame-src 'self' https://accounts.google.com https://js.stripe.com; form-action 'self' https://accounts.google.com">
<title>Club onboarding - Promotion</title>
  <link rel="stylesheet" href="theme.css?v=20260402a">
  <link rel="stylesheet" href="onboarding.css?v=20260402a">
  <link rel="stylesheet" href="desktop-consistency.css?v=20260403a">
<script src="auth-session.js?v=20260331b"></script>
</head>
<body class="page-with-footer desktop-consistency desktop-page--onboarding">
  <main class="wrap desktop-shell-main">
    <a class="link-back desktop-back-link back-pill" href="onboarding-location.html">Back</a>
    <header class="hero">
      <span class="hero-kicker">Club setup</span>
      <h1>Club promotion</h1>
    </header>

    <section class="panel desktop-form-shell">
      <div class="panel-header">
        <div>
          <h2>Club media</h2>
        </div>
        <span class="panel-badge">Step 3 of 3</span>
      </div>

      <div class="form-block">
        <label for="promoImageFile" class="label">Club photos</label>
        <div class="promo-upload">
          <input id="promoImageFile" class="file-input" type="file" accept="image/*" multiple>
          <label class="file-button" for="promoImageFile">Upload photos</label>
        </div>
        <div id="promoGallery" class="promo-gallery" aria-live="polite"></div>
      </div>

      <div class="form-block">
        <label for="promoText" class="label">Promo text</label>
        <textarea id="promoText" placeholder="Tell members why your club is great..."></textarea>
      </div>

      <div class="actions">
        <button id="btnBack" class="btn ghost" type="button">Back</button>
        <button id="btnFinish" class="btn primary" type="button">Finish setup</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer__wrap desktop-shell-wrap">
      <span class="site-footer__text">&copy; 2026 Club Booking Portal</span>
      <div class="site-footer__actions">
        <button class="site-footer__btn info-trigger" type="button" data-info="privacy">Privacy</button>
        <button class="site-footer__btn info-trigger" type="button" data-info="terms">Terms</button>
        <button class="site-footer__btn info-trigger" type="button" data-info="help">Help</button>
      </div>
    </div>
  </footer>

  <script type="module" src="onboarding-promo.js?v=20260327d"></script>
  <script type="module" src="auth-modal.js?v=20260324a"></script>
</body>
</html>
