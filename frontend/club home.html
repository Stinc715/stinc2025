<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com https://*.googleusercontent.com https://www.google.com https://www.gstatic.com; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://maps.googleapis.com; connect-src 'self' https://accounts.google.com https://maps.googleapis.com https://api.stripe.com; frame-src 'self' https://accounts.google.com https://js.stripe.com; form-action 'self' https://accounts.google.com">
<title>Club Booking Portal - Club Home</title>
  <link rel="stylesheet" href="theme.css?v=20260402a">
  <style>
    html,
    body {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff !important;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 40;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9) !important;
      backdrop-filter: blur(12px);
    }
    .header-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 84px;
    }
    .title-stack {
      display: grid;
      gap: 0;
    }
    .site-title {
      margin: 0;
      font-family: "Sora", sans-serif;
      font-size: clamp(28px, 4vw, 38px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .logout-btn {
      min-width: 90px;
      font-weight: 600;
    }
    .workspace {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      height: 100%;
      min-height: 0;
      border-radius: 22px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #ffffff;
      box-shadow: none;
      overflow: hidden;
    }
    .workspace.card:hover {
      transform: none;
      box-shadow: none;
    }
    .workspace-nav {
      position: relative;
      top: auto;
      align-self: stretch;
      height: 100%;
      max-height: none;
      overflow-y: auto;
      border-right: 1px solid rgba(15, 23, 42, 0.08);
      padding: 18px 14px 14px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .workspace-nav::after {
      display: none;
    }
    .workspace-nav-top {
      display: grid;
      gap: 10px;
      padding: 8px 8px 10px;
    }
    .workspace-title {
      margin: 0;
      font-size: 19px;
      font-family: "Sora", sans-serif;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .workspace-menu {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
    }
    .workspace-tab {
      border: 1px solid rgba(15, 23, 42, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.96));
      color: var(--ink);
      border-radius: 16px;
      padding: 14px 15px;
      text-align: left;
      cursor: pointer;
      display: block;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }
    .workspace-tab:hover {
      border-color: rgba(15, 23, 42, 0.16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(244, 247, 250, 0.98));
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.07);
    }
    .workspace-tab.active {
      border-color: rgba(15, 23, 42, 0.22);
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.08), rgba(15, 23, 42, 0.03));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        0 16px 30px rgba(15, 23, 42, 0.08);
    }
    .workspace-tab.has-unread:not(.active) {
      border-color: rgba(220, 38, 38, 0.16);
      background:
        linear-gradient(180deg, rgba(254, 242, 242, 0.98), rgba(255, 255, 255, 0.98));
    }
    .workspace-tab-copy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      width: 100%;
    }
    .workspace-tab-title {
      display: block;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .workspace-tab-badge {
      display: none;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: #dc2626;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 6px 14px rgba(220, 38, 38, 0.18);
      flex: 0 0 auto;
    }
    .workspace-tab-badge.is-visible {
      display: inline-flex;
    }
    .workspace-main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
      overflow: hidden;
      padding: 14px;
      background: #ffffff;
    }
    .workspace-head {
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 14px;
      background: #ffffff;
      padding: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .workspace-head-main {
      display: grid;
      gap: 6px;
      min-width: 0;
    }
    .workspace-head h2 {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 30px);
      font-family: "Sora", sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .workspace-head p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      max-width: 720px;
    }
    .frame-shell {
      position: relative;
      display: block;
      height: 100%;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 16px;
      background: #ffffff;
      overflow: hidden;
      min-height: 0;
      box-shadow: none;
    }
    .frame-shell.loading .section-frame.active {
      opacity: 0.2;
    }
    .section-frame {
      width: 100%;
      border: 0;
      height: 100%;
      min-height: 0;
      display: none;
      opacity: 0;
      background: #ffffff;
      transition: opacity 0.22s ease;
    }
    .section-frame.active {
      display: block;
      opacity: 1;
    }
    .frame-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.92);
      color: #1f2937;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 5;
    }
    .frame-shell.loading .frame-loading {
      opacity: 1;
    }
    .frame-spinner {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(37, 99, 235, 0.2);
      border-top-color: #2563eb;
      animation: frameSpin 0.8s linear infinite;
    }
    @keyframes frameSpin {
      to {
        transform: rotate(360deg);
      }
    }
    .site-footer {
      margin-top: auto !important;
      background: #ffffff !important;
    }
    .info-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(10, 12, 16, 0.45);
      z-index: 3000;
    }
    .info-overlay.open {
      display: flex;
    }
    .info-card {
      position: relative;
      width: min(560px, 92vw);
      background: #ffffff;
      border-radius: 16px;
      box-shadow: none;
      padding: 20px 20px 18px;
    }
    .info-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .info-body p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .info-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      cursor: pointer;
      color: var(--muted);
    }
    .guide-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(8px);
      z-index: 3200;
    }
    .guide-overlay.open {
      display: flex;
    }
    .guide-card {
      position: relative;
      width: min(680px, 94vw);
      display: grid;
      gap: 18px;
      padding: 30px;
      border-radius: 24px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #ffffff;
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.16);
    }
    .guide-kicker {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.1);
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .guide-card h3 {
      margin: 0;
      font-family: "Sora", sans-serif;
      font-size: clamp(26px, 3vw, 36px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: #0f172a;
    }
    .guide-card p {
      margin: 0;
      color: #475569;
      font-size: 16px;
      line-height: 1.65;
    }
    .guide-club {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.06);
      color: #0f172a;
      font-size: 13px;
      font-weight: 700;
    }
    .guide-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .guide-step {
      display: grid;
      gap: 10px;
      padding: 18px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      background: #f8fafc;
    }
    .guide-step h4 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      color: #0f172a;
    }
    .guide-step p {
      font-size: 14px;
      line-height: 1.6;
    }
    .guide-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 4px;
    }
    .guide-actions-main {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .guide-btn {
      min-width: 190px;
      min-height: 44px;
      font-weight: 700;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: #ffffff;
      color: #0f172a;
    }
    .guide-btn.primary {
      border-color: transparent;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.24);
    }
    .guide-skip {
      border: 0;
      background: transparent;
      color: #64748b;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 0;
    }
    .guide-skip:hover {
      color: #0f172a;
    }
    .guide-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 999px;
      background: #ffffff;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
    }
    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 260px minmax(0, 1fr);
      }
    }
    @media (max-width: 900px) {
      body.page-with-footer {
        padding-bottom: 86px !important;
        overflow: auto;
      }
      main.wrap {
        display: block;
        padding-bottom: 24px;
      }
      .header-wrap {
        min-height: 76px;
      }
      .workspace {
        grid-template-columns: 1fr;
        height: auto;
        min-height: calc(100dvh - 180px);
        overflow: visible;
      }
      .workspace-nav {
        position: relative;
        top: auto;
        align-self: stretch;
        height: auto;
        max-height: none;
        overflow: visible;
        border-right: 0;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      }
      .workspace-main {
        overflow: visible;
      }
      .frame-shell {
        height: auto;
        overflow: visible;
      }
      .section-frame {
        height: auto;
      }
      .workspace-menu {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .guide-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      .wrap {
        width: calc(100vw - 16px);
        padding-left: 8px;
        padding-right: 8px;
      }
      .workspace {
        border-radius: 16px;
      }
      .workspace-nav-top {
        padding: 4px 6px 8px;
      }
      .workspace-menu {
        grid-template-columns: 1fr;
      }
      .workspace-head {
        padding: 12px;
      }
      .guide-overlay {
        padding: 12px;
      }
      .guide-card {
        padding: 24px 18px 20px;
        gap: 16px;
      }
      .guide-actions-main {
        width: 100%;
      }
      .guide-btn {
        width: 100%;
      }
      .guide-skip {
        width: 100%;
        text-align: center;
      }
    }
  </style>

  <script src="info-content.js?v=20260413b"></script>
  <script>
    const PUBLIC_HOME_TARGET = 'home.html';
    const LOCKED_LOGIN_TARGET = Object.freeze({
      user: 'home.html',
      club: 'club home.html'
    });
    const DASHBOARD_GUIDE_PENDING_KEY = 'clubPortal.pendingDashboardGuide';
    const DASHBOARD_GUIDE_SEEN_PREFIX = 'clubPortal.dashboardGuideSeen.';
    const CHAT_UNREAD_SYNC_EVENT = 'club-workspace-chat-unread';
    const CHAT_UNREAD_POLL_VISIBLE_MS = 12000;
    const CHAT_UNREAD_POLL_HIDDEN_MS = 30000;

    const SECTION_CONFIG = Object.freeze({
      info: {
        title: 'Club information',
        src: 'club-info.html?v=20260225i'
      },
      venues: {
        title: 'Venues and time slots',
        src: 'club-admin.html?v=20260309f'
      },
      bookings: {
        title: 'Member bookings',
        src: 'club bookings.html'
      },
      updates: {
        title: 'Memberships & FAQ',
        src: 'club updates.html?v=20260328-chat-kb-b'
      },
      chats: {
        title: 'Member chats',
        src: 'club chat.html?v=20260411b'
      }
    });

    const getLoggedUserType = () => {
      try {
        const user = JSON.parse(localStorage.getItem('loggedUser') || 'null');
        return user?.type === 'club' ? 'club' : (user?.type ? 'user' : null);
      } catch {
        return null;
      }
    };

    const enforcedAwayFromClubHome = (() => {
      const userType = getLoggedUserType();
      if (userType && userType !== 'club') {
        window.location.replace(LOCKED_LOGIN_TARGET.user);
        return true;
      }
      return false;
    })();

    const getAuthToken = () => {
      try {
        const sessionToken = String(window.AuthSession?.getToken?.() || '').trim();
        if (sessionToken) return sessionToken;
      } catch {}
      try {
        return String(localStorage.getItem('token') || '').trim();
      } catch {
        return '';
      }
    };

    const requireClubLogin = () => {
      const token = getAuthToken();
      if (!token) return false;
      try {
        const user = JSON.parse(localStorage.getItem('loggedUser') || 'null');
        if (!user || user.type !== 'club') return false;
      } catch {
        return false;
      }
      return true;
    };

    const clearAuthState = () => {
      if (window.AuthSession?.clearAll) {
        window.AuthSession.clearAll();
        return;
      }
      localStorage.removeItem('token');
      localStorage.removeItem('loggedUser');
      localStorage.removeItem('user');
    };

    let logoutInFlight = false;

    const forceLogout = (target = PUBLIC_HOME_TARGET) => {
      if (logoutInFlight) return;
      logoutInFlight = true;
      clearAuthState();
      localStorage.removeItem('selectedClub');
      window.location.replace(target);
    };

    const authFetch = (url, options = {}) => {
      const token = getAuthToken();
      const headers = { ...(options.headers || {}) };
      if (token) headers.Authorization = `Bearer ${token}`;
      return fetch(url, {
        ...options,
        credentials: options.credentials ?? 'include',
        headers
      });
    };

    const parseJsonSafe = (raw, fallback = null) => {
      try {
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    };

    const ensureClubProfileReady = async () => {
      if (enforcedAwayFromClubHome) return null;
      if (!requireClubLogin()) {
        clearAuthState();
        window.location.replace(PUBLIC_HOME_TARGET);
        return null;
      }

      try {
        const res = await authFetch('/api/my/clubs');
        if (!res.ok) {
          clearAuthState();
          window.location.replace(PUBLIC_HOME_TARGET);
          return null;
        }
        const clubs = await res.json();
        if (!Array.isArray(clubs) || clubs.length === 0) {
          window.location.replace('onboarding.html');
          return null;
        }

        const first = clubs[0];
        const firstId = first.id ?? first.clubId;
        const firstName = first.name || first.clubName || `Club #${firstId}`;
        try {
          const stored = parseJsonSafe(localStorage.getItem('selectedClub') || 'null');
          const storedId = stored?.id ?? null;
          const stillExists = storedId && clubs.some((club) => String(club.id ?? club.clubId) === String(storedId));
          if (!stillExists) throw new Error('stale');
        } catch {
          try {
            localStorage.setItem('selectedClub', JSON.stringify({ id: String(firstId), name: firstName }));
          } catch {}
        }
        return clubs;
      } catch (err) {
        return null;
      }
    };

    const sectionTitleEl = document.getElementById('sectionTitle');
    const frameShellEl = document.getElementById('frameShell');
    const frameLoadingEl = document.getElementById('frameLoading');
    const frameLoadingTextEl = document.getElementById('frameLoadingText');
    const menuButtons = Array.from(document.querySelectorAll('.workspace-tab'));
    const chatsMenuButton = document.querySelector('.workspace-tab[data-section="chats"]');
    const chatsUnreadBadgeEl = document.getElementById('workspaceChatsUnreadBadge');
    const framesBySection = new Map(
      Array.from(document.querySelectorAll('.section-frame')).map((frame) => [frame.dataset.section, frame])
    );
    const dashboardGuideOverlay = document.getElementById('dashboardGuideOverlay');
    const dashboardGuideClubNameEl = document.getElementById('dashboardGuideClubName');
    const dashboardGuideVenuesBtn = document.getElementById('dashboardGuideVenuesBtn');
    const dashboardGuideMembershipsBtn = document.getElementById('dashboardGuideMembershipsBtn');
    const dashboardGuideSkipBtn = document.getElementById('dashboardGuideSkipBtn');
    const dashboardGuideCloseBtn = document.getElementById('dashboardGuideCloseBtn');

    const decodeJwtPayload = (token) => {
      const raw = String(token || '').trim();
      if (!raw) return null;
      const parts = raw.split('.');
      if (parts.length !== 3) return null;
      try {
        const b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
        const pad = b64.length % 4 === 0 ? '' : '='.repeat(4 - (b64.length % 4));
        return JSON.parse(atob(b64 + pad));
      } catch {
        return null;
      }
    };

    const getTokenSessionVersion = (token) => {
      const payload = decodeJwtPayload(token);
      const value = Number(payload?.sv);
      return Number.isFinite(value) && value > 0 ? value : null;
    };

    let activeSection = 'info';
    const frameLoadRetries = new Map();
    const frameLoadWatchdogs = new Map();
    const FRAME_LOAD_TIMEOUT_MS = 8000;
    const MAX_FRAME_LOAD_RETRY = 2;
    const SESSION_CHECK_INTERVAL_MS = 15000;
    let sessionCheckTimer = null;
    let sessionCheckInFlight = false;
    let currentTokenSessionVersion = getTokenSessionVersion(getAuthToken());
    let dashboardGuideClubId = '';
    let selectedClubMeta = { id: '', name: '' };
    let chatUnreadPollTimer = null;
    let chatUnreadPollInFlight = false;

    const normalizeSection = (raw) => {
      const key = String(raw || '').trim().toLowerCase();
      return SECTION_CONFIG[key] ? key : 'info';
    };

    const setFrameLoading = (loading, text = '') => {
      if (frameShellEl) frameShellEl.classList.toggle('loading', Boolean(loading));
      if (frameLoadingEl) frameLoadingEl.setAttribute('aria-hidden', loading ? 'false' : 'true');
      if (frameLoadingTextEl && text) frameLoadingTextEl.textContent = text;
    };

    const loadingTextFor = (section) => `Loading ${SECTION_CONFIG[section]?.title || 'section'}...`;

    const getSectionSrc = (section, forceReload = false) => {
      const base = SECTION_CONFIG[section]?.src || SECTION_CONFIG.info.src;
      if (!forceReload) return base;
      return `${base}${base.includes('?') ? '&' : '?'}_=${Date.now()}`;
    };

    const updateUrlSection = (section) => {
      const url = new URL(window.location.href);
      url.searchParams.set('section', section);
      history.replaceState(null, '', `${url.pathname}${url.search}`);
    };

    const getInitialSection = () => {
      const url = new URL(window.location.href);
      const fromQuery = url.searchParams.get('section');
      const fromHash = window.location.hash.replace(/^#/, '');
      return normalizeSection(fromQuery || fromHash || 'info');
    };

    const applyEmbedStyle = (frame) => {
      try {
        const doc = frame.contentDocument;
        if (!doc || !doc.head) return;
        if (doc.getElementById('club-home-embed-style')) return;
        const style = doc.createElement('style');
        style.id = 'club-home-embed-style';
        const embeddedRules = [
          'header, #top, .site-footer { display: none !important; }',
          'html, body { background: #ffffff !important; }',
          'html { height: 100% !important; }',
          'body { margin: 0 !important; min-height: 100% !important; padding: 0 !important; overflow-y: auto !important; overscroll-behavior: contain !important; }',
          'body.page-with-footer { display: block !important; padding-bottom: 0 !important; }',
          'main { margin: 0 !important; }',
          'main.wrap, .wrap, .page-shell { max-width: none !important; width: 100% !important; margin: 0 !important; padding: 16px !important; }',
          '.admin-main { max-width: none !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }'
        ];
        if (String(frame.dataset.section || '') === 'chats') {
          embeddedRules.push(
            'main.wrap, .wrap, .page-shell, .page-main { padding: 0 !important; }',
            '.chat-shell { min-height: 100% !important; height: 100% !important; border: 0 !important; border-radius: 0 !important; box-shadow: none !important; }',
            '.thread-list-panel, .thread-view, .thread-head, .chat-log, .reply-form { background: #ffffff !important; }'
          );
        }
        style.textContent = embeddedRules.join('\n');
        doc.head.appendChild(style);
      } catch (err) {
      }
    };
    const syncFrameHeight = (frame) => {
      if (!frame) return;
      try {
        const shellHeight = frameShellEl ? Math.max(0, Math.ceil(frameShellEl.clientHeight)) : 0;
        const current = Number.parseInt(String(frame.style.height || '').replace('px', ''), 10) || 0;
        const next = shellHeight || current;
        if (Math.abs(next - current) > 1) {
          frame.style.height = `${next}px`;
        }
      } catch {}
    };

    const scheduleFrameHeightSync = (frame) => {
      if (!frame) return;
      syncFrameHeight(frame);
      window.setTimeout(() => syncFrameHeight(frame), 120);
      window.setTimeout(() => syncFrameHeight(frame), 360);
      window.setTimeout(() => syncFrameHeight(frame), 760);
    };

    const clearFrameWatchdog = (section) => {
      const timer = frameLoadWatchdogs.get(section);
      if (timer) {
        window.clearTimeout(timer);
        frameLoadWatchdogs.delete(section);
      }
    };

    const startFrameWatchdog = (section) => {
      clearFrameWatchdog(section);
      const timer = window.setTimeout(() => {
        const frame = framesBySection.get(section);
        if (!frame || frame.dataset.loaded === '1') return;
        const retryCount = Number(frameLoadRetries.get(section) || 0);
        if (retryCount >= MAX_FRAME_LOAD_RETRY) {
          if (section === activeSection) setFrameLoading(false);
          return;
        }
        frameLoadRetries.set(section, retryCount + 1);
        loadFrameIfNeeded(section, true);
      }, FRAME_LOAD_TIMEOUT_MS);
      frameLoadWatchdogs.set(section, timer);
    };

    const loadFrameIfNeeded = (section, forceReload = false) => {
      const frame = framesBySection.get(section);
      if (!frame) return;
      const srcAttr = String(frame.getAttribute('src') || '').trim();
      const hasRealSrc = Boolean(srcAttr) && srcAttr !== 'about:blank';
      if (forceReload || frame.dataset.loaded !== '1' || !hasRealSrc) {
        frame.dataset.loaded = 'loading';
        const shouldBypassCache = forceReload || !hasRealSrc;
        frame.src = getSectionSrc(section, shouldBypassCache);
        startFrameWatchdog(section);
      }
    };

    const activateSection = (section, options = {}) => {
      const key = normalizeSection(section);
      const config = SECTION_CONFIG[key];
      const frame = framesBySection.get(key);
      const needsLoad = Boolean(frame) && (options.forceReload === true || frame.dataset.loaded !== '1');
      activeSection = key;

      menuButtons.forEach((btn) => {
        const isActive = btn.dataset.section === key;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-current', isActive ? 'page' : 'false');
      });

      framesBySection.forEach((item, frameKey) => {
        const isActive = frameKey === key;
        item.classList.toggle('active', isActive);
        item.setAttribute('aria-hidden', isActive ? 'false' : 'true');
      });

      if (sectionTitleEl) sectionTitleEl.textContent = config.title;

      if (options.updateUrl !== false) {
        updateUrlSection(key);
      }

      if (needsLoad) {
        setFrameLoading(true, loadingTextFor(key));
      } else {
        setFrameLoading(false);
      }

      loadFrameIfNeeded(key, options.forceReload === true);
      scheduleFrameHeightSync(frame);
    };

    menuButtons.forEach((btn) => {
      btn.addEventListener('click', () => activateSection(btn.dataset.section));
    });

    framesBySection.forEach((frame) => {
      frame.addEventListener('load', () => {
        const section = normalizeSection(frame.dataset.section);
        frame.dataset.loaded = '1';
        frameLoadRetries.set(section, 0);
        clearFrameWatchdog(section);
        applyEmbedStyle(frame);
        scheduleFrameHeightSync(frame);
        if (frame.dataset.section === activeSection) {
          setFrameLoading(false);
        }
      });

      frame.addEventListener('error', () => {
        const section = normalizeSection(frame.dataset.section);
        const retryCount = Number(frameLoadRetries.get(section) || 0);
        if (retryCount >= MAX_FRAME_LOAD_RETRY) {
          if (section === activeSection) setFrameLoading(false);
          return;
        }
        frameLoadRetries.set(section, retryCount + 1);
        if (section === activeSection) {
          setFrameLoading(true, loadingTextFor(section));
        }
        loadFrameIfNeeded(section, true);
      });
    });

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      if (window.AuthSession?.logout) {
        window.AuthSession.logout(PUBLIC_HOME_TARGET, { replace: true });
        return;
      }
      localStorage.removeItem('token');
      localStorage.removeItem('loggedUser');
      localStorage.removeItem('user');
      localStorage.removeItem('selectedClub');
      window.location.replace(PUBLIC_HOME_TARGET);
    });

    window.addEventListener('resize', () => {
      scheduleFrameHeightSync(framesBySection.get(activeSection));
    });
    window.addEventListener('popstate', () => {
      activateSection(getInitialSection(), { updateUrl: false });
    });
    window.addEventListener('storage', (event) => {
      if (event.key === 'token') {
        const liveToken = getAuthToken();
        if (!liveToken) {
          renderChatsUnreadBadge(0);
          forceLogout(PUBLIC_HOME_TARGET);
          return;
        }
        const newSessionVersion = getTokenSessionVersion(liveToken);
        if (currentTokenSessionVersion && newSessionVersion && newSessionVersion !== currentTokenSessionVersion) {
          renderChatsUnreadBadge(0);
          forceLogout(PUBLIC_HOME_TARGET);
          return;
        }
        currentTokenSessionVersion = newSessionVersion || currentTokenSessionVersion;
      }
      if (event.key === 'loggedUser') {
        const user = parseJsonSafe(localStorage.getItem('loggedUser') || 'null');
        if (!user || user.type !== 'club') {
          renderChatsUnreadBadge(0);
          forceLogout(PUBLIC_HOME_TARGET);
          return;
        }
      }
      if (event.key === 'selectedClub') {
        syncSelectedClubMeta();
        refreshChatsUnreadBadge();
      }
      if (event.key === 'token' || event.key === 'loggedUser') {
        startChatUnreadPolling();
        refreshChatsUnreadBadge();
      }
      scheduleFrameHeightSync(framesBySection.get(activeSection));
    });

    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin) return;
      const chatsFrame = framesBySection.get('chats');
      if (chatsFrame?.contentWindow && event.source !== chatsFrame.contentWindow) return;
      const payload = event.data;
      if (!payload || payload.type !== CHAT_UNREAD_SYNC_EVENT) return;
      const payloadClubId = String(payload.clubId || '').trim();
      if (payloadClubId) {
        selectedClubMeta = { ...selectedClubMeta, id: payloadClubId };
      }
      renderChatsUnreadBadge(Math.max(0, Number(payload.unreadCount) || 0));
    });

    window.addEventListener('pageshow', () => {
      const activeFrame = framesBySection.get(activeSection);
      if (!activeFrame) return;
      const srcAttr = String(activeFrame.getAttribute('src') || '').trim();
      if (!srcAttr || srcAttr === 'about:blank' || activeFrame.dataset.loaded !== '1') {
        activateSection(activeSection, { updateUrl: false, forceReload: true });
      }
      refreshChatsUnreadBadge();
    });

    document.addEventListener('visibilitychange', () => {
      startChatUnreadPolling();
      if (!document.hidden) {
        refreshChatsUnreadBadge();
      }
    });

    window.addEventListener('focus', () => {
      startChatUnreadPolling();
      refreshChatsUnreadBadge();
    });

    window.setInterval(() => {
      syncFrameHeight(framesBySection.get(activeSection));
    }, 1400);

    const checkSessionAlive = async () => {
      if (sessionCheckInFlight) return;
      if (!requireClubLogin()) {
        forceLogout(PUBLIC_HOME_TARGET);
        return;
      }
      sessionCheckInFlight = true;
      try {
        const res = await authFetch('/api/profile', { cache: 'no-store' });
        if (res.status === 401) {
          forceLogout(PUBLIC_HOME_TARGET);
        }
      } catch {
        // Network blips should not force logout.
      } finally {
        sessionCheckInFlight = false;
      }
    };

    const startSessionGuard = () => {
      if (sessionCheckTimer) {
        window.clearInterval(sessionCheckTimer);
      }
      sessionCheckTimer = window.setInterval(checkSessionAlive, SESSION_CHECK_INTERVAL_MS);
    };

    const getDashboardGuideSeenKey = (clubId) => `${DASHBOARD_GUIDE_SEEN_PREFIX}${clubId}`;

    const resolveSelectedClub = (clubs = []) => {
      const stored = parseJsonSafe(localStorage.getItem('selectedClub') || 'null');
      const storedId = stored?.id != null ? String(stored.id) : '';
      if (storedId) {
        const match = Array.isArray(clubs)
          ? clubs.find((club) => String(club?.id ?? club?.clubId ?? '') === storedId)
          : null;
        return {
          id: storedId,
          name: String(stored?.name || match?.name || match?.clubName || '').trim()
        };
      }

      const first = Array.isArray(clubs) ? clubs[0] : null;
      if (!first) return { id: '', name: '' };
      return {
        id: String(first.id ?? first.clubId ?? ''),
        name: String(first.name || first.clubName || '').trim()
      };
    };

    const getStoredSelectedClub = () => {
      const stored = parseJsonSafe(localStorage.getItem('selectedClub') || 'null') || {};
      const clubId = String(stored.id ?? stored.clubId ?? '').trim();
      return {
        id: /^[0-9]+$/.test(clubId) ? clubId : '',
        name: String(stored.name || stored.clubName || '').trim()
      };
    };

    const syncSelectedClubMeta = (clubs = []) => {
      const next = Array.isArray(clubs) && clubs.length ? resolveSelectedClub(clubs) : getStoredSelectedClub();
      const clubId = String(next?.id ?? next?.clubId ?? '').trim();
      selectedClubMeta = {
        id: /^[0-9]+$/.test(clubId) ? clubId : '',
        name: String(next?.name || next?.clubName || '').trim()
      };
      return selectedClubMeta;
    };

    const conversationNeedsAttention = (item) => {
      if (!item || typeof item !== 'object') return false;
      if (String(item.chatMode || '').trim() !== 'HANDOFF_REQUESTED') return false;
      return String(item.lastSender || '').trim().toLowerCase() !== 'club';
    };

    const getConversationUnreadWeight = (item) => {
      const unreadValue = item?.unreadCount;
      const unreadCount = Math.max(0, Number(unreadValue) || 0);
      return Math.max(unreadCount, conversationNeedsAttention(item) ? 1 : 0);
    };

    const getConversationUnreadTotal = (items = []) => {
      if (!Array.isArray(items) || !items.length) return 0;
      return items.reduce((sum, item) => sum + getConversationUnreadWeight(item), 0);
    };

    const formatUnreadBadgeCount = (count) => (count > 99 ? '99+' : String(count));

    const renderChatsUnreadBadge = (count) => {
      const unreadCount = Math.max(0, Number(count) || 0);
      chatsMenuButton?.classList.toggle('has-unread', unreadCount > 0);
      if (!chatsUnreadBadgeEl) return;
      chatsUnreadBadgeEl.hidden = unreadCount <= 0;
      chatsUnreadBadgeEl.classList.toggle('is-visible', unreadCount > 0);
      chatsUnreadBadgeEl.textContent = unreadCount > 0 ? formatUnreadBadgeCount(unreadCount) : '';
      chatsUnreadBadgeEl.setAttribute(
        'aria-label',
        unreadCount > 0 ? `${unreadCount} member chats need attention` : 'No member chats need attention'
      );
    };

    const refreshChatsUnreadBadge = async () => {
      if (chatUnreadPollInFlight) return;
      const clubId = String(selectedClubMeta.id || getStoredSelectedClub().id || '').trim();
      if (!/^[0-9]+$/.test(clubId)) {
        renderChatsUnreadBadge(0);
        return;
      }
      chatUnreadPollInFlight = true;
      try {
        const res = await authFetch(`/api/my/clubs/${encodeURIComponent(clubId)}/chat/conversations`, { cache: 'no-store' });
        if (res.status === 401 || res.status === 403) {
          renderChatsUnreadBadge(0);
          return;
        }
        if (!res.ok) return;
        const raw = await res.json().catch(() => []);
        renderChatsUnreadBadge(getConversationUnreadTotal(raw));
      } catch (err) {
      } finally {
        chatUnreadPollInFlight = false;
      }
    };

    const stopChatUnreadPolling = () => {
      if (!chatUnreadPollTimer) return;
      window.clearInterval(chatUnreadPollTimer);
      chatUnreadPollTimer = null;
    };

    const startChatUnreadPolling = () => {
      stopChatUnreadPolling();
      const interval = document.hidden ? CHAT_UNREAD_POLL_HIDDEN_MS : CHAT_UNREAD_POLL_VISIBLE_MS;
      chatUnreadPollTimer = window.setInterval(refreshChatsUnreadBadge, interval);
    };

    const markDashboardGuideHandled = (clubId = dashboardGuideClubId) => {
      try {
        sessionStorage.removeItem(DASHBOARD_GUIDE_PENDING_KEY);
      } catch {}
      if (!clubId) return;
      try {
        localStorage.setItem(getDashboardGuideSeenKey(clubId), '1');
      } catch {}
    };

    const closeDashboardGuide = ({ markSeen = true } = {}) => {
      if (!dashboardGuideOverlay) return;
      if (markSeen) markDashboardGuideHandled();
      dashboardGuideOverlay.classList.remove('open');
      dashboardGuideOverlay.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('no-scroll');
    };

    const openDashboardGuide = ({ id = '', name = '' } = {}) => {
      if (!dashboardGuideOverlay) return;
      dashboardGuideClubId = String(id || '').trim();
      if (dashboardGuideClubNameEl) {
        const clubName = String(name || '').trim();
        dashboardGuideClubNameEl.textContent = clubName;
        dashboardGuideClubNameEl.hidden = !clubName;
      }
      dashboardGuideOverlay.classList.add('open');
      dashboardGuideOverlay.setAttribute('aria-hidden', 'false');
      document.body.classList.add('no-scroll');
      dashboardGuideVenuesBtn?.focus();
    };

    const maybeOpenDashboardGuide = (clubs = []) => {
      let pendingGuide = false;
      try {
        pendingGuide = sessionStorage.getItem(DASHBOARD_GUIDE_PENDING_KEY) === '1';
      } catch {}
      if (!pendingGuide || !dashboardGuideOverlay) return;

      const club = resolveSelectedClub(clubs);
      if (!club.id) {
        markDashboardGuideHandled('');
        return;
      }

      let alreadySeen = false;
      try {
        alreadySeen = localStorage.getItem(getDashboardGuideSeenKey(club.id)) === '1';
      } catch {}
      if (alreadySeen) {
        markDashboardGuideHandled(club.id);
        return;
      }

      openDashboardGuide(club);
    };

    const jumpFromGuideToSection = (section) => {
      closeDashboardGuide({ markSeen: true });
      activateSection(section, { updateUrl: true });
    };

    const infoOverlay = document.getElementById('infoOverlay');
    const infoTitle = document.getElementById('infoTitle');
    const infoBody = document.getElementById('infoBody');
    const getInfoMap = () => window.ClubPortalInfoContent?.createInfoMap?.() || {
      privacy: {
        title: 'Privacy',
        body: `
          <p>Read the full privacy details for this deployment.</p>
          <p class="info-link-row"><a href="privacy.html">Read full Privacy Notice</a></p>
        `
      },
      terms: {
        title: 'Terms',
        body: `
          <p>Read the full terms for this deployment.</p>
          <p class="info-link-row"><a href="terms.html">Read full Terms</a></p>
        `
      },
      help: {
        title: 'Help',
        body: `
          <p>Contact the platform administrator or club staff if you need help with this deployment.</p>
        `
      }
    };

    const openInfo = (key) => {
      const data = getInfoMap()[key];
      if (!data || !infoOverlay) return;
      if (infoTitle) infoTitle.textContent = data.title;
      if (infoBody) infoBody.innerHTML = data.body;
      infoOverlay.classList.add('open');
      document.body.classList.add('no-scroll');
    };

    const closeInfo = () => {
      if (!infoOverlay) return;
      infoOverlay.classList.remove('open');
      document.body.classList.remove('no-scroll');
    };

    document.querySelectorAll('.info-trigger').forEach((btn) => {
      btn.addEventListener('click', () => openInfo(btn.dataset.info));
    });
    infoOverlay?.addEventListener('click', (evt) => {
      if (evt.target === infoOverlay) closeInfo();
    });
    infoOverlay?.querySelector('.info-close')?.addEventListener('click', closeInfo);
    dashboardGuideOverlay?.addEventListener('click', (evt) => {
      if (evt.target === dashboardGuideOverlay) closeDashboardGuide({ markSeen: true });
    });
    dashboardGuideCloseBtn?.addEventListener('click', () => closeDashboardGuide({ markSeen: true }));
    dashboardGuideSkipBtn?.addEventListener('click', () => closeDashboardGuide({ markSeen: true }));
    dashboardGuideVenuesBtn?.addEventListener('click', () => jumpFromGuideToSection('venues'));
    dashboardGuideMembershipsBtn?.addEventListener('click', () => jumpFromGuideToSection('updates'));

    (async () => {
      let clubs = null;
      try {
        clubs = await ensureClubProfileReady();
      } catch (err) {
      } finally {
        syncSelectedClubMeta(clubs);
        activateSection(getInitialSection(), { updateUrl: true });
        maybeOpenDashboardGuide(clubs);
        startChatUnreadPolling();
        refreshChatsUnreadBadge();
        startSessionGuard();
        checkSessionAlive();
      }
    })();
  </script>
</body>
</html>
