<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com https://*.googleusercontent.com https://www.google.com https://www.gstatic.com; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://maps.googleapis.com; connect-src 'self' https://accounts.google.com https://maps.googleapis.com https://api.stripe.com; frame-src 'self' https://accounts.google.com https://js.stripe.com; form-action 'self' https://accounts.google.com">
<title>Club Booking Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&display=swap');

  :root {
    --card: #fff;
    --ink: #222;
    --muted: #6B7280;
    --line: #E5E7EB;
    --chip: #F3F4F6;
    --header-height: 72px;
    --anim-base: cubic-bezier(.4, 0, .2, 1);
    --anim-pop: cubic-bezier(.2, .8, .4, 1);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(#fff, #fafafa);
    color: var(--ink);
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    animation: fadeBody .6s var(--anim-base) both;
  }

  header {
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 10;
    border: none;
    box-shadow: none;
  }

  footer {
    border-top: 1px solid var(--line);
    background: #fff;
  }

  h1 {
    font-size: 22px;
    margin: 0;
  }

  h3 {
    font-size: 15px;
    margin: 8px 0;
  }

  .card h3 {
    font-family: 'Manrope', 'Segoe UI', Arial, sans-serif;
    font-weight: 700;
  }

  .btn {
    border: 1px solid var(--line);
    background: #111;
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition:
      transform .15s ease,
      filter .2s var(--anim-pop);
    box-shadow: none !important;
    outline: none;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: none !important;
  }

  .btn:active {
    transform: translateY(0);
    box-shadow: none !important;
  }

  .btn:focus {
    outline: none;
    box-shadow: none !important;
  }

  .btn:focus-visible {
    outline: none;
    box-shadow: none !important;
  }

  .btn.ghost {
    background: #fff;
    color: #111;
  }

  .btn.blue {
    background: #2563eb;
    border-color: #2563eb;
  }

  .user-menu {
    position: relative;
    display: inline-block;
  }
  .avatar-btn {
    width: 38px;
    height: 38px;
    padding: 0;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: pointer;
    overflow: hidden;
  }
  .avatar-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .avatar-btn span {
    font-size: 13px;
  }

  .user-menu .menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 12px 28px rgba(15, 23, 42, .12);
    padding: 6px 0;
    min-width: 140px;
    z-index: 20;
    opacity: 0;
    transform: translateY(6px) scale(.98);
    visibility: hidden;
    pointer-events: none;
    transition:
      opacity .2s var(--anim-base),
      transform .25s var(--anim-pop),
      visibility 0s linear .25s;
  }

  .user-menu .menu.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    visibility: visible;
    pointer-events: auto;
    transition:
      opacity .2s var(--anim-base),
      transform .25s var(--anim-pop),
      visibility 0s;
  }

  .user-menu .menu button {
    width: 100%;
    background: none;
    border: none;
    padding: 8px 14px;
    text-align: left;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
  }

  .user-menu .menu button:hover {
    background: #f3f4f6;
  }

  .user-menu .menu.open button {
    animation: menuPop .28s var(--anim-pop) both;
  }

  .user-menu .menu.open button:nth-child(2) {
    animation-delay: .08s;
  }

  @keyframes menuPop {
    from {
      opacity: 0;
      transform: translateY(6px) scale(.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, .04);
    transition:
      transform .35s var(--anim-base),
      box-shadow .35s var(--anim-base);
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 32px rgba(15, 23, 42, .14);
  }

  .card .pad {
    padding: 12px;
  }

  .site-title-link {
    color: inherit;
    text-decoration: none;
  }

  .card.club {
    opacity: 0;
    transform: translateY(18px) scale(.98);
    animation: cardIn .65s var(--anim-base) forwards;
    animation-delay: calc(var(--card-index, 0) * 70ms);
  }

  .search-card {
    position: sticky;
    top: var(--search-card-top, calc(var(--header-height) - 1px));
    z-index: 9;
    border: 1px solid rgba(221, 227, 238, .9);
    background: rgba(255, 255, 255, .92);
    backdrop-filter: blur(12px);
    box-shadow: 0 12px 28px rgba(15, 23, 42, .08);
    animation: floatCard 1.2s var(--anim-base) both;
    transition:
      border-color .22s var(--anim-base),
      background .22s var(--anim-base),
      box-shadow .22s var(--anim-base),
      transform .22s var(--anim-base);
  }

  .search-card .pad {
    padding: 18px 20px;
    transition: padding .22s var(--anim-base);
  }

  .search-card.search-card--docked {
    background: #fff;
    border-color: rgba(206, 214, 228, .96);
    box-shadow: 0 10px 24px rgba(15, 23, 42, .10);
    border-top-left-radius: 0;
    border-top-right-radius: 0;
    backdrop-filter: none;
  }

  .search-card.search-card--docked .pad {
    padding: 10px 14px;
  }

  .search-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .search-controls {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1 1 50%;
    max-width: 720px;
    min-height: 54px;
    border: 1px solid rgba(148, 163, 184, .35);
    border-radius: 999px;
    padding: 14px 18px;
    background: linear-gradient(180deg, #fff, #f8faff);
    box-shadow: 0 14px 30px rgba(15, 23, 42, .10);
    transition:
      border-color .25s var(--anim-base),
      box-shadow .25s var(--anim-base),
      transform .25s var(--anim-base),
      min-height .22s var(--anim-base),
      padding .22s var(--anim-base),
      gap .22s var(--anim-base);
  }

  .search-controls:focus-within {
    border-color: #2563eb;
    box-shadow: 0 16px 32px rgba(37, 99, 235, .18);
    transform: translateY(-1px);
  }

  .search-input-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }

  .search-icon {
    position: relative;
    width: 18px;
    height: 18px;
    border: 2px solid #9CA3AF;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .search-icon::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 2px;
    background: #9CA3AF;
    border-radius: 999px;
    bottom: -3px;
    right: -6px;
    transform: rotate(45deg);
  }

  .search-card.search-card--docked .search-row {
    gap: 10px;
  }

  .search-card.search-card--docked .search-controls {
    min-height: 46px;
    padding: 10px 14px;
    gap: 10px;
    box-shadow: none;
    background: rgba(255, 255, 255, .92);
  }

  .search-card.search-card--docked .search-icon {
    width: 16px;
    height: 16px;
  }

  .search-card.search-card--docked .search-icon::after {
    width: 7px;
    right: -5px;
  }

  .search-controls .input {
    flex: 1;
    height: auto;
    border: none;
    padding: 0;
    background: transparent;
    font-size: 15px;
    color: var(--ink);
  }

  .search-controls .input::placeholder {
    color: rgba(107, 114, 128, .88);
  }

  .search-controls .input:focus {
    outline: none;
  }

  .search-controls .btn {
    height: auto;
    border: none;
    background: rgba(37, 99, 235, .12);
    color: #2563eb;
    padding: 8px 18px;
    border-radius: 999px;
    font-weight: 600;
    transition:
      background .2s ease,
      color .2s ease,
      padding .22s var(--anim-base);
  }

  .search-card.search-card--docked .search-controls .btn {
    padding: 6px 14px;
  }

  .search-controls .btn:hover {
    background: rgba(37, 99, 235, .22);
    color: #1d4ed8;
  }

  .search-controls .btn:active {
    background: rgba(37, 99, 235, .3);
  }

  .filter-toggle {
    border: 1px solid rgba(148, 163, 184, .35);
    background: linear-gradient(180deg, #fff, #f5f7ff);
    color: var(--ink);
    min-width: 120px;
    height: 54px;
    padding: 0 18px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: .01em;
    cursor: pointer;
    box-shadow: 0 14px 30px rgba(15, 23, 42, .10);
    transition:
      transform .2s var(--anim-base),
      box-shadow .2s var(--anim-base),
      background .2s var(--anim-base),
      min-width .22s var(--anim-base),
      height .22s var(--anim-base);
  }

  .search-card.search-card--docked .filter-toggle {
    min-width: 108px;
    height: 46px;
    box-shadow: none;
  }

  .filter-toggle:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 30px rgba(15, 23, 42, .12);
  }

  .filter-toggle.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }

  .filter-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    margin-left: 6px;
    padding: 0 6px;
    border-radius: 999px;
    background: #111;
    color: #fff;
    font-size: 11px;
  }

  .filter-surface {
    display: none;
    margin-top: 12px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 18px;
    padding: 12px 14px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, .08);
  }

  .search-card.search-card--docked .filter-surface {
    margin-top: 10px;
  }

  .filter-surface.open {
    display: block;
  }

  .filter-surface__body {
    display: none;
    gap: 10px;
    margin-top: 0;
  }

  .filter-surface.open .filter-surface__body {
    display: grid;
  }

  .filter-panel {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-chip {
    border: 1px solid var(--line);
    background: var(--chip);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: transform .15s var(--anim-base), background .15s var(--anim-base);
  }

  .filter-chip:hover {
    transform: translateY(-1px);
    background: #fff;
  }

  .filter-chip.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }

  input.input {
    width: 100%;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    padding: 0 10px;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 16px;
  }

  @media (min-width: 640px) {
    .cards {
      grid-template-columns: 1fr 1fr;
    }
  }

  .club {
    padding: 8px;
  }

  .thumb {
    position: relative;
    height: clamp(190px, 24vw, 250px);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    background: #f5f7fb;
    display: grid;
    place-items: center;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    background: #fff;
    display: block;
  }

  .thumb-placeholder {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: .02em;
    padding: 0 12px;
  }

  .page {
    padding: 20px 0;
  }

  .muted {
    color: var(--muted);
    font-size: 12px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }

  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .chip {
    background: var(--chip);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 12px;
    cursor: pointer;
    font: inherit;
    appearance: none;
  }

  .chip-link:hover {
    background: #fff;
  }

  .info-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(10, 12, 16, 0.45);
    z-index: 3000;
  }

  .info-overlay.open {
    display: flex;
  }

  .info-card {
    position: relative;
    width: min(560px, 92vw);
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(10, 12, 16, 0.25);
    padding: 20px 20px 18px;
  }

  .info-card h3 {
    margin: 0 0 8px;
    font-size: 18px;
  }

  .info-body p {
    margin: 0 0 10px;
    color: var(--muted);
    font-size: 13px;
  }

  .info-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 30px;
    height: 30px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    cursor: pointer;
    color: var(--muted);
  }

  @keyframes fadeBody {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: none; }
  }

  @keyframes cardIn {
    0% { opacity: 0; transform: translateY(20px) scale(.97); }
    60% { opacity: 1; transform: translateY(-4px) scale(1); }
    100% { opacity: 1; transform: none; }
  }

  @keyframes floatCard {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: none; }
  }

  .empty {
    padding: 16px;
    text-align: center;
    color: var(--muted);
  }

  @media (max-width: 480px) {
    .search-card .pad {
      padding: 14px;
    }

    .search-row {
      flex-direction: column;
      align-items: stretch;
    }

    .search-controls {
      flex-direction: column;
      align-items: stretch;
      padding: 14px;
      max-width: none;
    }

    .search-input-wrap {
      width: 100%;
    }

    .search-icon {
      display: none;
    }

    .search-controls .btn {
      width: 100%;
    }

    .filter-toggle {
      width: 100%;
    }

    .search-card.search-card--docked .search-row {
      flex-direction: row;
      align-items: center;
    }

    .search-card.search-card--docked .search-controls {
      flex-direction: row;
      align-items: center;
      max-width: none;
      padding: 10px 12px;
    }

    .search-card.search-card--docked .search-icon {
      display: block;
    }

    .search-card.search-card--docked .search-controls .btn,
    .search-card.search-card--docked .filter-toggle {
      width: auto;
      flex: 0 0 auto;
    }

  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>

<body class="page-with-footer desktop-consistency desktop-shell--standard desktop-page--home">

  <header id="top">

        <a class="site-title-link" href="#top">Club Booking Portal</a>

      <div id="userArea" style="display:flex;align-items:center;gap:8px;margin-top:0">

        <button id="btnRegister" class="btn blue" type="button" style="min-width:80px">Register</button>
      </div>

  </header>

  <main class="wrap page-main desktop-shell-main">
    <!-- Search and filter area with the search box, clear button, and collapsible filters -->
    <section id="p1" class="page">
      <div class="card search-card"><div class="pad">
        <div class="search-row">
          <div class="search-controls" role="search">
            <div class="search-input-wrap">
              <span class="search-icon" aria-hidden="true"></span>
              <input id="kw" class="input" type="text" placeholder="Try: badminton, yoga, football..." />
            </div>
            <button class="btn ghost" type="button" id="btnClear">Clear</button>
          </div>
          <button class="filter-toggle" type="button" id="filterToggle" aria-expanded="false" aria-controls="filterSurface">
            Filter <span class="filter-count" id="filterCount" style="display:none">0</span>
          </button>
        </div>
        <div class="filter-surface" id="filterSurface">

        <button class="site-footer__btn info-trigger" type="button" data-info="help">Help</button>

      <h3 id="infoTitle">Privacy</h3>
      <div id="infoBody" class="info-body"></div>
    </div>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', () => {
  // 1. Layout measurements
  // Compute the actual header height and store it in the --header-height CSS variable.
  // This keeps the sticky search card aligned directly beneath the header.
  const rootEl = document.documentElement;
  const headerEl = document.querySelector('header');
  const topLink = document.querySelector('.site-title-link');
  const setHeaderH = () => {
    if (headerEl) rootEl.style.setProperty('--header-height', `${headerEl.offsetHeight}px`);
  };
  setHeaderH();
  window.addEventListener('resize', setHeaderH);
  topLink?.addEventListener('click', (event) => {
    event.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // 2. User session management
  // Read the saved user from localStorage to determine guest, member, or club manager state.
  const userArea = document.getElementById('userArea');
  let savedUser = null;
  try {
    savedUser = JSON.parse(localStorage.getItem('loggedUser') || 'null');
  } catch {
    localStorage.removeItem('loggedUser');
  }

  const normalizeToken = () => String(localStorage.getItem('token') || '').trim();
  const isJwtSessionValid = (token) => {
    if (!token) return false;
    const parts = token.split('.');
    if (parts.length !== 3) return false;
    try {
      const payloadRaw = parts[1].replace(/-/g, '+').replace(/_/g, '/');
      const normalized = payloadRaw + '='.repeat((4 - (payloadRaw.length % 4)) % 4);
      const payload = JSON.parse(atob(normalized));
      if (typeof payload.exp !== 'number') return true;
      return Date.now() < payload.exp * 1000;
    } catch {
      return false;
    }
  };
  const clearStaleSession = () => {
    if (window.AuthSession?.clearAll) {
      window.AuthSession.clearAll();
      return;
    }
    localStorage.removeItem('token');
    localStorage.removeItem('loggedUser');
    localStorage.removeItem('user');
  };
  const sessionActive = isJwtSessionValid(normalizeToken());
  if (savedUser && !sessionActive) {
    clearStaleSession();
    savedUser = null;
  }

  // Locked login landing rules:
  // user -> home.html
  // club -> club home.html
  const LOCKED_LOGIN_TARGET = Object.freeze({
    user: 'home.html',
    club: 'club home.html'
  });
  if (savedUser?.type === 'club' && sessionActive) {
    window.location.replace(LOCKED_LOGIN_TARGET.club);
    return;
  }

  const authFetch = (url, options = {}) => {
    const token = localStorage.getItem('token');
    const headers = { ...(options.headers || {}) };
    if (token) headers.Authorization = `Bearer ${token}`;
    return fetch(url, {
      ...options,
      credentials: options.credentials ?? 'include',
      headers
    });
  };

  const AVATAR_STORAGE_KEY_LEGACY = 'profileAvatar';
  const AVATAR_STORAGE_KEY_PREFIX = 'profileAvatar:';

  const getAvatarStorageKey = () => {
    const logged = savedUser || {};
    const type = String(logged.type || logged.role || 'user').trim().toLowerCase() || 'user';
    const email = String(logged.email || '').trim().toLowerCase();
    if (email) return `${AVATAR_STORAGE_KEY_PREFIX}${type}:${email}`;
    const name = String(logged.name || '').trim().toLowerCase();
    if (name) return `${AVATAR_STORAGE_KEY_PREFIX}${type}:${name}`;
    return `${AVATAR_STORAGE_KEY_PREFIX}${type}:anonymous`;
  };

  const parseAvatarStorageValue = (raw) => {
    const text = String(raw || '').trim();
    if (!text) return '';
    try {
      const parsed = JSON.parse(text);
      return typeof parsed === 'string' ? parsed.trim() : '';
    } catch {
      // Backward compatibility: older builds wrote plain URL/text.
      return text;
    }
  };

  const readStoredAvatar = () => {
    const scopedKey = getAvatarStorageKey();
    const scoped = parseAvatarStorageValue(localStorage.getItem(scopedKey));
    return scoped || '';
  };

  const writeStoredAvatar = (avatarUrl) => {
    const normalized = String(avatarUrl || '').trim();
    if (!normalized) return;
    try {
      localStorage.setItem(getAvatarStorageKey(), JSON.stringify(normalized));
      localStorage.removeItem(AVATAR_STORAGE_KEY_LEGACY);
    } catch {}
  };

  const fetchProfile = async () => {
    try {
      const res = await authFetch('/api/profile');
      if (res.ok) return await res.json();
    } catch (err) {
    }
    return null;
  };

  // If a session exists, render the avatar button and dropdown menu in the header.
  if (savedUser && userArea) {
    const isClub = savedUser.type === 'club';
    const targetHref = isClub ? LOCKED_LOGIN_TARGET.club : 'user.html';
    const avatarData = readStoredAvatar();
    const fallback = (savedUser.name || savedUser.email || (isClub ? 'C' : 'M')).trim().charAt(0).toUpperCase();
    userArea.innerHTML = `
      <div class="user-menu">
        <button id="btnMy" class="avatar-btn" type="button" aria-haspopup="true" aria-expanded="false">
        </button>
        <div class="menu" id="myMenu" role="menu">
          <button type="button" id="btnDetails" role="menuitem">Details</button>
          <button type="button" id="btnLogout" role="menuitem">Logout</button>
        </div>
      </div>`;

    const myBtn = document.getElementById('btnMy');
    const menuEl = document.getElementById('myMenu');
    const setHeaderAvatar = (avatarUrl, letter) => {
      if (!myBtn) return;
      const normalizedAvatar = String(avatarUrl || '').trim();
      myBtn.innerHTML = '';
      if (normalizedAvatar) {
        const img = document.createElement('img');
        img.src = normalizedAvatar;
        img.alt = 'My profile';
        myBtn.appendChild(img);
        return;
      }
      const span = document.createElement('span');
      span.textContent = String(letter || '').trim() || 'M';
      myBtn.appendChild(span);
    };

    setHeaderAvatar(avatarData, fallback);

    fetchProfile().then((profile) => {
      if (!profile || !myBtn) return;
      const avatarUrl = profile.avatarUrl || profile.avatar;
      const displayName = profile.displayName || profile.name || '';
      const email = profile.email || '';
      const letter = (displayName || email || fallback).trim().charAt(0).toUpperCase();
      if (avatarUrl) {
        writeStoredAvatar(avatarUrl);
        setHeaderAvatar(avatarUrl, letter);
      } else if (letter) {
        setHeaderAvatar(readStoredAvatar(), letter);
      }
    });

    const isAvatarStorageKey = (key) =>
      key === AVATAR_STORAGE_KEY_LEGACY
      || (typeof key === 'string' && key.startsWith(AVATAR_STORAGE_KEY_PREFIX));
    window.addEventListener('storage', (evt) => {
      if (!isAvatarStorageKey(evt.key)) return;
      setHeaderAvatar(readStoredAvatar(), fallback);
    });

    // Bind the dropdown menu actions.
    document.getElementById('btnDetails')?.addEventListener('click', () => { window.location.href = targetHref; });
    document.getElementById('btnLogout')?.addEventListener('click', () => {
      if (window.AuthSession?.logout) {
        window.AuthSession.logout('', { reload: true });
        return;
      }
      localStorage.removeItem('loggedUser');
      localStorage.removeItem('user');
      localStorage.removeItem('selectedClub');
      location.reload();
    });

    // Control dropdown open/close behavior for click and hover interactions.
    const toggleMenu = (open) => {
      const wantOpen = open ?? !menuEl.classList.contains('open');
      menuEl.classList.toggle('open', wantOpen);
      myBtn.setAttribute('aria-expanded', wantOpen ? 'true' : 'false');
    };

    myBtn.addEventListener('click', () => toggleMenu());
    const menuWrap = userArea.querySelector('.user-menu');
    let closeTimer = null;
    const cancelClose = () => {
      if (closeTimer) {
        clearTimeout(closeTimer);
        closeTimer = null;
      }
    };
    const scheduleClose = () => {
      cancelClose();
      closeTimer = setTimeout(() => toggleMenu(false), 600);
    };
    if (menuWrap) {
      menuWrap.addEventListener('mouseenter', () => {
        cancelClose();
        toggleMenu(true);
      });
      menuWrap.addEventListener('mouseleave', scheduleClose);
    }
    document.addEventListener('click', (e) => { if (!userArea.contains(e.target)) toggleMenu(false); });
    [myBtn, menuEl].forEach(el => el.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { toggleMenu(false); myBtn.focus(); }
    }));
  } else {
    const openAuth = (mode) => {
      // Wait for auth-modal.js to finish loading.
      if (window.openAuthModal && typeof window.openAuthModal === 'function') {
        window.openAuthModal(mode);
      } else {
        window.location.href = mode === 'register' ? 'login.html#register' : 'login.html#login';
      }
    };
    document.getElementById('btnLogin')?.addEventListener('click', () => openAuth('login'));
    document.getElementById('btnRegister')?.addEventListener('click', () => openAuth('register'));
  }

  // 3. Club data source
  // The home page loads clubs only from /api/clubs.
  let CLUBS = [];

  // 4. Page logic and rendering
  const cardsEl = document.getElementById('cards');
  const loadingEl = document.getElementById('loading');
  const emptyEl = document.getElementById('empty');
  const kwEl = document.getElementById('kw');
  const searchCard = document.querySelector('.search-card');
  const filterToggle = document.getElementById('filterToggle');
  const filterSurface = document.getElementById('filterSurface');
  const filterPanel = document.getElementById('filterPanel');
  const filterCount = document.getElementById('filterCount');
  const selectedTags = [];
  const infoOverlay = document.getElementById('infoOverlay');
  const infoTitle = document.getElementById('infoTitle');
  const infoBody = document.getElementById('infoBody');
  
  // Static content map for Privacy, Terms, and Help.
  const getInfoMap = () => window.ClubPortalInfoContent?.createInfoMap?.() || {
    privacy: {
      title: 'Privacy',
      body: `
        <p>Read the full privacy details for this deployment.</p>
        <p class="info-link-row"><a href="privacy.html">Read full Privacy Notice</a></p>
      `
    },
    terms: {
      title: 'Terms',
      body: `
        <p>Read the full terms for this deployment.</p>
        <p class="info-link-row"><a href="terms.html">Read full Terms</a></p>
      `
    },
    help: {
      title: 'Help',
      body: `
        <p>Contact the platform administrator or club staff if you need help with this deployment.</p>
      `
    }
  };


  // Normalize club IDs to strings to avoid number/string mismatches across page flows.
  const normalizeClubId = (value) => {
    if (value === undefined || value === null) return '';
    return String(value);
  };

  let searchCardDockThreshold = 0;
  let searchCardDockRaf = 0;
  let searchCardDocked = false;
  const SEARCH_CARD_DOCK_HYSTERESIS = 20;

  const getSearchCardTopOffset = () => {
    const headerHeight = headerEl ? headerEl.offsetHeight : 72;
    return Math.max(0, headerHeight - 1);
  };

  const getScrollTop = () => Math.max(window.scrollY || window.pageYOffset || 0, 0);

  const applySearchCardDocked = (docked) => {
    searchCardDocked = Boolean(docked);
    searchCard?.classList.toggle('search-card--docked', searchCardDocked);
  };

  const syncSearchCardDocked = () => {
    searchCardDockRaf = 0;
    if (!searchCard) return;
    rootEl.style.setProperty('--search-card-top', `${getSearchCardTopOffset()}px`);
    const scrollTop = getScrollTop();
    const shouldDock = searchCardDocked
      ? scrollTop >= Math.max(0, searchCardDockThreshold - SEARCH_CARD_DOCK_HYSTERESIS)
      : scrollTop > searchCardDockThreshold + SEARCH_CARD_DOCK_HYSTERESIS;
    if (shouldDock !== searchCardDocked) {
      applySearchCardDocked(shouldDock);
    }
  };

  const queueSearchCardDockSync = () => {
    if (!searchCard || searchCardDockRaf) return;
    searchCardDockRaf = window.requestAnimationFrame(syncSearchCardDocked);
  };

  const recalcSearchCardDockThreshold = () => {
    if (!searchCard) return;
    const wasDocked = searchCardDocked;
    applySearchCardDocked(false);
    rootEl.style.setProperty('--search-card-top', `${getSearchCardTopOffset()}px`);
    const rect = searchCard.getBoundingClientRect();
    searchCardDockThreshold = Math.max(0, getScrollTop() + rect.top - getSearchCardTopOffset());
    applySearchCardDocked(wasDocked);
    syncSearchCardDocked();
  };

  window.addEventListener('resize', recalcSearchCardDockThreshold);
  window.addEventListener('scroll', queueSearchCardDockSync, { passive: true });

  const CLUB_LIST_RETURN_STATE_KEY = 'clubPortal.publicClubListReturn';
  const normalizePageName = (value, fallback = 'home.html') => {
    const raw = String(value || '').trim();
    if (!raw) return fallback;
    const clean = raw.split('#')[0].split('?')[0].replace(/\\/g, '/');
    const page = clean.slice(clean.lastIndexOf('/') + 1).trim();
    return page || fallback;
  };
  const buildCurrentPageHref = (fallback = 'home.html') => {
    const page = normalizePageName(window.location.pathname, fallback);
    return `${page}${window.location.search || ''}${window.location.hash || ''}`;
  };
  const escapeSelectorValue = (value) => {
    const raw = String(value ?? '');
    if (window.CSS && typeof window.CSS.escape === 'function') {
      return window.CSS.escape(raw);
    }
    return raw.replace(/["\\]/g, '\\$&');
  };
  let pendingClubListReturnState = null;

  const readClubListReturnState = () => {
    try {
      return JSON.parse(sessionStorage.getItem(CLUB_LIST_RETURN_STATE_KEY) || 'null');
    } catch {
      return null;
    }
  };

  const clearClubListReturnState = () => {
    pendingClubListReturnState = null;
    try {
      sessionStorage.removeItem(CLUB_LIST_RETURN_STATE_KEY);
    } catch {
      // Ignore storage cleanup failures.
    }
  };

  const rememberClubListReturnState = (clubId) => {
    const key = normalizeClubId(clubId);
    if (!key) return;
    const state = {
      page: 'home.html',
      href: buildCurrentPageHref('home.html'),
      clubId: key,
      scrollY: Math.max(window.scrollY || window.pageYOffset || 0, 0),
      ts: Date.now()
    };
    pendingClubListReturnState = state;
    try {
      sessionStorage.setItem(CLUB_LIST_RETURN_STATE_KEY, JSON.stringify(state));
    } catch {
      // Ignore storage quota issues.
    }
  };

  const restoreClubListReturnState = () => {
    if (!pendingClubListReturnState) {
      pendingClubListReturnState = readClubListReturnState();
    }
    if (!pendingClubListReturnState) return;
    if (normalizePageName(pendingClubListReturnState.page, 'home.html') !== 'home.html') return;

    const clubId = normalizeClubId(pendingClubListReturnState.clubId);
    const targetEl = clubId
      ? cardsEl?.querySelector(`.card.club[data-id="${escapeSelectorValue(clubId)}"]`)
      : null;
    const fallbackTop = Number(pendingClubListReturnState.scrollY);
    const targetTop = targetEl
      ? Math.max(targetEl.getBoundingClientRect().top + window.scrollY - 120, 0)
      : (Number.isFinite(fallbackTop) ? Math.max(fallbackTop, 0) : null);
    if (targetTop === null) return;

    window.requestAnimationFrame(() => {
      window.requestAnimationFrame(() => {
        window.scrollTo({ top: targetTop, behavior: 'auto' });
      });
    });
    clearClubListReturnState();
  };

  const firstNonEmpty = (...values) => {
    for (const value of values) {
      if (typeof value === 'string' && value.trim()) return value.trim();
    }
    return '';
  };

  const fetchClubCoverUrl = async (clubId) => {
    const id = normalizeClubId(clubId);
    if (!/^\d+$/.test(id)) return '';
    try {
      const res = await authFetch(`/api/clubs/${encodeURIComponent(id)}/images`);
      if (!res.ok) return '';
      const images = await res.json();
      if (!Array.isArray(images) || !images.length) return '';
      const first = images[0] || {};
      return firstNonEmpty(first.url, first.imageUrl, first.src);
    } catch {
      return '';
    }
  };

  // Store the selected club for guests so the login flow can return to the right club.
  const storeJoinIntent = (clubId) => {
    const key = normalizeClubId(clubId);
    if (!key) return;
    const club = CLUBS.find(c => normalizeClubId(c.id) === key);
    try {
      localStorage.setItem('selectedClub', JSON.stringify(club || { id: key }));
    } catch {
      // Ignore storage quota issues.
    }
  };

  const buildClubReturnTarget = (clubId) => {
    const key = normalizeClubId(clubId);
    return key ? `club.html?club=${encodeURIComponent(key)}` : 'club.html';
  };


  const isLoggedIn = () => {
    const token = normalizeToken();
    let user = null;
    try {
      const parsed = JSON.parse(localStorage.getItem('loggedUser') || 'null');
      user = (parsed && typeof parsed === 'object') ? parsed : null;
    } catch {
      user = null;
    }
    return isJwtSessionValid(token) && !!user;
  };
  const openLoginPrompt = (returnTo = '') => {
    const target = String(returnTo || '').trim();
    if (window.openAuthModal && typeof window.openAuthModal === 'function') {
      window.openAuthModal('login', target);
      return;
    }
    window.location.href = target
      ? `login.html?returnTo=${encodeURIComponent(target)}#login`
      : 'login.html#login';
  };

  // Global join handler for Join Now buttons, including login gating for guests.
  window.handleJoinClick = function(clubId, event) {
    event?.preventDefault?.();
    event?.stopPropagation?.();
    const key = normalizeClubId(clubId);
    if (!isLoggedIn()) {
      storeJoinIntent(key);
      openLoginPrompt(buildClubReturnTarget(key));
      return false;
    }
    goToJoinPage(key);
    return false;
  };

  // Build the HTML for a single club card.
  const clubCard = (club, idx = 0) => {
    const tags = Array.isArray(club.tags) && club.tags.length ? club.tags : ['sport'];
    const chipHtml = tags.map((tag) => (
      `<button class="chip chip-link" type="button" data-tag="${tag}"># ${tag}</button>`
    )).join('');
    const coverHtml = club.coverUrl
      ? `<img src="${club.coverUrl}" alt="${club.name} cover" loading="lazy" decoding="async">`
      : `<span class="thumb-placeholder">No cover image</span>`;
    return `
    <div class="card club" data-id="${club.id}" style="--card-index:${idx};">
      <div class="thumb">${coverHtml}</div>
      <h3>${club.name}</h3>
      <p class="muted">${club.desc}</p>
      <div class="chips">
        ${chipHtml}
      </div>
      <div class="toolbar">
        <button class="btn btn-join" data-action="join" data-id="${club.id}" onclick="return window.handleJoinClick('${club.id}', event);">Join Now</button>
      </div>
    </div>`;
  };

  // Navigate to the public club preview page (club.html).
  const goToJoinPage = (clubIdOrClub) => {
    const clubObj = (typeof clubIdOrClub === 'object' && clubIdOrClub) ? clubIdOrClub : null;
    const clubId = normalizeClubId(clubObj?.id ?? clubIdOrClub);
    if (!clubId) return;

    const club =
      clubObj ||
      CLUBS.find(c => normalizeClubId(c.id) === clubId) ||
      { id: clubId };

    try {
      localStorage.setItem('selectedClub', JSON.stringify(club));
    } catch {
      // Ignore storage quota issues.
    }
    rememberClubListReturnState(clubId);
    window.location.href = `club.html?club=${encodeURIComponent(clubId)}`;
  };

  // Render the club list and handle the empty state.
  const render = (list) => {
    if (!list.length) {
      cardsEl.innerHTML = '';
      if (emptyEl) {
        emptyEl.textContent = CLUBS.length ? 'No clubs found.' : 'No clubs yet.';
      }
      emptyEl.style.display = 'block';
    } else {
      emptyEl.style.display = 'none';
      cardsEl.innerHTML = list.map((club, idx) => clubCard(club, idx)).join('');
    }
    restoreClubListReturnState();
  };

  // Modal controls: open the info modal.
  const openInfo = (key) => {
    if (!infoOverlay) return;
    const data = getInfoMap()[key];
    if (!data) return;
    if (infoTitle) infoTitle.textContent = data.title;
    if (infoBody) infoBody.innerHTML = data.body;
    infoOverlay.classList.add('open');
    document.body.classList.add('no-scroll');
  };

  // Modal controls: close the info modal.
  const closeInfo = () => {
    if (!infoOverlay) return;
    infoOverlay.classList.remove('open');
    document.body.classList.remove('no-scroll');
  };

  document.querySelectorAll('.info-trigger').forEach((btn) => {
    btn.addEventListener('click', () => openInfo(btn.dataset.info));
  });
  infoOverlay?.addEventListener('click', (evt) => { if (evt.target === infoOverlay) closeInfo(); });
  infoOverlay?.querySelector('.info-close')?.addEventListener('click', closeInfo);

  // Filter panel controls: toggle the filter surface.
  filterToggle?.addEventListener('click', () => {
    if (!filterSurface) return;
    const open = filterSurface.classList.toggle('open');
    filterToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });

  // 5. Search and filter logic
  const norm = (s) => (s || '').toLowerCase().replace(/\s+/g,'').trim();
  const tagKey = (tag) => norm(tag);

  // Update filter UI state, including active chips and the counter badge.
  const updateFilterUI = () => {
    if (filterPanel) {
      filterPanel.querySelectorAll('.filter-chip').forEach((btn) => {
        btn.classList.toggle('active', selectedTags.includes(btn.dataset.key));
      });
    }
    if (filterToggle) filterToggle.classList.toggle('active', selectedTags.length > 0);
    if (filterCount) {
      if (selectedTags.length) {
        filterCount.style.display = 'inline-flex';
        filterCount.textContent = String(selectedTags.length);
      } else {
        filterCount.style.display = 'none';
      }
    }
  };

  // Render filter chips by collecting and deduplicating tags from all clubs.
  const renderFilterChips = () => {
    if (!filterPanel) return;
    const seen = new Set();
    const tags = [];
    CLUBS.forEach((club) => {
      (club.tags || []).forEach((tag) => {
        const key = tagKey(tag);
        if (!seen.has(key)) {
          seen.add(key);
          tags.push({ key, label: tag });
        }
      });
    });
    tags.sort((a, b) => a.label.localeCompare(b.label));
    filterPanel.innerHTML = tags.map(tag => (
      `<button class="filter-chip" type="button" data-key="${tag.key}"># ${tag.label}</button>`
    )).join('');
    filterPanel.querySelectorAll('.filter-chip').forEach((btn) => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        const idx = selectedTags.indexOf(key);
        if (idx >= 0) {
          selectedTags.splice(idx, 1);
        } else if (selectedTags.length < 2) {
          selectedTags.push(key);
        } else {
          return;
        }
        updateFilterUI();
        filter();
      });
    });
    updateFilterUI();
  };

  // Core filter function combining keyword search and tag filters.
  const filter = () => {
    const q = norm(kwEl?.value);
    const list = CLUBS.filter(c => {
      const hay = norm(c.name) + ' ' + norm((c.tags || []).join(' '));
      const matchText = !q || hay.includes(q);
      const matchTag = !selectedTags.length || (c.tags || []).some(t => selectedTags.includes(tagKey(t)));
      return matchText && matchTag;
    });
    render(list);
  };

  const loadClubs = async () => {
    if (loadingEl) loadingEl.style.display = 'block';
    if (emptyEl) emptyEl.style.display = 'none';
    try {
      const res = await authFetch('/api/clubs');
      if (!res.ok) throw new Error('network');
      const data = await res.json();
      if (Array.isArray(data)) {
        const mapped = data.map((c, idx) => {
          const rawId = c?.id ?? c?.clubId ?? c?.slug;
          const id = normalizeClubId(rawId) || `club-${idx + 1}`;
          return {
            id,
            name: c?.name || c?.title || `Club ${idx + 1}`,
            desc: c?.desc || c?.description || '',
            tags: Array.isArray(c?.tags) && c.tags.length ? c.tags : ['sport'],
            coverUrl: firstNonEmpty(c?.coverUrl, c?.cover, c?.coverImageUrl, c?.imageUrl, c?.thumbnailUrl)
          };
        });
        const withOwnCover = await Promise.all(mapped.map(async (club) => {
          if (club.coverUrl) return club;
          const coverUrl = await fetchClubCoverUrl(club.id);
          return coverUrl ? { ...club, coverUrl } : club;
        }));
        const nameKey = (name) => String(name || '').trim().toLowerCase();
        const coverByName = new Map();
        withOwnCover.forEach((club) => {
          const key = nameKey(club.name);
          if (!key || !club.coverUrl || coverByName.has(key)) return;
          coverByName.set(key, club.coverUrl);
        });
        CLUBS = withOwnCover.map((club) => {
          if (club.coverUrl) return club;
          const fallbackCover = coverByName.get(nameKey(club.name));
          return fallbackCover ? { ...club, coverUrl: fallbackCover } : club;
        });
        return;
      }
    } catch (err) {
      CLUBS = [];
      return;
    } finally {
      if (loadingEl) loadingEl.style.display = 'none';
    }
  };

  const initData = async () => {
    await loadClubs();
    renderFilterChips();
    filter();
  };

  // Delegate tag clicks on cards so users can quick-filter from card content.
  cardsEl?.addEventListener('click', (event) => {
    const chip = event.target.closest('.chip-link');
    if (!chip || !cardsEl.contains(chip)) return;
    const tag = chip.dataset.tag;
    if (!tag) return;
    selectedTags.length = 0;
    selectedTags.push(tagKey(tag));
    updateFilterUI();
    filter();
    if (filterSurface && filterToggle) {
      filterSurface.classList.add('open');
      filterToggle.setAttribute('aria-expanded', 'true');
    }
  });

  // Bind search box events.
  document.getElementById('btnClear')?.addEventListener('click', () => { if (kwEl){ kwEl.value = ''; kwEl.focus(); } filter(); });
  kwEl?.addEventListener('input', filter);
  kwEl?.addEventListener('keydown', (e) => { if (e.key === 'Enter') filter(); });

  // Run the initial filter render after page load.
  initData();
  recalcSearchCardDockThreshold();
});
  </script>
