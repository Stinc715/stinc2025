<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Club Booking Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&display=swap');

  :root {
    --card: #fff;
    --ink: #222;
    --muted: #6B7280;
    --line: #E5E7EB;
    --chip: #F3F4F6;
    --header-height: 72px;
    --anim-base: cubic-bezier(.4, 0, .2, 1);
    --anim-pop: cubic-bezier(.2, .8, .4, 1);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(#fff, #fafafa);
    color: var(--ink);
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    animation: fadeBody .6s var(--anim-base) both;
  }

  header {
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 10;
    border: none;
    box-shadow: none;
  }

  footer {
    border-top: 1px solid var(--line);
    background: #fff;
  }

  header .wrap,
  footer .wrap,
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
  }

  h1 {
    font-size: 22px;
    margin: 0;
  }

  h3 {
    font-size: 15px;
    margin: 8px 0;
  }

  .card h3 {
    font-family: 'Manrope', 'Segoe UI', Arial, sans-serif;
    font-weight: 700;
  }

  .btn {
    border: 1px solid var(--line);
    background: #111;
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition:
      transform .15s ease,
      filter .2s var(--anim-pop);
    box-shadow: none !important;
    outline: none;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: none !important;
  }

  .btn:active {
    transform: translateY(0);
    box-shadow: none !important;
  }

  .btn:focus {
    outline: none;
    box-shadow: none !important;
  }

  .btn:focus-visible {
    outline: none;
    box-shadow: none !important;
  }

  .btn.ghost {
    background: #fff;
    color: #111;
  }

  .btn.blue {
    background: #2563eb;
    border-color: #2563eb;
  }

  .user-menu {
    position: relative;
    display: inline-block;
  }
  .avatar-btn {
    width: 38px;
    height: 38px;
    padding: 0;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: pointer;
    overflow: hidden;
  }
  .avatar-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .avatar-btn span {
    font-size: 13px;
  }

  .user-menu .menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 12px 28px rgba(15, 23, 42, .12);
    padding: 6px 0;
    min-width: 140px;
    z-index: 20;
    opacity: 0;
    transform: translateY(6px) scale(.98);
    visibility: hidden;
    pointer-events: none;
    transition:
      opacity .2s var(--anim-base),
      transform .25s var(--anim-pop),
      visibility 0s linear .25s;
  }

  .user-menu .menu.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    visibility: visible;
    pointer-events: auto;
    transition:
      opacity .2s var(--anim-base),
      transform .25s var(--anim-pop),
      visibility 0s;
  }

  .user-menu .menu button {
    width: 100%;
    background: none;
    border: none;
    padding: 8px 14px;
    text-align: left;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
  }

  .user-menu .menu button:hover {
    background: #f3f4f6;
  }

  .user-menu .menu.open button {
    animation: menuPop .28s var(--anim-pop) both;
  }

  .user-menu .menu.open button:nth-child(2) {
    animation-delay: .08s;
  }

  @keyframes menuPop {
    from {
      opacity: 0;
      transform: translateY(6px) scale(.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, .04);
    transition:
      transform .35s var(--anim-base),
      box-shadow .35s var(--anim-base);
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 32px rgba(15, 23, 42, .14);
  }

  .card .pad {
    padding: 12px;
  }

  .site-title-link {
    color: inherit;
    text-decoration: none;
  }

  .card.club {
    opacity: 0;
    transform: translateY(18px) scale(.98);
    animation: cardIn .65s var(--anim-base) forwards;
    animation-delay: calc(var(--card-index, 0) * 70ms);
  }

  .search-card {
    position: sticky;
    top: calc(var(--header-height) + 12px);
    z-index: 9;
    border: none;
    background: rgba(255, 255, 255, .92);
    backdrop-filter: blur(12px);
    box-shadow: 0 18px 36px rgba(15, 23, 42, .12);
    animation: floatCard 1.2s var(--anim-base) both;
  }

  .search-card .pad {
    padding: 18px 20px;
  }

  .search-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .search-controls {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1 1 50%;
    max-width: 720px;
    min-height: 54px;
    border: 1px solid rgba(148, 163, 184, .35);
    border-radius: 999px;
    padding: 14px 18px;
    background: linear-gradient(180deg, #fff, #f8faff);
    box-shadow: 0 14px 30px rgba(15, 23, 42, .10);
    transition:
      border-color .25s var(--anim-base),
      box-shadow .25s var(--anim-base),
      transform .25s var(--anim-base);
  }

  .search-controls:focus-within {
    border-color: #2563eb;
    box-shadow: 0 16px 32px rgba(37, 99, 235, .18);
    transform: translateY(-1px);
  }

  .search-input-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }

  .search-icon {
    position: relative;
    width: 18px;
    height: 18px;
    border: 2px solid #9CA3AF;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .search-icon::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 2px;
    background: #9CA3AF;
    border-radius: 999px;
    bottom: -3px;
    right: -6px;
    transform: rotate(45deg);
  }

  .search-controls .input {
    flex: 1;
    height: auto;
    border: none;
    padding: 0;
    background: transparent;
    font-size: 15px;
    color: var(--ink);
  }

  .search-controls .input::placeholder {
    color: rgba(107, 114, 128, .88);
  }

  .search-controls .input:focus {
    outline: none;
  }

  .search-controls .btn {
    height: auto;
    border: none;
    background: rgba(37, 99, 235, .12);
    color: #2563eb;
    padding: 8px 18px;
    border-radius: 999px;
    font-weight: 600;
    transition:
      background .2s ease,
      color .2s ease;
  }

  .search-controls .btn:hover {
    background: rgba(37, 99, 235, .22);
    color: #1d4ed8;
  }

  .search-controls .btn:active {
    background: rgba(37, 99, 235, .3);
  }

  .filter-toggle {
    border: 1px solid rgba(148, 163, 184, .35);
    background: linear-gradient(180deg, #fff, #f5f7ff);
    color: var(--ink);
    min-width: 120px;
    height: 54px;
    padding: 0 18px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: .01em;
    cursor: pointer;
    box-shadow: 0 14px 30px rgba(15, 23, 42, .10);
    transition:
      transform .2s var(--anim-base),
      box-shadow .2s var(--anim-base),
      background .2s var(--anim-base);
  }

  .filter-toggle:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 30px rgba(15, 23, 42, .12);
  }

  .filter-toggle.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }

  .filter-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    margin-left: 6px;
    padding: 0 6px;
    border-radius: 999px;
    background: #111;
    color: #fff;
    font-size: 11px;
  }

  .filter-surface {
    display: none;
    margin-top: 12px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 18px;
    padding: 12px 14px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, .08);
  }

  .filter-surface.open {
    display: block;
  }

  .filter-surface__body {
    display: none;
    gap: 10px;
    margin-top: 0;
  }

  .filter-surface.open .filter-surface__body {
    display: grid;
  }

  .filter-panel {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-chip {
    border: 1px solid var(--line);
    background: var(--chip);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: transform .15s var(--anim-base), background .15s var(--anim-base);
  }

  .filter-chip:hover {
    transform: translateY(-1px);
    background: #fff;
  }

  .filter-chip.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }

  input.input {
    width: 100%;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    padding: 0 10px;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 16px;
  }

  @media (min-width: 640px) {
    .cards {
      grid-template-columns: 1fr 1fr;
    }
  }

  .club {
    padding: 8px;
  }

  .thumb {
    position: relative;
    height: clamp(190px, 24vw, 250px);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    background: #f5f7fb;
    display: grid;
    place-items: center;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    background: #fff;
    display: block;
  }

  .thumb-placeholder {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: .02em;
    padding: 0 12px;
  }

  .page {
    padding: 20px 0;
  }

  .muted {
    color: var(--muted);
    font-size: 12px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }

  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .chip {
    background: var(--chip);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 12px;
    cursor: pointer;
    font: inherit;
    appearance: none;
  }

  .chip-link:hover {
    background: #fff;
  }

  .info-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(10, 12, 16, 0.45);
    z-index: 3000;
  }

  .info-overlay.open {
    display: flex;
  }

  .info-card {
    position: relative;
    width: min(560px, 92vw);
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(10, 12, 16, 0.25);
    padding: 20px 20px 18px;
  }

  .info-card h3 {
    margin: 0 0 8px;
    font-size: 18px;
  }

  .info-body p {
    margin: 0 0 10px;
    color: var(--muted);
    font-size: 13px;
  }

  .info-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 30px;
    height: 30px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    cursor: pointer;
    color: var(--muted);
  }

  @keyframes fadeBody {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: none; }
  }

  @keyframes cardIn {
    0% { opacity: 0; transform: translateY(20px) scale(.97); }
    60% { opacity: 1; transform: translateY(-4px) scale(1); }
    100% { opacity: 1; transform: none; }
  }

  @keyframes floatCard {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: none; }
  }

  .empty {
    padding: 16px;
    text-align: center;
    color: var(--muted);
  }

  @media (max-width: 480px) {
    .search-card .pad {
      padding: 14px;
    }

    .search-row {
      flex-direction: column;
      align-items: stretch;
    }

    .search-controls {
      flex-direction: column;
      align-items: stretch;
      padding: 14px;
      max-width: none;
    }

    .search-input-wrap {
      width: 100%;
    }

    .search-icon {
      display: none;
    }

    .search-controls .btn {
      width: 100%;
    }

    .filter-toggle {
      width: 100%;
    }

  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>

<body class="page-with-footer">

  <script>
document.addEventListener('DOMContentLoaded', () => {
  // 1. 布局计算：头部高�?
  // 计算 header 的实际高度，并设�?CSS 变量 --header-height
  // 这确保了 sticky 定位的搜索栏能够正确地吸附在 header 下方，不会被遮挡
  const rootEl = document.documentElement;
  const headerEl = document.querySelector('header');
  const topLink = document.querySelector('.site-title-link');
  const setHeaderH = () => {
    if (headerEl) rootEl.style.setProperty('--header-height', `${headerEl.offsetHeight}px`);
  };
  setHeaderH();
  window.addEventListener('resize', setHeaderH);
  topLink?.addEventListener('click', (event) => {
    event.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // 2. 用户会话管理
  // �?localStorage 读取用户信息，判断当前是未登录、普通用户还是俱乐部管理�?
  const userArea = document.getElementById('userArea');
  let savedUser = null;
  try {
    savedUser = JSON.parse(localStorage.getItem('loggedUser') || 'null');
  } catch {
    localStorage.removeItem('loggedUser');
  }

  const normalizeToken = () => String(localStorage.getItem('token') || '').trim();
  const isJwtSessionValid = (token) => {
    if (!token) return false;
    const parts = token.split('.');
    if (parts.length !== 3) return false;
    try {
      const payloadRaw = parts[1].replace(/-/g, '+').replace(/_/g, '/');
      const normalized = payloadRaw + '='.repeat((4 - (payloadRaw.length % 4)) % 4);
      const payload = JSON.parse(atob(normalized));
      if (typeof payload.exp !== 'number') return true;
      return Date.now() < payload.exp * 1000;
    } catch {
      return false;
    }
  };
  const clearStaleSession = () => {
    localStorage.removeItem('token');
    localStorage.removeItem('loggedUser');
    localStorage.removeItem('user');
  };
  const sessionActive = isJwtSessionValid(normalizeToken());
  if (savedUser && !sessionActive) {
    clearStaleSession();
    savedUser = null;
  }

  // Locked login landing rules:
  // user -> home.html
  // club -> club home.html
  const LOCKED_LOGIN_TARGET = Object.freeze({
    user: 'home.html',
    club: 'club home.html'
  });
  if (savedUser?.type === 'club' && sessionActive) {
    window.location.replace(LOCKED_LOGIN_TARGET.club);
    return;
  }

  const authFetch = (url, options = {}) => {
    const token = localStorage.getItem('token');
    const headers = { ...(options.headers || {}) };
    if (token) headers.Authorization = `Bearer ${token}`;
    return fetch(url, {
      ...options,
      credentials: options.credentials ?? 'include',
      headers
    });
  };

  const AVATAR_STORAGE_KEY_LEGACY = 'profileAvatar';
  const AVATAR_STORAGE_KEY_PREFIX = 'profileAvatar:';

  const getAvatarStorageKey = () => {
    const logged = savedUser || {};
    const type = String(logged.type || logged.role || 'user').trim().toLowerCase() || 'user';
    const email = String(logged.email || '').trim().toLowerCase();
    if (email) return `${AVATAR_STORAGE_KEY_PREFIX}${type}:${email}`;
    const name = String(logged.name || '').trim().toLowerCase();
    if (name) return `${AVATAR_STORAGE_KEY_PREFIX}${type}:${name}`;
    return `${AVATAR_STORAGE_KEY_PREFIX}${type}:anonymous`;
  };

  const parseAvatarStorageValue = (raw) => {
    const text = String(raw || '').trim();
    if (!text) return '';
    try {
      const parsed = JSON.parse(text);
      return typeof parsed === 'string' ? parsed.trim() : '';
    } catch {
      // Backward compatibility: older builds wrote plain URL/text.
      return text;
    }
  };

  const readStoredAvatar = () => {
    const scopedKey = getAvatarStorageKey();
    const scoped = parseAvatarStorageValue(localStorage.getItem(scopedKey));
    return scoped || '';
  };

  const writeStoredAvatar = (avatarUrl) => {
    const normalized = String(avatarUrl || '').trim();
    if (!normalized) return;
    try {
      localStorage.setItem(getAvatarStorageKey(), JSON.stringify(normalized));
      localStorage.removeItem(AVATAR_STORAGE_KEY_LEGACY);
    } catch {}
  };

  const fetchProfile = async () => {
    try {
      const res = await authFetch('/api/profile');
      if (res.ok) return await res.json();
    } catch (err) {
      console.error(err);
    }
    return null;
  };

  // 如果用户已登录，渲染包含“我�?俱乐部”按钮和下拉菜单的用户区�?
  if (savedUser && userArea) {
    const isClub = savedUser.type === 'club';
    const targetHref = isClub ? LOCKED_LOGIN_TARGET.club : 'user.html';
    const avatarData = readStoredAvatar();
    const fallback = (savedUser.name || savedUser.email || (isClub ? 'C' : 'M')).trim().charAt(0).toUpperCase();
    userArea.innerHTML = `
      <div class="user-menu">
        <button id="btnMy" class="avatar-btn" type="button" aria-haspopup="true" aria-expanded="false">
        </button>
        <div class="menu" id="myMenu" role="menu">
          <button type="button" id="btnDetails" role="menuitem">Details</button>
          <button type="button" id="btnLogout" role="menuitem">Logout</button>
        </div>
      </div>`;

    const myBtn = document.getElementById('btnMy');
    const menuEl = document.getElementById('myMenu');
    const setHeaderAvatar = (avatarUrl, letter) => {
      if (!myBtn) return;
      const normalizedAvatar = String(avatarUrl || '').trim();
      myBtn.innerHTML = '';
      if (normalizedAvatar) {
        const img = document.createElement('img');
        img.src = normalizedAvatar;
        img.alt = 'My profile';
        myBtn.appendChild(img);
        return;
      }
      const span = document.createElement('span');
      span.textContent = String(letter || '').trim() || 'M';
      myBtn.appendChild(span);
    };

    setHeaderAvatar(avatarData, fallback);

    fetchProfile().then((profile) => {
      if (!profile || !myBtn) return;
      const avatarUrl = profile.avatarUrl || profile.avatar;
      const displayName = profile.displayName || profile.name || '';
      const email = profile.email || '';
      const letter = (displayName || email || fallback).trim().charAt(0).toUpperCase();
      if (avatarUrl) {
        writeStoredAvatar(avatarUrl);
        setHeaderAvatar(avatarUrl, letter);
      } else if (letter) {
        setHeaderAvatar(readStoredAvatar(), letter);
      }
    });

    const isAvatarStorageKey = (key) =>
      key === AVATAR_STORAGE_KEY_LEGACY
      || (typeof key === 'string' && key.startsWith(AVATAR_STORAGE_KEY_PREFIX));
    window.addEventListener('storage', (evt) => {
      if (!isAvatarStorageKey(evt.key)) return;
      setHeaderAvatar(readStoredAvatar(), fallback);
    });

    // 绑定下拉菜单中的按钮事件
    document.getElementById('btnDetails')?.addEventListener('click', () => { window.location.href = targetHref; });
    document.getElementById('btnLogout')?.addEventListener('click', () => { 
      localStorage.removeItem('loggedUser'); 
      localStorage.removeItem('user'); 
      localStorage.removeItem('selectedClub'); 
      location.reload(); 
    });

    // 控制下拉菜单的显示与隐藏（支持点击和鼠标悬停�?
    const toggleMenu = (open) => {
      const wantOpen = open ?? !menuEl.classList.contains('open');
      menuEl.classList.toggle('open', wantOpen);
      myBtn.setAttribute('aria-expanded', wantOpen ? 'true' : 'false');
    };

    myBtn.addEventListener('click', () => toggleMenu());
    const menuWrap = userArea.querySelector('.user-menu');
    let closeTimer = null;
    const cancelClose = () => {
      if (closeTimer) {
        clearTimeout(closeTimer);
        closeTimer = null;
      }
    };
    const scheduleClose = () => {
      cancelClose();
      closeTimer = setTimeout(() => toggleMenu(false), 600);
    };
    if (menuWrap) {
      menuWrap.addEventListener('mouseenter', () => {
        cancelClose();
        toggleMenu(true);
      });
      menuWrap.addEventListener('mouseleave', scheduleClose);
    }
    document.addEventListener('click', (e) => { if (!userArea.contains(e.target)) toggleMenu(false); });
    [myBtn, menuEl].forEach(el => el.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { toggleMenu(false); myBtn.focus(); }
    }));
  } else {
    const openAuth = (mode) => {
      // 等待 auth-modal.js 加载完成
      if (window.openAuthModal && typeof window.openAuthModal === 'function') {
        window.openAuthModal(mode);
      } else {
        window.location.href = mode === 'register' ? 'login.html#register' : 'login.html#login';
      }
    };
    document.getElementById('btnLogin')?.addEventListener('click', () => openAuth('login'));
    document.getElementById('btnRegister')?.addEventListener('click', () => openAuth('register'));
  }

  // 3. 数据源定�?
  // 本地模拟的俱乐部数据列表。在实际生产环境中，这些数据通常通过 API 从后端获取�?
  const LOCAL_CLUBS = [
    { id:'badminton', name:'Club 1', tags:['badminton'], desc:'Suitable for all levels, regular evening training and friendlies.' },
    { id:'basketball', name:'Club 2', tags:['basketball'], desc:'Varsity training + amateur matches, new members welcome.' },
    { id:'football', name:'Club 3', tags:['football'], desc:'Weekly matches and local tournaments, join our squad!' },
    { id:'yoga', name:'Club 4', tags:['yoga'], desc:'Relax and strengthen your body and mind, small group sessions.' },
    { id:'tennis', name:'Club 5', tags:['tennis'], desc:'Book your court and join tournaments or casual games.' },
    { id:'volleyball', name:'Club 6', tags:['volleyball'], desc:'Indoor and beach volleyball activities for all skill levels.' },
    { id:'cycling', name:'Club 7', tags:['cycling'], desc:'Weekend city rides and countryside cycling challenges.' },
    { id:'swimming', name:'Club 8', tags:['swimming'], desc:'Morning and evening sessions available, professional coach guidance.' },
    { id:'running', name:'Club 9', tags:['running'], desc:'Morning jogs, half marathons, and social running events.' },
    { id:'fitness', name:'Club 10', tags:['fitness'], desc:'State-of-the-art gym equipment and personalized workout plans.' },
    { id:'dance', name:'Club 11', tags:['dance'], desc:'Learn hip-hop, jazz, and modern dance from experienced instructors.' },
    { id:'badminton-east', name:'Club 12', tags:['badminton'], desc:'East campus sessions, beginner friendly with spare rackets.' },
    { id:'badminton-social', name:'Club 13', tags:['badminton'], desc:'Casual games, social mix-ins on Fridays.' },
    { id:'yoga-ii', name:'Club 14', tags:['yoga'], desc:'Intermediate vinyasa and power yoga classes.' },
    { id:'yoga-sunrise', name:'Club 15', tags:['yoga'], desc:'Sunrise outdoor yoga, mats provided.' },
    { id:'football-evening', name:'Club 16', tags:['football'], desc:'Evening league matches, 7-a-side format.' },
    { id:'football-academy', name:'Club 17', tags:['football'], desc:'Skill drills and coaching for developing players.' },
    { id:'tabletennis', name:'Club 18', tags:['table tennis'], desc:'Weekend open training, tables and equipment provided.' },
    { id:'tennis-advanced', name:'Club 19', tags:['tennis'], desc:'Advanced ladder matches and coaching clinics.' },
    { id:'tennis-social', name:'Club 20', tags:['tennis'], desc:'Casual doubles and weekend socials.' }
  ];
  let CLUBS = LOCAL_CLUBS; 

  // 4. ҳ���߼�����Ⱦ
  const cardsEl = document.getElementById('cards');
  const loadingEl = document.getElementById('loading');
  const emptyEl = document.getElementById('empty');
  const kwEl = document.getElementById('kw');
  const filterToggle = document.getElementById('filterToggle');
  const filterSurface = document.getElementById('filterSurface');
  const filterPanel = document.getElementById('filterPanel');
  const filterCount = document.getElementById('filterCount');
  const selectedTags = [];
  const infoOverlay = document.getElementById('infoOverlay');
  const infoTitle = document.getElementById('infoTitle');
  const infoBody = document.getElementById('infoBody');
  
  // 静态信息内容映射（隐私、条款、帮助）
  const infoMap = {
    privacy: {
      title: 'Privacy',
      body: `
        <p>We only store the information needed to manage bookings and memberships.</p>
        <p>Your account data is kept locally in this demo and is not shared with third parties.</p>
        <p>You can request deletion at any time by contacting the admin.</p>
      `
    },
    terms: {
      title: 'Terms',
      body: `
        <p>Bookings are first-come, first-served and subject to club capacity.</p>
        <p>Members must follow club rules and respect facility policies.</p>
        <p>Repeated no-shows may result in booking restrictions.</p>
      `
    },
    help: {
      title: 'Help',
      body: `
        <p>Need assistance? Start by searching for a club and selecting a time slot.</p>
        <p>If you cannot log in, double-check your email and password.</p>
        <p>Contact support at support@example.com for further help.</p>
      `
    }
  };


  // 统一 clubId 为字符串，避�?number/string 混用导致点击无响应或 join 页面识别失败
  const normalizeClubId = (value) => {
    if (value === undefined || value === null) return '';
    return String(value);
  };

  const firstNonEmpty = (...values) => {
    for (const value of values) {
      if (typeof value === 'string' && value.trim()) return value.trim();
    }
    return '';
  };

  const fetchClubCoverUrl = async (clubId) => {
    const id = normalizeClubId(clubId);
    if (!/^\d+$/.test(id)) return '';
    try {
      const res = await authFetch(`/api/clubs/${encodeURIComponent(id)}/images`);
      if (!res.ok) return '';
      const images = await res.json();
      if (!Array.isArray(images) || !images.length) return '';
      const first = images[0] || {};
      return firstNonEmpty(first.url, first.imageUrl, first.src);
    } catch {
      return '';
    }
  };

  // ������������¼δ��¼�û��ļ�����ͼ
  // ���û�δ��¼��� Join ʱ����¼Ŀ����ֲ� ID���Ա��¼���Զ��ض���
  const storeJoinIntent = (clubId) => {
    const key = normalizeClubId(clubId);
    if (!key) return;
    const club = CLUBS.find(c => normalizeClubId(c.id) === key);
    try {
      localStorage.setItem('selectedClub', JSON.stringify(club || { id: key }));
    } catch {
      // Ignore storage quota issues.
    }
  };

  const buildClubReturnTarget = (clubId) => {
    const key = normalizeClubId(clubId);
    return key ? `club.html?club=${encodeURIComponent(key)}` : 'club.html';
  };


  const isLoggedIn = () => {
    const token = normalizeToken();
    let user = null;
    try {
      const parsed = JSON.parse(localStorage.getItem('loggedUser') || 'null');
      user = (parsed && typeof parsed === 'object') ? parsed : null;
    } catch {
      user = null;
    }
    return isJwtSessionValid(token) && !!user;
  };
  const openLoginPrompt = (returnTo = '') => {
    const target = String(returnTo || '').trim();
    if (window.openAuthModal && typeof window.openAuthModal === 'function') {
      window.openAuthModal('login', target);
      return;
    }
    window.location.href = target
      ? `login.html?returnTo=${encodeURIComponent(target)}#login`
      : 'login.html#login';
  };

  // ȫ���¼���������� ��Join Now�� ���
  // ������ֲ�����Ԥ��ҳ��ʵ��Ԥ��ʱ��У���¼״̬
  window.handleJoinClick = function(clubId, event) {
    event?.preventDefault?.();
    event?.stopPropagation?.();
    const key = normalizeClubId(clubId);
    if (!isLoggedIn()) {
      storeJoinIntent(key);
      openLoginPrompt(buildClubReturnTarget(key));
      return false;
    }
    goToJoinPage(key);
    return false;
  };

  // 模板函数：生成单个俱乐部卡片�?HTML 结构
  const clubCard = (club, idx = 0) => {
    const tags = Array.isArray(club.tags) && club.tags.length ? club.tags : ['sport'];
    const chipHtml = tags.map((tag) => (
      `<button class="chip chip-link" type="button" data-tag="${tag}"># ${tag}</button>`
    )).join('');
    const coverHtml = club.coverUrl
      ? `<img src="${club.coverUrl}" alt="${club.name} cover" loading="lazy" decoding="async">`
      : `<span class="thumb-placeholder">No cover image</span>`;
    return `
    <div class="card club" data-id="${club.id}" style="--card-index:${idx};">
      <div class="thumb">${coverHtml}</div>
      <h3>${club.name}</h3>
      <p class="muted">${club.desc}</p>
      <div class="chips">
        ${chipHtml}
      </div>
      <div class="toolbar">
        <button class="btn btn-join" data-action="join" data-id="${club.id}" onclick="return window.handleJoinClick('${club.id}', event);">Join Now</button>
      </div>
    </div>`;
  };

  // 导航函数：跳转到俱乐部公开预览�?(club.html)
  const goToJoinPage = (clubIdOrClub) => {
    const clubObj = (typeof clubIdOrClub === 'object' && clubIdOrClub) ? clubIdOrClub : null;
    const clubId = normalizeClubId(clubObj?.id ?? clubIdOrClub);
    if (!clubId) return;

    const club =
      clubObj ||
      CLUBS.find(c => normalizeClubId(c.id) === clubId) ||
      { id: clubId };

    try {
      localStorage.setItem('selectedClub', JSON.stringify(club));
    } catch {
      // 忽略存储配额问题
    }
    window.location.href = `club.html?club=${encodeURIComponent(clubId)}`;
  };

  // ��Ⱦ�����������ֲ��б���Ⱦ��ҳ�沢�����״̬
  const render = (list) => {
    if (!list.length) {
      cardsEl.innerHTML = '';
      if (emptyEl) {
        emptyEl.textContent = CLUBS.length ? 'No clubs match your keyword.' : 'No clubs available yet.';
      }
      emptyEl.style.display = 'block';
    } else {
      emptyEl.style.display = 'none';
      cardsEl.innerHTML = list.map((club, idx) => clubCard(club, idx)).join('');
    }
  };

  // 弹窗控制：打开信息弹窗
  const openInfo = (key) => {
    if (!infoOverlay) return;
    const data = infoMap[key];
    if (!data) return;
    if (infoTitle) infoTitle.textContent = data.title;
    if (infoBody) infoBody.innerHTML = data.body;
    infoOverlay.classList.add('open');
    document.body.classList.add('no-scroll');
  };

  // 弹窗控制：关闭信息弹�?
  const closeInfo = () => {
    if (!infoOverlay) return;
    infoOverlay.classList.remove('open');
    document.body.classList.remove('no-scroll');
  };

  document.querySelectorAll('.info-trigger').forEach((btn) => {
    btn.addEventListener('click', () => openInfo(btn.dataset.info));
  });
  infoOverlay?.addEventListener('click', (evt) => { if (evt.target === infoOverlay) closeInfo(); });
  infoOverlay?.querySelector('.info-close')?.addEventListener('click', closeInfo);

  // 筛选面板控制：切换筛选面板的显示/隐藏
  filterToggle?.addEventListener('click', () => {
    if (!filterSurface) return;
    const open = filterSurface.classList.toggle('open');
    filterToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });

  // 5. 搜索与筛选逻辑
  const norm = (s) => (s || '').toLowerCase().replace(/\s+/g,'').trim();
  const tagKey = (tag) => norm(tag);

  // 更新筛�?UI 状态（高亮选中标签，更新计数器�?
  const updateFilterUI = () => {
    if (filterPanel) {
      filterPanel.querySelectorAll('.filter-chip').forEach((btn) => {
        btn.classList.toggle('active', selectedTags.includes(btn.dataset.key));
      });
    }
    if (filterToggle) filterToggle.classList.toggle('active', selectedTags.length > 0);
    if (filterCount) {
      if (selectedTags.length) {
        filterCount.style.display = 'inline-flex';
        filterCount.textContent = String(selectedTags.length);
      } else {
        filterCount.style.display = 'none';
      }
    }
  };

  // 渲染筛选标签（Chips）：从所有俱乐部中提取标签，去重并排�?
  const renderFilterChips = () => {
    if (!filterPanel) return;
    const seen = new Set();
    const tags = [];
    CLUBS.forEach((club) => {
      (club.tags || []).forEach((tag) => {
        const key = tagKey(tag);
        if (!seen.has(key)) {
          seen.add(key);
          tags.push({ key, label: tag });
        }
      });
    });
    tags.sort((a, b) => a.label.localeCompare(b.label));
    filterPanel.innerHTML = tags.map(tag => (
      `<button class="filter-chip" type="button" data-key="${tag.key}"># ${tag.label}</button>`
    )).join('');
    filterPanel.querySelectorAll('.filter-chip').forEach((btn) => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        const idx = selectedTags.indexOf(key);
        if (idx >= 0) {
          selectedTags.splice(idx, 1);
        } else if (selectedTags.length < 2) {
          selectedTags.push(key);
        } else {
          return;
        }
        updateFilterUI();
        filter();
      });
    });
    updateFilterUI();
  };

  // 核心过滤函数：结合关键字搜索和标签筛�?
  const filter = () => {
    const q = norm(kwEl?.value);
    const list = CLUBS.filter(c => {
      const hay = norm(c.name) + ' ' + norm((c.tags || []).join(' '));
      const matchText = !q || hay.includes(q);
      const matchTag = !selectedTags.length || (c.tags || []).some(t => selectedTags.includes(tagKey(t)));
      return matchText && matchTag;
    });
    render(list);
  };

  const loadClubs = async () => {
    if (loadingEl) loadingEl.style.display = 'block';
    if (emptyEl) emptyEl.style.display = 'none';
    try {
      const res = await authFetch('/api/clubs');
      if (!res.ok) throw new Error('network');
      const data = await res.json();
      if (Array.isArray(data)) {
        const mapped = data.map((c, idx) => {
          const rawId = c?.id ?? c?.clubId ?? c?.slug;
          const id = normalizeClubId(rawId) || `club-${idx + 1}`;
          return {
            id,
            name: c?.name || c?.title || `Club ${idx + 1}`,
            desc: c?.desc || c?.description || '',
            tags: Array.isArray(c?.tags) && c.tags.length ? c.tags : ['sport'],
            coverUrl: firstNonEmpty(c?.coverUrl, c?.cover, c?.coverImageUrl, c?.imageUrl, c?.thumbnailUrl)
          };
        });
        const withOwnCover = await Promise.all(mapped.map(async (club) => {
          if (club.coverUrl) return club;
          const coverUrl = await fetchClubCoverUrl(club.id);
          return coverUrl ? { ...club, coverUrl } : club;
        }));
        const nameKey = (name) => String(name || '').trim().toLowerCase();
        const coverByName = new Map();
        withOwnCover.forEach((club) => {
          const key = nameKey(club.name);
          if (!key || !club.coverUrl || coverByName.has(key)) return;
          coverByName.set(key, club.coverUrl);
        });
        CLUBS = withOwnCover.map((club) => {
          if (club.coverUrl) return club;
          const fallbackCover = coverByName.get(nameKey(club.name));
          return fallbackCover ? { ...club, coverUrl: fallbackCover } : club;
        });
        return;
      }
    } catch (err) {
      // fallback to local
      CLUBS = LOCAL_CLUBS;
      return;
    } finally {
      if (loadingEl) loadingEl.style.display = 'none';
    }
  };

  const initData = async () => {
    await loadClubs();
    renderFilterChips();
    filter();
  };

  // 事件委托：处理卡片上的标签点击，快速筛�?
  cardsEl?.addEventListener('click', (event) => {
    const chip = event.target.closest('.chip-link');
    if (!chip || !cardsEl.contains(chip)) return;
    const tag = chip.dataset.tag;
    if (!tag) return;
    selectedTags.length = 0;
    selectedTags.push(tagKey(tag));
    updateFilterUI();
    filter();
    if (filterSurface && filterToggle) {
      filterSurface.classList.add('open');
      filterToggle.setAttribute('aria-expanded', 'true');
    }
  });

  // 绑定搜索框事�?
  document.getElementById('btnClear')?.addEventListener('click', () => { if (kwEl){ kwEl.value = ''; kwEl.focus(); } filter(); });
  kwEl?.addEventListener('input', filter);
  kwEl?.addEventListener('keydown', (e) => { if (e.key === 'Enter') filter(); });

  // 页面加载完成后执行一次初始筛选渲�?
  initData();
});
  </script>
