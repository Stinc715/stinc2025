<title>Club Booking Portal - Memberships & Chat Replies</title>
  <link rel="stylesheet" href="theme.css?v=20260402a" />
  <style>
    body { margin: 0; background: #fff; }
    header { background: #fff; border-bottom: 1px solid #eef0f4; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
    .header-wrap {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      padding: 18px 0;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      text-decoration: none;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(29, 29, 31, 0.08);
      transition: color .2s ease, border-color .2s ease, background .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .back-link::before {
      content: '<';
    }
    .back-link:hover {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.96);
      border-color: rgba(100, 116, 139, 0.28);
      box-shadow: 0 12px 22px rgba(29, 29, 31, 0.12);
      transform: translateY(-1px);
    }
    .page-shell {
      min-height: calc(100vh - 72px);
      display: grid;
      gap: 18px;
      align-content: start;
      align-items: start;
      padding: 18px 0 24px;
    }
    .page-shell > .card {
      width: 100%;
    }
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
    }
    .card .pad { padding: 20px; }
    .header-wrap h2,
    .page-shell h1,
    .page-shell h2,
    .page-shell h3 {
      font-family: "Sora", sans-serif;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
    }
    .section-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .toggle-btn {
      min-width: 118px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 18px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .toggle-btn:hover {
      background: #f8fafc;
    }
    .section-body {
      display: grid;
      gap: 0;
    }
    .card.collapsed .section-body {
      display: none;
    }
    .status-box {
      display: none;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .status-box.error {
      display: block;
      border-color: #fecaca;
      background: #fef2f2;
      color: #b91c1c;
    }
    .status-box.success {
      display: block;
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #166534;
    }
    .status-box.info {
      display: block;
    }
    .plan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      align-items: start;
    }
    .plan-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      display: grid;
      gap: 14px;
      background: #fff;
      align-content: start;
      transition: border-color .2s ease, background-color .2s ease, box-shadow .2s ease;
    }
    .plan-card.disabled {
      background: #f8fafc;
      border-style: dashed;
    }
    .plan-card.dirty {
      border-color: #f59e0b;
      background: #fffdf7;
    }
    .plan-card.expanded {
      grid-column: 1 / -1;
      border-color: #c7d2fe;
      box-shadow: 0 18px 40px rgba(99, 102, 241, 0.10);
    }
    .plan-summary {
      display: grid;
      gap: 14px;
    }
    .plan-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .plan-top-meta {
      display: grid;
      gap: 6px;
    }
    .plan-top h3 {
      margin: 0;
      font-size: 18px;
    }
    .plan-summary-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .plan-metric {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 10px 12px;
      background: #f8fafc;
      display: grid;
      gap: 4px;
    }
    .plan-metric-label {
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .plan-metric strong {
      color: #0f172a;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
    }
    .plan-badges {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .plan-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 66px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .plan-badge.secondary {
      background: #f8fafc;
      color: #475569;
      border: 1px solid var(--line);
    }
    .plan-badge.custom {
      background: #ecfeff;
      color: #0f766e;
    }
    .plan-editor {
      display: grid;
      gap: 14px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }
    .plan-editor[hidden] {
      display: none;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .plan-fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .plan-fields .field.name-field {
      grid-column: span 2;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .field.hidden {
      display: none;
    }
    .field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    .field textarea {
      min-height: 84px;
      resize: vertical;
    }
    .field.description-field {
      grid-column: 1 / -1;
    }
    .plan-note-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
    }
    .secondary-btn.compact {
      min-width: 0;
      padding: 10px 14px;
      font-size: 14px;
    }
    .secondary-btn {
      min-width: 118px;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      padding: 12px 18px;
      background: #eef2ff;
      color: #3730a3;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .secondary-btn:hover {
      background: #e0e7ff;
    }
    .secondary-btn.ghost {
      border-color: var(--line);
      background: #fff;
      color: #334155;
    }
    .secondary-btn.ghost:hover {
      background: #f8fafc;
    }
    .secondary-btn.active {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: #3730a3;
    }
    .secondary-btn[disabled] {
      opacity: .55;
      cursor: not-allowed;
    }
    .button-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: inherit;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }
    .secondary-btn.danger {
      border-color: #fecaca;
      background: #fff1f2;
      color: #be123c;
    }
    .secondary-btn.danger:hover {
      background: #ffe4e6;
    }
    .plan-draft-section {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }
    .plan-draft-section[hidden] {
      display: none;
    }
    .plan-list {
      display: grid;
      gap: 14px;
    }
    .plan-list[hidden] {
      display: none;
    }
    .plan-saved-section {
      display: grid;
      gap: 14px;
    }
    .plan-saved-section[hidden] {
      display: none;
    }
    .plan-saved-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .plan-saved-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .kb-draft-section {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }
    .kb-draft-section[hidden] {
      display: none;
    }
    .kb-view-empty {
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 18px;
      color: #64748b;
      background: #f8fafc;
      font-size: 13px;
      line-height: 1.5;
    }
    .kb-draft-list {
      display: grid;
      gap: 14px;
    }
    .kb-draft-list[hidden] {
      display: none;
    }
    .kb-list {
      display: grid;
      gap: 14px;
    }
    .kb-saved-section {
      display: grid;
      gap: 14px;
    }
    .kb-saved-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .kb-saved-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .kb-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      display: grid;
      gap: 14px;
      background: #fff;
      transition: border-color .2s ease, background-color .2s ease;
    }
    .kb-card.dirty {
      border-color: #f59e0b;
      background: #fffdf7;
    }
    .kb-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .kb-card-head h3 {
      margin: 0;
      font-size: 18px;
    }
    .kb-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
    }
    .field.span-full {
      grid-column: 1 / -1;
    }
    .field-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .kb-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .kb-actions-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .plan-save-state {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f8fafc;
      color: #475569;
    }
    .plan-save-state.saved {
      border: 1px solid #dbeafe;
      background: #f8fbff;
      color: #1d4ed8;
    }
    .plan-save-state.dirty {
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: #b45309;
    }
    .plan-toggle-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    .plan-toggle {
      display: inline-flex;
      align-items: center;

      color: var(--ink);

    .plan-toggle input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: #4338ca;
    }
    .plan-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 14px;
      border-top: 1px solid #eef2f7;
    }
    .plan-footer-meta {
      display: inline-flex;
      align-items: center;
    }
    .plan-footer-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .plan-save-btn {
      min-width: 126px;
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .plan-save-btn[disabled] {
      opacity: .6;
      cursor: not-allowed;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    .stat-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      background: #fff;
      display: grid;
      gap: 6px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }
    .member-list {
      display: grid;
      gap: 12px;
    }
    .member-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      background: #fff;
    }
    .member-meta {
      display: grid;
      gap: 6px;
    }
    .member-name {
      font-size: 18px;
      font-weight: 700;
    }
    .member-sub {
      color: var(--muted);
      font-size: 13px;
    }
    .member-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f8fafc;
      color: #334155;
    }
    .pill.active {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #166534;
    }
    .pill.expired {
      border-color: #e5e7eb;
      background: #f8fafc;

    }
    .pill.scheduled {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .empty {
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 18px;
      color: #64748b;
      background: #f8fafc;
    }
    @media (max-width: 980px) {
      .plan-grid,
      .stats-grid,
      .kb-grid { grid-template-columns: 1fr; }
      .plan-card.expanded { grid-column: auto; }

      .plan-fields .field.name-field { grid-column: auto; }

<body class="desktop-consistency desktop-shell--standard desktop-page--club-updates">
  <header>
    <div class="wrap header-wrap desktop-shell-header">
      <div style="display:flex;align-items:center;gap:16px;">
        <button class="back-link desktop-back-link" type="button" onclick="window.location.href='club home.html'" aria-label="Back">Back</button>
      </div>
      <h2 style="margin:0;font-size:18px;font-weight:600;justify-self:center;">Memberships &amp; chat replies</h2>
      <div></div>
    </div>
  </header>

  <main class="wrap page-shell desktop-shell-main desktop-form-shell desktop-card-gap">
    <section class="card" data-section-card="plans">
      <div class="pad">
        <div class="section-head">
          <div>
            <h2>Membership plans</h2>
          </div>
          <div class="section-actions">
            <button class="secondary-btn" id="addCustomPlanBtn" type="button">Add membership plan</button>
            <button class="secondary-btn ghost" id="showSavedPlansBtn" type="button">
              Added plans
              <span class="button-count desktop-badge" id="planSavedCount">0</span>
            </button>
            <button class="toggle-btn" type="button" data-toggle-section="plans" aria-expanded="false">Expand</button>
          </div>
        </div>
        <div class="section-body" data-section-body="plans">
          <div id="statusBox" class="status-box" aria-live="polite"></div>
          <section id="planDraftSection" class="plan-draft-section" aria-label="Add membership plan view">
            <div id="planDraftEmpty" class="kb-view-empty">No draft plan yet.</div>
            <div id="planDraftList" class="plan-list" hidden></div>
          </section>
          <section id="planSavedSection" class="plan-saved-section" aria-label="Added plans">
            <div class="plan-saved-head">
              <span class="plan-saved-label">
                Added plans
                <span class="button-count desktop-badge" id="planSavedInlineCount">0</span>
              </span>
            </div>
            <div id="planSavedList" class="plan-grid"></div>
          </section>
        </div>
      </div>
    </section>

    <section class="card" data-section-card="members">
      <div class="pad">
        <div class="section-head" style="margin-bottom:14px;">
          <div>
            <h2>Club members</h2>
          </div>
          <div class="section-actions">
            <button class="toggle-btn" type="button" data-toggle-section="members" aria-expanded="false">Expand</button>
          </div>
        </div>
        <div class="section-body" data-section-body="members">
          <div id="statsGrid" class="stats-grid"></div>
          <div id="memberList" class="member-list"></div>
        </div>
      </div>
    </section>

    <section class="card" data-section-card="chat-kb">
      <div class="pad">
        <div class="section-head" style="margin-bottom:14px;">
          <div>
            <h2>Chat knowledge base</h2>
          </div>
          <div class="section-actions">
            <button class="secondary-btn" id="addKbEntryBtn" type="button">Add entry</button>
            <button class="secondary-btn ghost" id="showKbSavedBtn" type="button">
              Added entries
              <span class="button-count desktop-badge" id="kbSavedCount">0</span>
            </button>
            <button class="toggle-btn" type="button" data-toggle-section="chat-kb" aria-expanded="false">Expand</button>
          </div>
        </div>
        <div class="section-body" data-section-body="chat-kb">
          <div id="kbStatusBox" class="status-box" aria-live="polite"></div>
          <section id="kbDraftSection" class="kb-draft-section" aria-label="Add entry view">
            <div id="kbDraftEmpty" class="kb-view-empty">No draft entry yet.</div>
            <div id="kbDraftList" class="kb-draft-list" hidden></div>
          </section>
          <section id="kbSavedSection" class="kb-saved-section" aria-label="Added entries">
            <div class="kb-saved-head">
              <span class="kb-saved-label">
                Added entries
                <span class="button-count desktop-badge" id="kbSavedInlineCount">0</span>
              </span>
            </div>
            <div id="kbList" class="kb-list"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script>
    const STANDARD_PLAN_TEMPLATES = Object.freeze([
      { code: 'MONTHLY', name: 'Monthly Pass', durationDays: 30, price: 49, discountPercent: 20, benefitType: 'DISCOUNT', description: 'Ideal for regular weekly bookings.' },
      { code: 'QUARTERLY', name: 'Quarterly Pass', durationDays: 90, price: 129, discountPercent: 45, benefitType: 'DISCOUNT', description: 'Good for players staying for a full season.' },
      { code: 'HALF_YEAR', name: 'Half-year Pass', durationDays: 180, price: 199, discountPercent: 70, benefitType: 'DISCOUNT', description: 'Balanced value for members booking through a half-year block.' },
      { code: 'YEARLY', name: 'Yearly Pass', durationDays: 365, price: 299, discountPercent: 100, benefitType: 'DISCOUNT', description: 'Best value for long-term members.' }
    ]);
    const standardPlanTemplateByCode = new Map(STANDARD_PLAN_TEMPLATES.map((row) => [row.code, row]));

    const statusBoxEl = document.getElementById('statusBox');
    const statsGridEl = document.getElementById('statsGrid');
    const memberListEl = document.getElementById('memberList');
    const addCustomPlanBtnEl = document.getElementById('addCustomPlanBtn');
    const showSavedPlansBtnEl = document.getElementById('showSavedPlansBtn');
    const planSavedCountEl = document.getElementById('planSavedCount');
    const planSavedInlineCountEl = document.getElementById('planSavedInlineCount');
    const planDraftSectionEl = document.getElementById('planDraftSection');
    const planDraftEmptyEl = document.getElementById('planDraftEmpty');
    const planDraftListEl = document.getElementById('planDraftList');
    const planSavedSectionEl = document.getElementById('planSavedSection');
    const planSavedListEl = document.getElementById('planSavedList');
    const kbListEl = document.getElementById('kbList');
    const kbStatusBoxEl = document.getElementById('kbStatusBox');
    const addKbEntryBtnEl = document.getElementById('addKbEntryBtn');
    const showKbSavedBtnEl = document.getElementById('showKbSavedBtn');
    const kbSavedCountEl = document.getElementById('kbSavedCount');
    const kbSavedInlineCountEl = document.getElementById('kbSavedInlineCount');
    const kbDraftSectionEl = document.getElementById('kbDraftSection');
    const kbDraftEmptyEl = document.getElementById('kbDraftEmpty');
    const kbDraftListEl = document.getElementById('kbDraftList');
    const kbSavedSectionEl = document.getElementById('kbSavedSection');
    const sectionCards = Array.from(document.querySelectorAll('[data-section-card]'));

    let activeClubId = null;
    let activeClubName = '';
    let membershipPlanRows = [];
    let membershipPlanDrafts = [];
    const planOriginalPayloadByKey = new Map();
    let membershipPlanDraftCounter = 0;
    let expandedPlanKey = null;
    const openPlanNoteKeys = new Set();
    let planViewMode = 'draft';
    let kbDraftCounter = 0;
    let kbViewMode = 'draft';

    const safeParseJSON = (raw) => {
      try { return JSON.parse(raw); } catch { return null; }
    };

    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const authFetch = (url, options = {}) => {
      const token = localStorage.getItem('token') || '';
      const headers = { ...(options.headers || {}) };
      if (token) headers.Authorization = `Bearer ${token}`;
      return fetch(url, {
        ...options,
        credentials: options.credentials ?? 'include',
        headers
      });
    };

    const gbpCurrency = new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' });
    const formatPrice = (raw) => {
      const num = Number(raw);
      return Number.isFinite(num) ? gbpCurrency.format(num) : gbpCurrency.format(0);
    };

    const formatDate = (raw) => {
      if (!raw) return '--';
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return String(raw);
      return date.toISOString().slice(0, 10);
    };

    const showStatus = (message, type = 'info') => {
      if (!statusBoxEl) return;
      statusBoxEl.textContent = String(message || '').trim();
      statusBoxEl.className = `status-box ${type}`;
      statusBoxEl.style.display = message ? 'block' : 'none';
    };

    const showKbStatus = (message, type = 'info') => {
      if (!kbStatusBoxEl) return;
      kbStatusBoxEl.textContent = String(message || '').trim();
      kbStatusBoxEl.className = `status-box ${type}`;
      kbStatusBoxEl.style.display = message ? 'block' : 'none';
    };

    const syncPlanSavedSummary = (count) => {
      const normalized = Math.max(0, Number(count) || 0);
      if (planSavedCountEl) planSavedCountEl.textContent = String(normalized);
      if (planSavedInlineCountEl) planSavedInlineCountEl.textContent = String(normalized);
      if (showSavedPlansBtnEl) showSavedPlansBtnEl.disabled = normalized === 0;
    };

    const syncPlanDraftListVisibility = () => {
      if (!planDraftListEl) return;
      const hasDraftCards = Boolean(planDraftListEl.querySelector('[data-plan-key]'));
      planDraftListEl.hidden = !hasDraftCards;
      if (planDraftEmptyEl) planDraftEmptyEl.hidden = hasDraftCards;
    };

    const setPlanViewMode = (mode) => {
      planViewMode = mode === 'saved' ? 'saved' : 'draft';
      if (planDraftSectionEl) planDraftSectionEl.hidden = planViewMode !== 'draft';
      if (planSavedSectionEl) planSavedSectionEl.hidden = planViewMode !== 'saved';
      addCustomPlanBtnEl?.classList.toggle('active', planViewMode === 'draft');
      addCustomPlanBtnEl?.classList.toggle('ghost', planViewMode !== 'draft');
      showSavedPlansBtnEl?.classList.toggle('active', planViewMode === 'saved');
      showSavedPlansBtnEl?.classList.toggle('ghost', planViewMode !== 'saved');
    };

    const syncKbSavedSummary = (count) => {
      const normalized = Math.max(0, Number(count) || 0);
      if (kbSavedCountEl) kbSavedCountEl.textContent = String(normalized);
      if (kbSavedInlineCountEl) kbSavedInlineCountEl.textContent = String(normalized);
      if (showKbSavedBtnEl) showKbSavedBtnEl.disabled = normalized === 0;
    };

    const syncKbDraftListVisibility = () => {
      if (!kbDraftListEl) return;
      const hasDraftCards = Boolean(kbDraftListEl.querySelector('[data-kb-id]'));
      kbDraftListEl.hidden = !hasDraftCards;
      if (kbDraftEmptyEl) kbDraftEmptyEl.hidden = hasDraftCards;
    };

    const setKbViewMode = (mode) => {
      kbViewMode = mode === 'saved' ? 'saved' : 'draft';
      if (kbDraftSectionEl) kbDraftSectionEl.hidden = kbViewMode !== 'draft';
      if (kbSavedSectionEl) kbSavedSectionEl.hidden = kbViewMode !== 'saved';
      addKbEntryBtnEl?.classList.toggle('active', kbViewMode === 'draft');
      addKbEntryBtnEl?.classList.toggle('ghost', kbViewMode !== 'draft');
      showKbSavedBtnEl?.classList.toggle('active', kbViewMode === 'saved');
      showKbSavedBtnEl?.classList.toggle('ghost', kbViewMode !== 'saved');
    };

    const normalizeBenefitType = (value) => String(value || '').trim().toUpperCase() === 'BOOKING_PACK' ? 'BOOKING_PACK' : 'DISCOUNT';

    const isBookingPackPlan = (plan) => normalizeBenefitType(plan?.benefitType) === 'BOOKING_PACK';

    const formatPlanBadge = (plan) => {
      const code = String(plan?.planCode || '').toUpperCase();
      if (standardPlanTemplateByCode.has(code)) {
        if (code === 'HALF_YEAR') return 'HALF YEAR';
        return code.replace('LY', '');
      }
      return 'CUSTOM';
    };

    const formatPlanBenefitBadge = (plan) => {
      if (isBookingPackPlan(plan)) {
        const credits = Math.max(0, Math.round(Number(plan?.includedBookings || 0)));
        return `${credits} ${credits === 1 ? 'BOOKING' : 'BOOKINGS'}`;
      }
      const discount = Math.max(0, Math.round(Number(plan?.discountPercent || 0)));
      return discount >= 100 ? 'FREE BOOKING' : `${discount}% OFF`;
    };

    const formatPlanMetricBenefit = (plan) => {
      if (isBookingPackPlan(plan)) {
        const credits = Math.max(0, Math.round(Number(plan?.includedBookings || 0)));
        return `${credits} booking${credits === 1 ? '' : 's'}`;
      }
      const discount = Math.max(0, Math.round(Number(plan?.discountPercent || 0)));
      return discount >= 100 ? 'Free booking' : `${discount}% off`;
    };

    const defaultCustomPlanName = (benefitType) => normalizeBenefitType(benefitType) === 'BOOKING_PACK'
      ? 'Booking Pack'
      : 'Custom Membership';

    const normalizePlanPayload = (payload) => JSON.stringify({
      planId: payload?.planId ?? null,
      planCode: String(payload?.planCode || '').toUpperCase(),
      benefitType: normalizeBenefitType(payload?.benefitType),
      planName: String(payload?.planName || '').trim(),
      price: Number(payload?.price || 0).toFixed(2),
      discountPercent: String(Math.max(0, Math.round(Number(payload?.discountPercent || 0)))),
      includedBookings: String(Math.max(0, Math.round(Number(payload?.includedBookings || 0)))),
      durationDays: String(Math.round(Number(payload?.durationDays || 0))),
      enabled: Boolean(payload?.enabled),
      description: String(payload?.description || '').trim()
    });

    const normalizeKbPayload = (payload) => JSON.stringify({
      questionTitle: String(payload?.questionTitle || '').trim(),
      answerText: String(payload?.answerText || '').trim()
    });

    const syncPlanCardState = (card, dirty) => {
      if (!card) return;
      card.classList.toggle('dirty', Boolean(dirty));
      const stateEl = card.querySelector('[data-plan-save-state]');
      if (stateEl) {
        stateEl.textContent = dirty ? 'Unsaved changes' : 'Saved';
        stateEl.className = `plan-save-state ${dirty ? 'dirty' : 'saved'}`;
      }
      const saveBtn = card.querySelector('[data-save-plan]');
      if (saveBtn && !saveBtn.disabled) {
        saveBtn.textContent = card.getAttribute('data-plan-draft') === 'true'
          ? 'Create plan'
          : (dirty ? 'Save changes' : 'Save plan');
      }
    };

    const setSectionCollapsed = (key, collapsed) => {
      const card = document.querySelector(`[data-section-card="${key}"]`);
      const btn = document.querySelector(`[data-toggle-section="${key}"]`);
      if (!card || !btn) return;
      card.classList.toggle('collapsed', collapsed);
      btn.textContent = collapsed ? 'Expand' : 'Collapse';
      btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      try {
        localStorage.setItem(`clubUpdatesSection:${key}`, collapsed ? 'collapsed' : 'expanded');
      } catch {}
    };

    const initSectionToggles = () => {
      sectionCards.forEach((card) => {
        const key = card.getAttribute('data-section-card');
        if (!key) return;
        setSectionCollapsed(key, true);
      });

      document.querySelectorAll('[data-toggle-section]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const key = btn.getAttribute('data-toggle-section');
          const card = document.querySelector(`[data-section-card="${key}"]`);
          if (!key || !card) return;
          setSectionCollapsed(key, !card.classList.contains('collapsed'));
        });
      });
    };

    const resolveClubId = async () => {
      const loggedUser = safeParseJSON(localStorage.getItem('loggedUser') || 'null');
      if (!loggedUser || String(loggedUser.type || '').toLowerCase() !== 'club') {
        window.location.replace('home.html');
        return null;
      }

      const res = await authFetch('/api/my/clubs');
      if (!res.ok) return null;
      const clubs = await res.json();
      if (!Array.isArray(clubs) || clubs.length === 0) return null;

      const selectedClub = safeParseJSON(localStorage.getItem('selectedClub') || 'null');
      const selectedId = String(selectedClub?.id ?? selectedClub?.clubId ?? '');
      const chosen = clubs.find((club) => String(club?.id ?? club?.clubId ?? '') === selectedId) || clubs[0];
      const clubId = Number(chosen?.id ?? chosen?.clubId);
      if (!Number.isFinite(clubId)) return null;

      activeClubName = String(chosen?.name || chosen?.clubName || `Club #${clubId}`).trim();
      try {
        localStorage.setItem('selectedClub', JSON.stringify({ id: String(clubId), name: activeClubName }));
      } catch {}
      return clubId;
    };

    const buildPlanShape = (raw) => {
      const code = String(raw?.planCode || '').toUpperCase();
      const base = standardPlanTemplateByCode.get(code);
      const benefitType = normalizeBenefitType(raw?.benefitType ?? base?.benefitType);
      return {
        key: String(raw?.key || raw?.draftKey || raw?.planId || code || `draft-${++membershipPlanDraftCounter}`),
        planId: Number.isFinite(Number(raw?.planId)) ? Number(raw.planId) : null,
        planCode: code,
        standardPlan: Boolean(raw?.standardPlan ?? base),
        draft: Boolean(raw?.draft),
        planName: String(raw?.planName || base?.name || '').trim(),
        benefitType,
        durationDays: Number(raw?.durationDays ?? base?.durationDays ?? 0) || 0,
        price: Number(raw?.price ?? base?.price ?? 0) || 0,
        discountPercent: Number(raw?.discountPercent ?? base?.discountPercent ?? 0) || 0,
        includedBookings: Number(raw?.includedBookings ?? 0) || 0,
        enabled: raw?.enabled !== false,
        description: String(raw?.description || base?.description || '').trim()
      };
    };

    const createDraftPlan = () => buildPlanShape({
      draft: true,
      draftKey: `draft-${++membershipPlanDraftCounter}`,
      planCode: '',
      standardPlan: false,
      benefitType: 'DISCOUNT',
      planName: '',
      price: 0,
      discountPercent: 0,
      includedBookings: 10,
      durationDays: 30,
      enabled: false,
      description: ''
    });

    const refreshSavedPlanOriginalPayloads = (plans = []) => {
      const savedPlans = Array.isArray(plans) ? plans.map(buildPlanShape) : [];
      const savedKeys = new Set(savedPlans.map((plan) => String(plan.key || '')));
      const draftKeys = new Set(membershipPlanDrafts.map((plan) => String(buildPlanShape(plan).key || '')));
      Array.from(planOriginalPayloadByKey.keys()).forEach((key) => {
        if (!savedKeys.has(key) && !draftKeys.has(key)) {
          planOriginalPayloadByKey.delete(key);
        }
      });
      savedPlans.forEach((plan) => {
        const key = String(plan.key || '');
        if (!key) return;
        planOriginalPayloadByKey.set(key, normalizePlanPayload(plan));
      });
    };

    const resolvePlanOriginalPayload = (card, payload) => {
      const planKey = String(card?.getAttribute('data-plan-key') || payload?.planId || '');
      if (!planKey) return '';
      const existing = planOriginalPayloadByKey.get(planKey);
      if (typeof existing === 'string') return existing;
      const baseline = buildPlanShape({
        ...payload,
        key: planKey,
        draft: card?.getAttribute('data-plan-draft') === 'true',
        standardPlan: card?.getAttribute('data-plan-standard') === 'true'
      });
      const normalized = normalizePlanPayload(baseline);
      planOriginalPayloadByKey.set(planKey, normalized);
      return normalized;
    };

    const persistPlanCardState = (cardOrKey) => {
      const card = typeof cardOrKey === 'string'
        ? document.querySelector(`[data-plan-key="${CSS.escape(String(cardOrKey))}"]`)
        : cardOrKey;
      if (!card) return null;
      const payload = readPlanPayload(card);
      if (!payload) return null;
      const planKey = String(card.getAttribute('data-plan-key') || '');
      if (!planKey) return payload;
      const nextPlan = buildPlanShape({
        ...payload,
        key: planKey,
        draft: card.getAttribute('data-plan-draft') === 'true',
        standardPlan: card.getAttribute('data-plan-standard') === 'true'
      });
      const replacePlan = (list) => {
        let matched = false;
        const nextList = list.map((item) => {
          if (String(buildPlanShape(item).key || '') !== planKey) return item;
          matched = true;
          return nextPlan;
        });
        return matched ? nextList : [nextPlan, ...list];
      };
      if (nextPlan.draft) {
        membershipPlanDrafts = replacePlan(membershipPlanDrafts);
      } else {
        membershipPlanRows = replacePlan(membershipPlanRows);
      }
      if (!planOriginalPayloadByKey.has(planKey)) {
        planOriginalPayloadByKey.set(planKey, normalizePlanPayload(nextPlan));
      }
      return nextPlan;
    };

    const bindPlanCards = (rootEl) => {
      if (!rootEl) return;
      rootEl.querySelectorAll('[data-plan-key]').forEach((card) => {
        const updateCardState = () => {
          const payload = readPlanPayload(card);
          if (!payload) return;
          persistPlanCardState(card);
          const packPlan = isBookingPackPlan(payload);
          const enabled = payload?.enabled !== false;
          const noteToggleBtn = card.querySelector('[data-toggle-plan-note]');
          const descriptionField = card.querySelector('[data-description-field]');
          card.classList.toggle('disabled', !enabled);
          const code = String(payload?.planCode || card.getAttribute('data-plan-code') || '').toUpperCase();
          const fallbackTitle = standardPlanTemplateByCode.get(code)?.name || defaultCustomPlanName(payload?.benefitType);
          const titleEl = card.querySelector('[data-plan-title]');
          if (titleEl) titleEl.textContent = payload?.planName || fallbackTitle;
          const priceEl = card.querySelector('[data-plan-price]');
          if (priceEl) priceEl.textContent = formatPrice(payload?.price);
          const metricBenefitEl = card.querySelector('[data-plan-summary-benefit]');
          if (metricBenefitEl) metricBenefitEl.textContent = formatPlanMetricBenefit(payload);
          const metricDurationEl = card.querySelector('[data-plan-summary-duration]');
          if (metricDurationEl) metricDurationEl.textContent = `${String(payload?.durationDays || 0)} days`;
          const discountField = card.querySelector('[data-discount-field]');
          const includedField = card.querySelector('[data-included-field]');
          if (discountField) discountField.classList.toggle('hidden', packPlan);
          if (includedField) includedField.classList.toggle('hidden', !packPlan);
          const benefitBadgeEl = card.querySelector('[data-plan-benefit-badge]');
          if (benefitBadgeEl) benefitBadgeEl.textContent = formatPlanBenefitBadge(payload);
          if (noteToggleBtn) {
            const hasNote = Boolean(String(payload?.description || '').trim());
            const noteOpen = descriptionField ? !descriptionField.classList.contains('hidden') : false;
            noteToggleBtn.textContent = noteOpen || hasNote ? 'Edit note' : 'Add note';
          }
          const dirty = payload ? normalizePlanPayload(payload) !== String(card.dataset.originalPayload || '') : false;
          syncPlanCardState(card, dirty);
        };

        const payload = readPlanPayload(card);
        if (payload) card.dataset.originalPayload = resolvePlanOriginalPayload(card, payload);

        card.querySelectorAll('[data-field]').forEach((fieldEl) => {
          const isCheckbox = fieldEl.matches('input[type="checkbox"]');
          fieldEl.addEventListener(isCheckbox ? 'change' : 'input', updateCardState);
          if (!isCheckbox) fieldEl.addEventListener('change', updateCardState);
        });

        updateCardState();
      });

      rootEl.querySelectorAll('[data-save-plan]').forEach((btn) => {
        btn.addEventListener('click', () => saveSinglePlan(btn.closest('[data-plan-key]'), btn));
      });
      rootEl.querySelectorAll('[data-toggle-plan-editor]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const key = String(btn.getAttribute('data-toggle-plan-editor') || '');
          persistPlanCardState(btn.closest('[data-plan-key]'));
          expandedPlanKey = expandedPlanKey === key ? null : key;
          renderPlans();
          if (expandedPlanKey) {
            window.requestAnimationFrame(() => {
              document.querySelector(`[data-plan-key="${CSS.escape(expandedPlanKey)}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
          }
        });
      });
      rootEl.querySelectorAll('[data-toggle-plan-note]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const key = String(btn.getAttribute('data-toggle-plan-note') || '');
          if (!key) return;
          persistPlanCardState(btn.closest('[data-plan-key]'));
          if (openPlanNoteKeys.has(key)) {
            openPlanNoteKeys.delete(key);
          } else {
            openPlanNoteKeys.add(key);
          }
          renderPlans();
          if (openPlanNoteKeys.has(key)) {
            window.requestAnimationFrame(() => {
              document.querySelector(`[data-plan-key="${CSS.escape(key)}"] [data-field="description"]`)?.focus();
            });
          }
        });
      });
      rootEl.querySelectorAll('[data-delete-plan]').forEach((btn) => {
        btn.addEventListener('click', () => deletePlanCard(btn.closest('[data-plan-key]')));
      });
    };

    const renderPlanCards = (targetEl, plans) => {
      if (!targetEl) return;
      const list = Array.isArray(plans) ? plans.map(buildPlanShape) : [];
      if (!list.length) {
        targetEl.innerHTML = '';
        return;
      }

      targetEl.innerHTML = list.map((plan) => {
        const enabled = plan.enabled !== false;
        const packPlan = isBookingPackPlan(plan);
        const planName = plan.planName || (plan.standardPlan
          ? (standardPlanTemplateByCode.get(plan.planCode)?.name || 'Membership')
          : defaultCustomPlanName(plan.benefitType));
        const expanded = String(plan.key) === String(expandedPlanKey);
        const noteOpen = expanded && openPlanNoteKeys.has(String(plan.key));
        return `
          <article class="plan-card ${enabled ? '' : 'disabled'} ${expanded ? 'expanded' : ''}" data-plan-key="${escapeHtml(plan.key)}" data-plan-id="${escapeHtml(plan.planId ?? '')}" data-plan-code="${escapeHtml(plan.planCode || '')}" data-plan-standard="${plan.standardPlan ? 'true' : 'false'}" data-plan-draft="${plan.draft ? 'true' : 'false'}">
            <div class="plan-summary">
              <div class="plan-top">
                <div class="plan-top-meta">
                  <h3 data-plan-title>${escapeHtml(planName)}</h3>
                </div>
                <div class="plan-badges">
                  <div class="plan-badge ${plan.standardPlan ? '' : 'custom'}">${escapeHtml(formatPlanBadge(plan))}</div>
                  <div class="plan-badge secondary" data-plan-benefit-badge>${escapeHtml(formatPlanBenefitBadge(plan))}</div>
                </div>
              </div>
              ${plan.draft ? '' : `
              <div class="plan-toggle-row">
                <label class="plan-toggle">
                  <input type="checkbox" data-field="enabled" ${enabled ? 'checked' : ''} />
                  <span>Enabled for members</span>
                </label>
              </div>`}
              <div class="plan-summary-metrics">
                <div class="plan-metric">
                  <span class="plan-metric-label">Price</span>
                  <strong data-plan-price>${escapeHtml(formatPrice(plan.price))}</strong>
                </div>
                <div class="plan-metric">
                  <span class="plan-metric-label">${packPlan ? 'Credits' : 'Benefit'}</span>
                  <strong data-plan-summary-benefit>${escapeHtml(formatPlanMetricBenefit(plan))}</strong>
                </div>
                <div class="plan-metric">
                  <span class="plan-metric-label">Duration</span>
                  <strong data-plan-summary-duration>${escapeHtml(String(plan.durationDays || 0))} days</strong>
                </div>
              </div>
            </div>
            <div class="plan-editor" ${expanded ? '' : 'hidden'}>
              <div class="plan-fields">
                <div class="field name-field">
                  <label>Plan name</label>
                  <input type="text" data-field="planName" value="${escapeHtml(planName)}" />
                </div>
                <div class="field">
                  <label>Benefit type</label>
                  <select data-field="benefitType">
                    <option value="DISCOUNT" ${packPlan ? '' : 'selected'}>Discount / free booking</option>
                    <option value="BOOKING_PACK" ${packPlan ? 'selected' : ''}>Booking pack</option>
                  </select>
                </div>
                <div class="field">
                  <label>Price</label>
                  <input type="number" min="0" step="0.01" data-field="price" value="${escapeHtml(Number(plan.price || 0).toFixed(2))}" />
                </div>
                <div class="field">
                  <label>Duration days</label>
                  <input type="number" min="1" step="1" data-field="durationDays" value="${escapeHtml(String(plan.durationDays || 30))}" />
                </div>
                <div class="field ${packPlan ? 'hidden' : ''}" data-discount-field>
                  <label>Discount %</label>
                  <input type="number" min="0" max="100" step="1" data-field="discountPercent" value="${escapeHtml(String(Math.max(0, Math.round(Number(plan.discountPercent || 0)))))}" />
                </div>
                <div class="field ${packPlan ? '' : 'hidden'}" data-included-field>
                  <label>Included bookings</label>
                  <input type="number" min="1" step="1" data-field="includedBookings" value="${escapeHtml(String(Math.max(0, Math.round(Number(plan.includedBookings || 0)))))}" />
                </div>
              </div>
              <div class="plan-note-row">
                <button class="secondary-btn ghost compact" type="button" data-toggle-plan-note="${escapeHtml(plan.key)}">${plan.description ? 'Edit note' : 'Add note'}</button>
              </div>
              <div class="field description-field ${noteOpen ? '' : 'hidden'}" data-description-field>
                <label>Optional note</label>
                <textarea data-field="description" placeholder="Shown to members on the club page">${escapeHtml(plan.description || '')}</textarea>
              </div>
            </div>
            <div class="plan-footer">
              <div class="plan-footer-meta">
                <div class="plan-save-state saved" data-plan-save-state>Saved</div>
              </div>
              <div class="plan-footer-actions">
                <button class="secondary-btn ghost" type="button" data-toggle-plan-editor="${escapeHtml(plan.key)}">${expanded ? 'Hide details' : (plan.draft ? 'Set up plan' : 'Edit details')}</button>
                ${expanded && !plan.standardPlan ? `<button class="secondary-btn danger" type="button" data-delete-plan="${escapeHtml(plan.key)}">${plan.draft ? 'Remove draft' : 'Delete plan'}</button>` : ''}
                ${expanded ? `<button class="plan-save-btn" type="button" data-save-plan="${escapeHtml(plan.key)}">${plan.draft ? 'Create plan' : 'Save plan'}</button>` : ''}
              </div>
            </div>
          </article>
        `;
      }).join('');

      bindPlanCards(targetEl);
    };

    const renderPlans = () => {
      const combined = [...membershipPlanRows, ...membershipPlanDrafts];
      const knownPlanKeys = new Set(combined.map((plan) => String(buildPlanShape(plan).key)));
      if (expandedPlanKey && !knownPlanKeys.has(String(expandedPlanKey))) {
        expandedPlanKey = null;
      }
      Array.from(openPlanNoteKeys).forEach((key) => {
        if (!knownPlanKeys.has(String(key))) openPlanNoteKeys.delete(String(key));
      });

      renderPlanCards(planDraftListEl, membershipPlanDrafts);
      renderPlanCards(planSavedListEl, membershipPlanRows);
      syncPlanDraftListVisibility();
      syncPlanSavedSummary(membershipPlanRows.length);

      if (!membershipPlanRows.length && planSavedListEl) {
        planSavedListEl.innerHTML = '<div class="empty">No added plans yet.</div>';
      }
    };

    const readPlanPayload = (cardOrKey) => {
      const card = typeof cardOrKey === 'string'
        ? document.querySelector(`[data-plan-key="${CSS.escape(String(cardOrKey))}"]`)
        : cardOrKey;
      if (!card) return null;
      const read = (field) => card.querySelector(`[data-field="${field}"]`);
      const benefitType = normalizeBenefitType(read('benefitType')?.value);
      return {
        planId: Number.isFinite(Number(card.getAttribute('data-plan-id'))) ? Number(card.getAttribute('data-plan-id')) : null,
        planCode: String(card.getAttribute('data-plan-code') || '').toUpperCase(),
        benefitType,
        planName: String(read('planName')?.value || '').trim(),
        price: Number(read('price')?.value || 0),
        discountPercent: benefitType === 'BOOKING_PACK' ? 0 : Number(read('discountPercent')?.value || 0),
        includedBookings: benefitType === 'BOOKING_PACK' ? Number(read('includedBookings')?.value || 0) : 0,
        durationDays: Number(read('durationDays')?.value || 30),
        enabled: read('enabled') ? Boolean(read('enabled')?.checked) : false,
        description: String(read('description')?.value || '').trim()
      };
    };

    const loadPlans = async () => {
      const res = await authFetch(`/api/my/clubs/${encodeURIComponent(String(activeClubId))}/membership-plans`);
      if (!res.ok) throw new Error('Failed to load membership plans.');
      const data = await res.json();
      membershipPlanRows = Array.isArray(data) ? data : [];
      refreshSavedPlanOriginalPayloads(membershipPlanRows);
      renderPlans();
    };

    const readKbPayload = (card) => {
      if (!card) return null;
      const read = (field) => card.querySelector(`[data-kb-field="${field}"]`);
      return {
        questionTitle: String(read('questionTitle')?.value || '').trim(),
        answerText: String(read('answerText')?.value || '').trim(),
        triggerKeywords: String(read('triggerKeywords')?.value || '')
          .split(/[\r\n,;，；]+/)
          .map((value) => value.trim())
          .filter(Boolean),
        exampleQuestions: String(read('exampleQuestions')?.value || '')
          .split(/[\r\n]+/)
          .map((value) => value.trim())
          .filter(Boolean),
        language: String(read('language')?.value || 'ANY').toUpperCase(),
        priority: Math.max(0, Math.round(Number(read('priority')?.value || 0))),
        enabled: true
      };
    };

    const syncKbCardState = (card) => {
      if (!card) return;
      const payload = readKbPayload(card);
      const dirty = payload ? normalizeKbPayload(payload) !== String(card.dataset.originalPayload || '') : false;
      const stateEl = card.querySelector('[data-kb-save-state]');
      card.classList.toggle('dirty', dirty);
      if (stateEl) {
        stateEl.textContent = dirty ? 'Unsaved changes' : 'Saved';
        stateEl.className = `plan-save-state ${dirty ? 'dirty' : 'saved'}`;
      }
      const titleEl = card.querySelector('[data-kb-card-title]');
      if (titleEl) {
        titleEl.textContent = payload?.questionTitle || 'New chat reply';
      }
    };

    const bindKbCard = (card) => {
      if (!card) return;
      card.querySelectorAll('[data-kb-field]').forEach((fieldEl) => {
        const isCheckbox = fieldEl.matches('input[type="checkbox"]');
        fieldEl.addEventListener(isCheckbox ? 'change' : 'input', () => syncKbCardState(card));
        if (!isCheckbox) fieldEl.addEventListener('change', () => syncKbCardState(card));
      });
      card.querySelector('[data-save-kb]')?.addEventListener('click', () => saveKbEntry(card));
      card.querySelector('[data-delete-kb]')?.addEventListener('click', () => deleteKbEntry(card));
      syncKbCardState(card);
    };

    const renderKbCard = (entry) => {
      const entryId = entry?.id ?? `draft-${++kbDraftCounter}`;
      const questionTitle = String(entry?.questionTitle || '').trim();
      const answerText = String(entry?.answerText || '').trim();
      return `
        <article class="kb-card" data-kb-id="${escapeHtml(String(entryId))}">
          <div class="kb-card-head">
            <div style="display:grid;gap:8px;">
              <h3 data-kb-card-title>${escapeHtml(questionTitle || 'New chat reply')}</h3>
            </div>
            <span class="plan-save-state saved" data-kb-save-state>Saved</span>
          </div>
          <div class="kb-grid">
            <div class="field">
              <label>Question</label>
              <input type="text" data-kb-field="questionTitle" value="${escapeHtml(questionTitle)}" />
            </div>
            <div class="field span-full">
              <label>Standard reply</label>
              <textarea data-kb-field="answerText">${escapeHtml(answerText)}</textarea>
            </div>
          </div>
          <div class="kb-actions">
            <div class="kb-actions-main">
              <button class="secondary-btn danger" type="button" data-delete-kb>Delete</button>
              <button class="plan-save-btn" type="button" data-save-kb>Save reply</button>
            </div>
          </div>
        </article>
      `;
    };

    const renderKbEntries = (entries) => {
      const list = Array.isArray(entries) ? entries : [];
      syncKbSavedSummary(list.length);
      if (!list.length) {
        kbListEl.innerHTML = '<div class="empty">No saved entries yet.</div>';
        return;
      }

      kbListEl.innerHTML = list.map((entry) => renderKbCard(entry)).join('');
      kbListEl.querySelectorAll('[data-kb-id]').forEach((card, index) => {
        const entry = list[index];
        card.dataset.originalPayload = normalizeKbPayload(entry);
        bindKbCard(card);
      });
    };

    const prependKbDraftCard = () => {
      const cardMarkup = renderKbCard({
        id: `draft-${++kbDraftCounter}`,
        questionTitle: '',
        answerText: ''
      });
      if (!kbDraftListEl) return;
      setKbViewMode('draft');
      kbDraftListEl.insertAdjacentHTML('afterbegin', cardMarkup);
      syncKbDraftListVisibility();
      const firstCard = kbDraftListEl.querySelector('[data-kb-id]');
      if (firstCard) {
        firstCard.dataset.originalPayload = '';
        bindKbCard(firstCard);
        firstCard.querySelector('[data-kb-field="questionTitle"]')?.focus();
      }
      setSectionCollapsed('chat-kb', false);
    };

    const loadChatKb = async () => {
      const res = await authFetch(`/api/my/clubs/${encodeURIComponent(String(activeClubId))}/chat-kb`);
      if (!res.ok) throw new Error('Failed to load chat knowledge base.');
      const data = await res.json();
      renderKbEntries(Array.isArray(data) ? data : []);
    };

    const readApiErrorMessage = async (res, fallback) => {
      const defaultMessage = fallback || 'Request failed.';
      if (!res) return defaultMessage;
      const contentType = String(res.headers?.get?.('content-type') || '').toLowerCase();
      if (contentType.includes('application/json')) {
        const data = await res.json().catch(() => null);
        if (data && typeof data.message === 'string' && data.message.trim()) return data.message.trim();
        if (data && typeof data.error === 'string' && data.error.trim()) return data.error.trim();
      }
      const text = await res.text().catch(() => '');
      if (text) {
        try {
          const parsed = JSON.parse(text);
          if (parsed && typeof parsed.message === 'string' && parsed.message.trim()) return parsed.message.trim();
          if (parsed && typeof parsed.error === 'string' && parsed.error.trim()) return parsed.error.trim();
        } catch (_) {
          return text;
        }
      }
      return defaultMessage;
    };

    const saveKbEntry = async (card) => {
      const payload = readKbPayload(card);
      if (!payload) return;
      if (!payload.questionTitle) {
        showKbStatus('Question is required.', 'error');
        card.querySelector('[data-kb-field="questionTitle"]')?.focus();
        return;
      }
      if (!payload.answerText) {
        showKbStatus('Standard reply is required.', 'error');
        card.querySelector('[data-kb-field="answerText"]')?.focus();
        return;
      }

      const saveBtn = card.querySelector('[data-save-kb]');
      const entryId = String(card.getAttribute('data-kb-id') || '');
      const isDraft = entryId.startsWith('draft-');
      showKbStatus('');
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
      }

      try {
        const res = await authFetch(isDraft
          ? `/api/my/clubs/${encodeURIComponent(String(activeClubId))}/chat-kb`
          : `/api/my/clubs/${encodeURIComponent(String(activeClubId))}/chat-kb/${encodeURIComponent(entryId)}`, {
          method: isDraft ? 'POST' : 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          throw new Error(await readApiErrorMessage(res, 'Failed to save chat reply.'));
        }
        if (isDraft) {
          card.remove();
          syncKbDraftListVisibility();
        }
        await loadChatKb();
        showKbStatus(`${payload.questionTitle} saved for ${activeClubName || 'this club'}.`, 'success');
      } catch (err) {
        console.error(err);
        showKbStatus(err?.message || 'Failed to save chat reply.', 'error');
      } finally {
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save reply';
        }
      }
    };

    const deleteKbEntry = async (card) => {
      const entryId = String(card?.getAttribute('data-kb-id') || '');
      if (!entryId) return;
      if (entryId.startsWith('draft-')) {
        card.remove();
        syncKbDraftListVisibility();
        showKbStatus('Draft chat reply removed.', 'success');
        return;
      }

      showKbStatus('');
      try {
        const res = await authFetch(`/api/my/clubs/${encodeURIComponent(String(activeClubId))}/chat-kb/${encodeURIComponent(entryId)}`, {
          method: 'DELETE'
        });
        if (!res.ok) {
          throw new Error(await readApiErrorMessage(res, 'Failed to delete chat reply.'));
        }
        await loadChatKb();
        showKbStatus('Chat reply deleted.', 'success');
      } catch (err) {
        console.error(err);
        showKbStatus(err?.message || 'Failed to delete chat reply.', 'error');
      }
    };

    const memberStatusClass = (status) => {
      const key = String(status || '').toLowerCase();
      if (key === 'active') return 'active';
      if (key === 'scheduled') return 'scheduled';
      return 'expired';
    };

    const renderMembers = (items) => {
      const list = Array.isArray(items) ? items : [];
      const counts = {
        total: list.length,
        active: list.filter((row) => String(row?.status || '').toUpperCase() === 'ACTIVE').length,
        scheduled: list.filter((row) => String(row?.status || '').toUpperCase() === 'SCHEDULED').length,
        expired: list.filter((row) => ['EXPIRED', 'EXHAUSTED'].includes(String(row?.status || '').toUpperCase())).length
      };

      statsGridEl.innerHTML = `
        <div class="stat-card"><span class="stat-label">Total passes</span><span class="stat-value">${counts.total}</span></div>
        <div class="stat-card"><span class="stat-label">Active</span><span class="stat-value">${counts.active}</span></div>
        <div class="stat-card"><span class="stat-label">Scheduled</span><span class="stat-value">${counts.scheduled}</span></div>
        <div class="stat-card"><span class="stat-label">Expired</span><span class="stat-value">${counts.expired}</span></div>
      `;

      if (!list.length) {
        memberListEl.innerHTML = '<div class="empty">No members yet.</div>';
        return;
      }

      memberListEl.innerHTML = list.map((member) => {
        const packPlan = normalizeBenefitType(member?.benefitType) === 'BOOKING_PACK';
        const benefitPill = packPlan
          ? `${Math.max(0, Number(member?.remainingBookings || 0))}/${Math.max(0, Number(member?.includedBookings || 0))} credits left`
          : `${escapeHtml(String(member?.discountPercent ?? 0))}% off`;
        return `
        <article class="member-card">
          <div class="member-meta">
            <div class="member-name">${escapeHtml(member?.memberName || member?.email || `User #${member?.userId ?? '--'}`)}</div>
            <div class="member-sub">${escapeHtml(member?.email || '')}</div>
            <div class="member-sub">${escapeHtml(member?.planName || 'Membership')} • ${escapeHtml(formatDate(member?.startDate))} to ${escapeHtml(formatDate(member?.endDate))}</div>
          </div>
          <div class="member-right">
            <span class="pill">${escapeHtml(formatPrice(member?.planPrice))}</span>
            <span class="pill">${escapeHtml(benefitPill)}</span>
            <span class="pill ${memberStatusClass(member?.status)}">${escapeHtml(member?.status || 'ACTIVE')}</span>
          </div>
        </article>
      `;
      }).join('');
    };

    const loadMembers = async () => {
      const res = await authFetch(`/api/my/clubs/${encodeURIComponent(String(activeClubId))}/memberships`);
      if (!res.ok) throw new Error('Failed to load club memberships.');
      const data = await res.json();
      renderMembers(Array.isArray(data) ? data : []);
    };

    const saveSinglePlan = async (card, buttonEl) => {
      const payload = readPlanPayload(card);
      if (!payload || !buttonEl || !card) return;
      const isDraft = card.getAttribute('data-plan-draft') === 'true';
      showStatus('');
      buttonEl.disabled = true;
      buttonEl.textContent = 'Saving...';
      try {
        const res = await authFetch(`/api/my/clubs/${encodeURIComponent(String(activeClubId))}/membership-plans${isDraft ? '' : ''}`, {
          method: isDraft ? 'POST' : 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(isDraft ? payload : [payload])
        });
        if (!res.ok) {
          throw new Error(await readApiErrorMessage(res, 'Failed to save membership plans.'));
        }
        if (isDraft) {
          const draftKey = String(card.getAttribute('data-plan-key') || '');
          membershipPlanDrafts = membershipPlanDrafts.filter((item) => String(item?.key || '') !== draftKey);
          openPlanNoteKeys.delete(draftKey);
          planOriginalPayloadByKey.delete(draftKey);
        }
        await loadPlans();
        if (isDraft) {
          setPlanViewMode('saved');
          showStatus(`${payload.planName || 'Membership plan'} created. Manage it from Added plans.`, 'success');
        } else {
          showStatus(`${payload.planName || 'Membership plan'} saved.`, 'success');
        }
      } catch (err) {
        console.error(err);
        showStatus(err?.message || 'Failed to save membership plans.', 'error');
      } finally {
        buttonEl.disabled = false;
        const payloadAfter = readPlanPayload(card);
        const dirtyAfter = card && payloadAfter
          ? normalizePlanPayload(payloadAfter) !== String(card.dataset.originalPayload || '')
          : false;
        syncPlanCardState(card, dirtyAfter);
      }
    };

    const deletePlanCard = async (card) => {
      if (!card) return;
      const isDraft = card.getAttribute('data-plan-draft') === 'true';
      const planKey = String(card.getAttribute('data-plan-key') || '');
      if (isDraft) {
        membershipPlanDrafts = membershipPlanDrafts.filter((item) => String(item?.key || '') !== planKey);
        if (expandedPlanKey === planKey) expandedPlanKey = null;
        openPlanNoteKeys.delete(planKey);
        planOriginalPayloadByKey.delete(planKey);
        renderPlans();
        showStatus('Draft plan removed.', 'success');
        return;
      }

      const planId = Number(card.getAttribute('data-plan-id'));
      if (!Number.isFinite(planId)) return;
      showStatus('');
      try {
        const res = await authFetch(`/api/my/clubs/${encodeURIComponent(String(activeClubId))}/membership-plans/${encodeURIComponent(String(planId))}`, {
          method: 'DELETE'
        });
        if (!res.ok) {
          throw new Error(await readApiErrorMessage(res, 'Failed to delete membership plan.'));
        }
        if (expandedPlanKey === planKey) expandedPlanKey = null;
        openPlanNoteKeys.delete(planKey);
        planOriginalPayloadByKey.delete(planKey);
        await loadPlans();
        showStatus('Membership plan deleted.', 'success');
      } catch (err) {
        console.error(err);
        showStatus(err?.message || 'Failed to delete membership plan.', 'error');
      }
    };

    addCustomPlanBtnEl?.addEventListener('click', () => {
      showStatus('');
      setPlanViewMode('draft');
      const draft = createDraftPlan();
      membershipPlanDrafts = [draft, ...membershipPlanDrafts];
      planOriginalPayloadByKey.set(String(draft.key || ''), normalizePlanPayload(draft));
      expandedPlanKey = draft.key;
      openPlanNoteKeys.delete(draft.key);
      renderPlans();
      setSectionCollapsed('plans', false);
      window.requestAnimationFrame(() => {
        document.querySelector('[data-plan-draft="true"] [data-field="planName"]')?.focus();
      });
    });

    showSavedPlansBtnEl?.addEventListener('click', () => {
      showStatus('');
      setPlanViewMode('saved');
      setSectionCollapsed('plans', false);
      window.requestAnimationFrame(() => {
        planSavedSectionEl?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    addKbEntryBtnEl?.addEventListener('click', () => {
      showKbStatus('');
      prependKbDraftCard();
    });

    showKbSavedBtnEl?.addEventListener('click', () => {
      showKbStatus('');
      setKbViewMode('saved');
      setSectionCollapsed('chat-kb', false);
      window.requestAnimationFrame(() => {
        kbSavedSectionEl?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    initSectionToggles();
    setPlanViewMode('draft');
    syncPlanDraftListVisibility();
    setKbViewMode('draft');
    syncKbDraftListVisibility();

    (async () => {
      try {
        activeClubId = await resolveClubId();
        if (!activeClubId) {
          showStatus('No club is available for this account.', 'error');
          if (planDraftEmptyEl) {
            planDraftEmptyEl.textContent = 'No club found.';
            planDraftEmptyEl.hidden = false;
          }
          if (planDraftListEl) planDraftListEl.innerHTML = '';
          if (planSavedListEl) planSavedListEl.innerHTML = '<div class="empty">No club found.</div>';
          memberListEl.innerHTML = '<div class="empty">No club found.</div>';
          kbListEl.innerHTML = '<div class="empty">No club found.</div>';
          return;
        }

        await Promise.all([loadPlans(), loadMembers(), loadChatKb()]);
      } catch (err) {
        console.error(err);
        showStatus(err?.message || 'Failed to load memberships.', 'error');
        showKbStatus(err?.message || 'Failed to load chat knowledge base.', 'error');
        if (planDraftEmptyEl && !planDraftListEl?.querySelector('[data-plan-key]')) {
          planDraftEmptyEl.textContent = 'Unable to load membership plans.';
          planDraftEmptyEl.hidden = false;
        }
        if (planSavedListEl && !planSavedListEl.innerHTML) planSavedListEl.innerHTML = '<div class="empty">Unable to load membership plans.</div>';
        if (!memberListEl.innerHTML) memberListEl.innerHTML = '<div class="empty">Unable to load club memberships.</div>';
        if (!kbListEl.innerHTML) kbListEl.innerHTML = '<div class="empty">Unable to load chat knowledge base.</div>';
      }
    })();
  </script>
</body>
</html>
