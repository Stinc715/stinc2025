<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Club Booking Portal - Member Bookings</title>
  <link rel="stylesheet" href="theme.css?v=20260220b">
  <style>
    body { margin: 0; background: var(--bg); }
    header { 
      position: sticky; 
      top: 0; 
      z-index: 10; 
      border-bottom: 1px solid rgba(15, 23, 42, 0.06); 
      background: #fff;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .header-wrap { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      gap: 12px; 
    }
    .header-actions { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #0066cc;
      text-decoration: none;
      border: none;
      background: none;
      cursor: pointer;
      padding: 8px 0;
    }
    .site-title-link { 
      color: inherit; 
      text-decoration: none; 
      font-weight: 700;
    }
    .page-head { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      gap: 16px; 
      margin: 20px 0 16px; 
      flex-wrap: wrap;
    }
    .page-head h2 { 
      margin: 0; 
      font-size: 28px;
    }
    .page-head p { 
      margin: 4px 0 0; 
      color: var(--muted);
    }
    .card .pad { padding: 16px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat-card { border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: #fff; }
    .stat-label { display: block; font-size: 12px; color: var(--muted); }
    .stat-value { display: block; font-size: 20px; font-weight: 700; margin-top: 4px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .filter-btn { 
      border: none; 
      background: transparent; 
      color: var(--muted); 
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .filter-btn:hover {
      background: rgba(15, 23, 42, 0.06);
      color: var(--ink);
    }
    .filter-btn.active { 
      background: #2563eb;
      color: #fff;
    }
    .list { margin-top: 16px; display: grid; gap: 12px; }
    .booking-card { 
      padding: 16px;
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 14px;
      transition: all 0.2s ease;
    }
    .booking-card:hover {
      border-color: rgba(15, 23, 42, 0.12);
      background: #fafbfc;
    }
    .booking-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
    }
    .booking-meta { display: grid; gap: 4px; }
    .booking-right {
      display: flex;
      align-items: center;
      justify-self: end;
    }
    .members-menu {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
    }
    .members-menu > summary {
      list-style: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .members-menu > summary::-webkit-details-marker { display: none; }
    .members-menu > summary::before {
      content: "\25B8";
      font-size: 12px;
      line-height: 1;
      transition: transform 0.16s ease;
    }
    .members-menu[open] > summary::before {
      transform: rotate(90deg);
    }
    .members-list {
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }
    .member-line {
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      background: #fff;
    }
    .member-line-main {
      display: grid;
      gap: 4px;
    }
    .member-line-name {
      font-weight: 700;
      color: var(--ink);
    }
    .member-line-pills {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .member-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #334155;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      padding: 5px 8px;
    }
    .member-pill.active {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #166534;
    }
    .member-pill.expired {
      border-color: #e2e8f0;
      background: #f8fafc;
      color: #64748b;
    }
    .status { 
      font-size: 12px; 
      font-weight: 600; 
      padding: 6px 12px; 
      border-radius: 8px; 
      border: none;
      text-align: left;
      width: 100px;
      display: inline-block;
    }
    .status.pending { background: #fef3c7; color: #b45309; }
    .status.approved { background: #dcfce7; color: #16a34a; }
    .status.checked { background: #dbeafe; color: #2563eb; }
    .status.cancelled { background: #fee2e2; color: #dc2626; }
    .booking-title { font-weight: 700; font-size: 15px; }
    .booking-sub { color: var(--muted); font-size: 13px; }
    .group-section {
      margin-bottom: 24px;
    }
    .group-header {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 8px;
      color: var(--ink);
    }
    .group-list {
      display: grid;
      gap: 12px;
    }
    .btn {
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: #f1f3f5;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .btn:hover {
      background: #e3e6e9;
      transform: translateY(0);
      box-shadow: none;
    }
    .btn:active {
      background: #d4d8dc;
      transform: translateY(0);
      box-shadow: none;
    }
    .btn.blue {
      background: #f1f3f5;
      color: #1e293b;
    }
    .btn.blue:hover {
      background: #e3e6e9;
      box-shadow: none;
    }
    .btn.approve {
      background: #f1f3f5;
      color: #1e293b;
    }
    .btn.approve:hover {
      background: #e3e6e9;
      box-shadow: none;
    }
    .btn.checkin {
      background: #f1f3f5;
      color: #1e293b;
    }
    .btn.checkin:hover {
      background: #e3e6e9;
      box-shadow: none;
    }
    .btn.cancel {
      background: #f1f3f5;
      color: #1e293b;
    }
    .btn.cancel:hover {
      background: #e3e6e9;
      box-shadow: none;
    }
    .btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(15, 23, 42, 0.1);
    }
    .btn.ghost:hover {
      color: var(--ink);
      background: rgba(15, 23, 42, 0.04);
    }
    .btn.small { padding: 6px 12px; font-size: 12px; }
    .info-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(10, 12, 16, 0.45);
      z-index: 3000;
    }
    .info-overlay.open { display: flex; }
    .info-card {
      position: relative;
      width: min(560px, 92vw);
      background: #fff;
      border-radius: 16px;
      box-shadow: none;
      padding: 20px 20px 18px;
    }
    .info-card h3 { margin: 0 0 8px; font-size: 18px; }
    .info-body p { margin: 0 0 10px; color: var(--muted); font-size: 13px; }
    .info-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      color: var(--muted);
    }
    @media (max-width: 720px) {
      .booking-main {
        grid-template-columns: 1fr;
        align-items: flex-start;
      }
      .booking-right {
        justify-self: start;
      }
      .header-actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body class="page-with-footer">
  <header>
    <div class="wrap header-wrap" style="display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px;">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="back-link" onclick="window.location.href = 'club home.html'" type="button" aria-label="Back">&larr; Back</button>
      </div>
      <h2 style="margin: 0; font-size: 18px; font-weight: 600; justify-self: center;">Member bookings</h2>
      <div class="header-actions" style="justify-self: end;">
        <button id="refreshBtn" class="btn" type="button" style="min-width:100px">Refresh</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="pad">
        <div class="stat-grid" id="stats">
          <div class="stat-card">
            <span class="stat-label">Pending</span>
            <span class="stat-value" data-stat="pending">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Approved</span>
            <span class="stat-value" data-stat="approved">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Checked-in</span>
            <span class="stat-value" data-stat="checked">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Cancelled</span>
            <span class="stat-value" data-stat="cancelled">0</span>
          </div>
        </div>

        <div id="sportTypeFilter" style="display: none; margin-top: 12px;">
          <span style="font-size: 13px; font-weight: 600; color: var(--muted);">Sport type:</span>
          <div class="filter-row" style="margin-top: 8px;">
            <button class="btn ghost filter-btn active" type="button" data-sport="all">All</button>
            <button class="btn ghost filter-btn" type="button" data-sport="basketball">Basketball</button>
            <button class="btn ghost filter-btn" type="button" data-sport="tabletennis">Table Tennis</button>
          </div>
        </div>
      </div>
    </section>

    <div class="list" id="bookingList"></div>
    <div class="list" id="groupedView" style="display: none;"></div>
    <div id="empty" class="muted" style="display:none;padding:12px;">No bookings found.</div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__wrap">
      <span class="site-footer__text">&copy; 2026 Club Booking Portal</span>
      <div class="site-footer__actions">
        <button class="site-footer__btn info-trigger" type="button" data-info="privacy">Privacy</button>
        <button class="site-footer__btn info-trigger" type="button" data-info="terms">Terms</button>
        <button class="site-footer__btn info-trigger" type="button" data-info="help">Help</button>
      </div>
    </div>
  </footer>

  <div id="infoOverlay" class="info-overlay" aria-hidden="true">
    <div class="info-card" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
      <button class="info-close" type="button" aria-label="Close">&times;</button>
      <h3 id="infoTitle">Privacy</h3>
      <div id="infoBody" class="info-body"></div>
    </div>
  </div>

  <script>
    const listEl = document.getElementById('bookingList');
    const groupedView = document.getElementById('groupedView');
    const emptyEl = document.getElementById('empty');
    const sportTypeFilter = document.getElementById('sportTypeFilter');
    const refreshBtn = document.getElementById('refreshBtn');

    let slotBookings = [];
    let activeClubId = null;

    const safeParseJSON = (raw) => {
      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    };

    const authFetch = (url, options = {}) => {
      const token = localStorage.getItem('token');
      const headers = { ...(options.headers || {}) };
      if (token) headers.Authorization = `Bearer ${token}`;
      return fetch(url, {
        ...options,
        credentials: options.credentials ?? 'include',
        headers
      });
    };

    const localDateISO = (d) => {
      const tzOffset = d.getTimezoneOffset() * 60000;
      return new Date(d.getTime() - tzOffset).toISOString().slice(0, 10);
    };

    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const formatDateTime = (iso) => {
      if (!iso || typeof iso !== 'string') return '--';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${y}-${m}-${day} ${hh}:${mm}`;
    };

    const formatPrice = (raw) => {
      const n = Number(raw);
      if (!Number.isFinite(n)) return 'GBP 0.00';
      return `GBP ${n.toFixed(2)}`;
    };

    const statusKey = (status) => {
      const s = String(status || '').trim().toLowerCase();
      if (s === 'approved') return 'approved';
      if (s === 'checked' || s === 'checked-in' || s === 'checkin') return 'checked';
      if (s === 'cancelled' || s === 'canceled') return 'cancelled';
      return 'pending';
    };

    const statusLabel = (status) => ({
      pending: 'Pending',
      approved: 'Approved',
      checked: 'Checked-in',
      cancelled: 'Cancelled'
    }[status] || 'Pending');

    const resolveClubId = async () => {
      const loggedUser = safeParseJSON(localStorage.getItem('loggedUser') || 'null');
      if (!loggedUser || String(loggedUser.type || '').toLowerCase() !== 'club') {
        window.location.href = 'login.html#login';
        return null;
      }

      try {
        const res = await authFetch('/api/my/clubs');
        if (!res.ok) return null;
        const clubs = await res.json();
        if (!Array.isArray(clubs) || clubs.length === 0) return null;
        const selectedClub = safeParseJSON(localStorage.getItem('selectedClub') || 'null');
        const selectedId = String(selectedClub && (selectedClub.id ?? selectedClub.clubId) || '');

        const chosen = clubs.find((c) => String(c.id ?? c.clubId) === selectedId) || clubs[0];
        const id = chosen.id ?? chosen.clubId;
        if (!/^[0-9]+$/.test(String(id || ''))) return null;
        try {
          localStorage.setItem('selectedClub', JSON.stringify({
            id: String(id),
            name: chosen.name || `Club #${id}`
          }));
        } catch {}
        return Number(id);
      } catch (err) {
        console.error(err);
        return null;
      }
    };

    const loadSlotBookings = async () => {
      if (!activeClubId) return [];
      const start = new Date();
      const from = localDateISO(start);
      const to = localDateISO(new Date(start.getTime() + 14 * 24 * 60 * 60 * 1000));
      const res = await authFetch(`/api/clubs/${encodeURIComponent(String(activeClubId))}/timeslot-bookings?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(text || `Failed to load bookings (${res.status})`);
      }
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    };

    const renderStats = (slots) => {
      const counts = { pending: 0, approved: 0, checked: 0, cancelled: 0 };
      slots.forEach((slot) => {
        (slot.members || []).forEach((m) => {
          const key = statusKey(m?.status);
          if (counts[key] !== undefined) counts[key] += 1;
        });
      });
      Object.keys(counts).forEach((key) => {
        const el = document.querySelector(`[data-stat="${key}"]`);
        if (el) el.textContent = String(counts[key]);
      });
    };

    const memberText = (member) => {
      const name = String(member?.name || '').trim();
      const email = String(member?.email || '').trim();
      if (name && email) return `${name} (${email})`;
      if (name) return name;
      if (email) return email;
      return `User #${member?.userId ?? '--'}`;
    };

    const membershipStatusClass = (status) => {
      return String(status || '').trim().toUpperCase() === 'ACTIVE' ? 'active' : 'expired';
    };

    const renderSlotCard = (slot) => {
      const venue = escapeHtml(slot?.venueName || 'Venue');
      const start = formatDateTime(slot?.startTime);
      const end = formatDateTime(slot?.endTime);
      const timeLabel = `${escapeHtml(start)} - ${escapeHtml(end.split(' ')[1] || '')}`.trim();
      const booked = Number(slot?.bookedCount);
      const cap = Number(slot?.maxCapacity);
      const capLabel = Number.isFinite(booked) && Number.isFinite(cap) ? `${booked}/${cap}` : '--';
      const priceLabel = escapeHtml(formatPrice(slot?.price));
      const members = Array.isArray(slot?.members) ? slot.members : [];
      const membersHtml = members.length
        ? members.map((m) => {
            const membershipPlan = String(m?.membershipPlanName || '').trim();
            const membershipStatus = String(m?.membershipStatus || '').trim();
            const pricePaid = escapeHtml(formatPrice(m?.pricePaid));
            return `
              <div class="member-line">
                <div class="member-line-main">
                  <div class="member-line-name">${escapeHtml(memberText(m))}</div>
                  <div>${escapeHtml(statusLabel(statusKey(m?.status)))}</div>
                </div>
                <div class="member-line-pills">
                  <span class="member-pill">${pricePaid}</span>
                  ${membershipPlan ? `<span class="member-pill ${membershipStatusClass(membershipStatus)}">${escapeHtml(membershipPlan)}</span>` : ''}
                </div>
              </div>
            `;
          }).join('')
        : '<div class="member-line">No members booked yet.</div>';

      return `
        <div class="card booking-card">
          <div class="booking-main">
            <div class="booking-meta">
              <div class="booking-title">${venue}</div>
              <div class="booking-sub">${timeLabel}</div>
              <div class="booking-sub">Price: ${priceLabel}</div>
            </div>
            <div class="booking-right">
              <span class="status approved">Booked ${escapeHtml(capLabel)}</span>
            </div>
          </div>
          <details class="members-menu">
            <summary>Booked members (${members.length})</summary>
            <div class="members-list">${membersHtml}</div>
          </details>
        </div>
      `;
    };

    const renderList = (slots) => {
      if (!listEl || !emptyEl) return;
      if (!Array.isArray(slots) || slots.length === 0) {
        listEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';
      const rows = slots
        .slice()
        .sort((a, b) => String(a?.startTime || '').localeCompare(String(b?.startTime || '')))
        .map((slot) => renderSlotCard(slot))
        .join('');
      listEl.innerHTML = rows;
    };

    const renderGroupedView = (slots, groupBy) => {
      if (!groupedView || !emptyEl) return;
      groupedView.innerHTML = '';
      if (!Array.isArray(slots) || slots.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }

      const groups = new Map();
      slots.forEach((slot) => {
        const key = groupBy === 'venue'
          ? String(slot?.venueName || 'Unknown venue')
          : String(slot?.startTime || '').slice(0, 10);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(slot);
      });

      const keys = [...groups.keys()].sort((a, b) => a.localeCompare(b));
      keys.forEach((key) => {
        const section = document.createElement('div');
        section.className = 'group-section';
        const header = document.createElement('div');
        header.className = 'group-header';
        header.textContent = groupBy === 'venue' ? `Venue: ${key}` : `Date: ${key}`;
        section.appendChild(header);
        const list = document.createElement('div');
        list.className = 'group-list';
        list.innerHTML = groups.get(key).map((slot) => renderSlotCard(slot)).join('');
        section.appendChild(list);
        groupedView.appendChild(section);
      });

      emptyEl.style.display = keys.length ? 'none' : 'block';
    };

    const renderByTime = () => {
      if (sportTypeFilter) sportTypeFilter.style.display = 'none';
      if (listEl) listEl.style.display = 'none';
      if (groupedView) groupedView.style.display = 'block';
      renderGroupedView(slotBookings, 'time');
    };

    const refreshData = async () => {
      if (listEl) listEl.innerHTML = '';
      if (groupedView) groupedView.innerHTML = '';
      if (emptyEl) {
        emptyEl.style.display = 'block';
        emptyEl.textContent = 'Loading bookings...';
      }
      try {
        slotBookings = await loadSlotBookings();
        renderStats(slotBookings);
        if (emptyEl) emptyEl.textContent = 'No bookings found.';
        renderByTime();
      } catch (err) {
        console.error(err);
        if (emptyEl) {
          emptyEl.style.display = 'block';
          emptyEl.textContent = (err && err.message) ? err.message : 'Failed to load bookings.';
        }
      }
    };

    refreshBtn?.addEventListener('click', refreshData);

    (async () => {
      activeClubId = await resolveClubId();
      if (!activeClubId) {
        if (emptyEl) {
          emptyEl.style.display = 'block';
          emptyEl.textContent = 'No club found for this account.';
        }
        return;
      }
      await refreshData();
    })();

    const infoOverlay = document.getElementById('infoOverlay');
    const infoTitle = document.getElementById('infoTitle');
    const infoBody = document.getElementById('infoBody');
    const infoMap = {
      privacy: {
        title: 'Privacy',
        body: `
          <p>We only store the information needed to manage bookings and memberships.</p>
          <p>Your account data is kept locally in this demo and is not shared with third parties.</p>
          <p>You can request deletion at any time by contacting the admin.</p>
        `
      },
      terms: {
        title: 'Terms',
        body: `
          <p>Bookings are first-come, first-served and subject to club capacity.</p>
          <p>Members must follow club rules and respect facility policies.</p>
          <p>Repeated no-shows may result in booking restrictions.</p>
        `
      },
      help: {
        title: 'Help',
        body: `
          <p>This page shows real booking records from your club slots.</p>
          <p>Use Refresh to fetch the latest members and booked counts.</p>
          <p>Contact support at support@example.com for further help.</p>
        `
      }
    };

    const openInfo = (key) => {
      const data = infoMap[key];
      if (!data || !infoOverlay) return;
      if (infoTitle) infoTitle.textContent = data.title;
      if (infoBody) infoBody.innerHTML = data.body;
      infoOverlay.classList.add('open');
      document.body.classList.add('no-scroll');
    };

    const closeInfo = () => {
      if (!infoOverlay) return;
      infoOverlay.classList.remove('open');
      document.body.classList.remove('no-scroll');
    };

    document.querySelectorAll('.info-trigger').forEach((btn) => {
      btn.addEventListener('click', () => openInfo(btn.dataset.info));
    });
    infoOverlay?.addEventListener('click', (evt) => { if (evt.target === infoOverlay) closeInfo(); });
    infoOverlay?.querySelector('.info-close')?.addEventListener('click', closeInfo);
  </script>
</body>
</html>
