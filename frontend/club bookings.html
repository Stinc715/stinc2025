<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com https://*.googleusercontent.com https://www.google.com https://www.gstatic.com; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://accounts.google.com https://maps.googleapis.com; connect-src 'self' https://accounts.google.com https://maps.googleapis.com https://api.stripe.com; frame-src 'self' https://accounts.google.com https://js.stripe.com; form-action 'self' https://accounts.google.com">
<title>Club Booking Portal - Member Bookings</title>
  <link rel="stylesheet" href="theme.css?v=20260402a">
  <style>
    body { margin: 0; background: var(--bg); }
    header { 
      position: sticky; 
      top: 0; 
      z-index: 10; 
      border-bottom: 1px solid rgba(15, 23, 42, 0.06); 
      background: #fff;
    }
    .header-wrap { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      gap: 12px; 
    }
    .header-actions { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
    }
    .card .pad { padding: 16px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat-card { border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: #fff; }
    .stat-label { display: block; font-size: 12px; color: var(--muted); }
    .stat-value { display: block; font-size: 20px; font-weight: 700; margin-top: 4px; }
    .list { margin-top: 16px; display: grid; gap: 12px; }
    .booking-card { 
      padding: 16px;
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 14px;
      transition: all 0.2s ease;
    }
    .booking-card:hover {
      border-color: rgba(15, 23, 42, 0.12);
      background: #fafbfc;
    }
    .booking-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
    }
    .booking-meta { display: grid; gap: 4px; }
    .booking-right {
      display: flex;
      align-items: center;
      justify-self: end;
    }
    .members-menu {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
    }
    .members-menu > summary {
      list-style: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .members-menu > summary::-webkit-details-marker { display: none; }
    .members-menu > summary::before {
      content: "\25B8";
      font-size: 12px;
      line-height: 1;
      transition: transform 0.16s ease;
    }
    .members-menu[open] > summary::before {
      transform: rotate(90deg);
    }
    .members-list {
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }
    .member-line {
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      background: #fff;
    }
    .member-line-main {
      display: grid;
      gap: 4px;
    }
    .member-line-name {
      font-weight: 700;
      color: var(--ink);
    }
    .member-line-pills {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .member-line-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      width: 100%;
    }
    .member-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #334155;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      padding: 5px 8px;
    }
    .member-pill.active {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #166534;
    }
    .member-pill.code {
      border-color: #c7d2fe;
      background: #eef2ff;
      color: #3730a3;
      letter-spacing: 0.12em;
      font-family: inherit;
      font-variant-numeric: tabular-nums lining-nums;
      font-feature-settings: "tnum" 1, "lnum" 1;
    }
    .member-pill.expired {
      border-color: #e2e8f0;
      background: #f8fafc;
      color: #64748b;
    }
    .status { 
      font-size: 12px; 
      font-weight: 600; 
      padding: 6px 12px; 
      border-radius: 8px; 
      border: none;
      text-align: left;
      width: 100px;
      display: inline-block;
    }
    .status.approved { background: #dcfce7; color: #16a34a; }
    .booking-title { font-weight: 700; font-size: 15px; }
    .booking-sub { color: var(--muted); font-size: 13px; }
    .group-section {
      margin-bottom: 24px;
    }
    .group-header {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 8px;
      color: var(--ink);
    }
    .group-list {
      display: grid;
      gap: 12px;
    }
    .btn {
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: #f1f3f5;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .btn[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn:hover {
      background: #e3e6e9;
      transform: translateY(0);
      box-shadow: none;
    }
    .btn:active {
      background: #d4d8dc;
      transform: translateY(0);
      box-shadow: none;
    }
    .btn.approve {
      background: #f1f3f5;
      color: #1e293b;
    }
    .btn.approve:hover {
      background: #e3e6e9;
      box-shadow: none;
    }
    .btn.checkin {
      background: #f1f3f5;
      color: #1e293b;
    }
    .btn.checkin:hover {
      background: #e3e6e9;
      box-shadow: none;
    }
    .btn.cancel {
      background: #f1f3f5;
      color: #1e293b;
    }
    .btn.cancel:hover {
      background: #e3e6e9;
      box-shadow: none;
    }
    .btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(15, 23, 42, 0.1);
    }
    .btn.ghost:hover {
      color: var(--ink);
      background: rgba(15, 23, 42, 0.04);
    }
    .btn.small { padding: 6px 12px; font-size: 12px; }
    .info-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(10, 12, 16, 0.45);
      z-index: 3000;
    }
    .info-overlay.open { display: flex; }
    .info-card {
      position: relative;
      width: min(560px, 92vw);
      background: #fff;
      border-radius: 16px;
      box-shadow: none;
      padding: 20px 20px 18px;
    }
    .info-card h3 { margin: 0 0 8px; font-size: 18px; }
    .info-body p { margin: 0 0 10px; color: var(--muted); font-size: 13px; }
    .info-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      color: var(--muted);
    }
    @media (max-width: 720px) {
      .booking-main {
        grid-template-columns: 1fr;
        align-items: flex-start;
      }
      .booking-right {
        justify-self: start;
      }
      .header-actions { flex-wrap: wrap; }
    }
  </style>
<link rel="stylesheet" href="desktop-consistency.css?v=20260403a">
<script src="auth-session.js?v=20260331b"></script>
</head>
<body class="page-with-footer desktop-consistency desktop-shell--standard desktop-page--club-bookings">
  <header>
    <div class="wrap header-wrap desktop-shell-header" style="display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px;">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="back-link desktop-back-link" onclick="window.location.href = 'club home.html'" type="button" aria-label="Back">Back</button>
      </div>
      <h2 style="margin: 0; font-size: 18px; font-weight: 600; justify-self: center;">Member bookings</h2>
      <div class="header-actions" style="justify-self: end;">
        <button id="refreshBtn" class="btn" type="button" style="min-width:100px">Refresh</button>
      </div>
    </div>
  </header>

  <main class="wrap desktop-shell-main">
    <section class="card">
      <div class="pad">
        <div class="stat-grid" id="stats">
          <div class="stat-card">
            <span class="stat-label">Booked</span>
            <span class="stat-value" data-stat="booked">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Checked-in</span>
            <span class="stat-value" data-stat="checked">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">No-show</span>
            <span class="stat-value" data-stat="no_show">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Closed</span>
            <span class="stat-value" data-stat="closed">0</span>
          </div>
        </div>

      </div>
    </section>

    <div class="list" id="groupedView" style="display: none;"></div>
    <div id="empty" class="muted" style="display:none;padding:12px;">No bookings found.</div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__wrap desktop-shell-wrap">
      <span class="site-footer__text">&copy; 2026 Club Booking Portal</span>
      <div class="site-footer__actions">
        <button class="site-footer__btn info-trigger" type="button" data-info="privacy">Privacy</button>
        <button class="site-footer__btn info-trigger" type="button" data-info="terms">Terms</button>
        <button class="site-footer__btn info-trigger" type="button" data-info="help">Help</button>
      </div>
    </div>
  </footer>

  <div id="infoOverlay" class="info-overlay" aria-hidden="true">
    <div class="info-card" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
      <button class="info-close" type="button" aria-label="Close">&times;</button>
      <h3 id="infoTitle">Privacy</h3>
      <div id="infoBody" class="info-body"></div>
    </div>
  </div>

  <script>
    const groupedView = document.getElementById('groupedView');
    const emptyEl = document.getElementById('empty');
    const refreshBtn = document.getElementById('refreshBtn');

    let slotBookings = [];
    let activeClubId = null;

    const safeParseJSON = (raw) => {
      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    };

    const authFetch = (url, options = {}) => {
      const token = localStorage.getItem('token');
      const headers = { ...(options.headers || {}) };
      if (token) headers.Authorization = `Bearer ${token}`;
      return fetch(url, {
        ...options,
        credentials: options.credentials ?? 'include',
        headers
      });
    };

    const readTextSafe = async (res) => {
      try {
        const contentType = String(res.headers.get('content-type') || '').toLowerCase();
        if (contentType.includes('application/json')) {
          const data = await res.json();
          if (data && typeof data.message === 'string' && data.message.trim()) {
            return data.message.trim();
          }
          return JSON.stringify(data || {});
        }
        return await res.text();
      } catch {
        return '';
      }
    };

    const localDateISO = (d) => {
      const tzOffset = d.getTimezoneOffset() * 60000;
      return new Date(d.getTime() - tzOffset).toISOString().slice(0, 10);
    };

    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const formatDateTime = (iso) => {
      if (!iso || typeof iso !== 'string') return '--';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${y}-${m}-${day} ${hh}:${mm}`;
    };

    const formatPrice = (raw) => {
      const n = Number(raw);
      if (!Number.isFinite(n)) return 'GBP 0.00';
      return `GBP ${n.toFixed(2)}`;
    };

    const bookingStatusKey = (status) => {
      const s = String(status || '').trim().toLowerCase();
      if (s === 'approved') return 'approved';
      if (s === 'checked' || s === 'checked-in' || s === 'checkin') return 'checked';
      if (s === 'cancelled' || s === 'canceled') return 'cancelled';
      return 'pending';
    };

    const attendanceKey = (member, slot) => {
      const raw = String(member?.attendanceState || '').trim().toLowerCase();
      if (raw === 'checked_in' || raw === 'checked-in' || raw === 'checkedin') return 'checked';
      if (raw === 'no_show' || raw === 'no-show' || raw === 'noshow') return 'no_show';
      if (raw === 'closed') return 'closed';
      if (raw === 'booked') return 'booked';

      const status = bookingStatusKey(member?.status);
      if (status === 'checked') return 'checked';
      if (status === 'cancelled') return 'closed';

      const end = slot?.endTime ? new Date(slot.endTime) : null;
      if (end && !Number.isNaN(end.getTime()) && end.getTime() <= Date.now()) {
        return 'no_show';
      }
      return 'booked';
    };

    const statusLabel = (status) => ({
      booked: 'Booked',
      checked: 'Checked-in',
      no_show: 'No-show',
      closed: 'Closed'
    }[status] || 'Booked');

    const memberActionsHtml = (member, slot) => {
      const status = bookingStatusKey(member?.status);
      const attendance = attendanceKey(member, slot);
      const bookingId = Number(member?.bookingId);
      if (!Number.isFinite(bookingId)) return '';

      const actions = [];
      if (status !== 'cancelled' && status !== 'checked' && attendance !== 'no_show') {
        actions.push({ status: 'CHECKED', label: 'Check in', className: 'checkin' });
      }
      if (attendance === 'booked') {
        actions.push({ status: 'CANCELLED', label: 'Close', className: 'cancel' });
      }

      if (!actions.length) return '';
      return `
        <div class="member-line-actions">
          ${actions.map((action) => (
            `<button class="btn small ${escapeHtml(action.className)}" type="button" data-booking-id="${escapeHtml(String(bookingId))}" data-next-status="${escapeHtml(action.status)}">${escapeHtml(action.label)}</button>`
          )).join('')}
        </div>
      `;
    };

    const resolveClubId = async () => {
      const loggedUser = safeParseJSON(localStorage.getItem('loggedUser') || 'null');
      if (!loggedUser || String(loggedUser.type || '').toLowerCase() !== 'club') {
        window.location.replace('home.html');
        return null;
      }

      try {
        const res = await authFetch('/api/my/clubs');
        if (!res.ok) return null;
        const clubs = await res.json();
        if (!Array.isArray(clubs) || clubs.length === 0) return null;
        const selectedClub = safeParseJSON(localStorage.getItem('selectedClub') || 'null');
        const selectedId = String(selectedClub && (selectedClub.id ?? selectedClub.clubId) || '');

        const chosen = clubs.find((c) => String(c.id ?? c.clubId) === selectedId) || clubs[0];
        const id = chosen.id ?? chosen.clubId;
        if (!/^[0-9]+$/.test(String(id || ''))) return null;
        try {
          localStorage.setItem('selectedClub', JSON.stringify({
            id: String(id),
            name: chosen.name || `Club #${id}`
          }));
        } catch {}
        return Number(id);
      } catch (err) {
        console.error(err);
        return null;
      }
    };

    const loadSlotBookings = async () => {
      if (!activeClubId) return [];
      const start = new Date();
      const from = localDateISO(start);
      const to = localDateISO(new Date(start.getTime() + 14 * 24 * 60 * 60 * 1000));
      const res = await authFetch(`/api/clubs/${encodeURIComponent(String(activeClubId))}/timeslot-bookings?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(text || `Failed to load bookings (${res.status})`);
      }
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    };

    const renderStats = (slots) => {
      const counts = { booked: 0, checked: 0, no_show: 0, closed: 0 };
      slots.forEach((slot) => {
        (slot.members || []).forEach((m) => {
          const key = attendanceKey(m, slot);
          if (counts[key] !== undefined) counts[key] += 1;
        });
      });
      Object.keys(counts).forEach((key) => {
        const el = document.querySelector(`[data-stat="${key}"]`);
        if (el) el.textContent = String(counts[key]);
      });
    };

    const memberText = (member) => {
      const name = String(member?.name || '').trim();
      const email = String(member?.email || '').trim();
      if (name && email) return `${name} (${email})`;
      if (name) return name;
      if (email) return email;
      return `User #${member?.userId ?? '--'}`;
    };

    const membershipStatusClass = (status) => {
      return String(status || '').trim().toUpperCase() === 'ACTIVE' ? 'active' : 'expired';
    };

    const renderSlotCard = (slot, openSlotIds = new Set()) => {
      const venue = escapeHtml(slot?.venueName || 'Venue');
      const start = formatDateTime(slot?.startTime);
      const end = formatDateTime(slot?.endTime);
      const timeLabel = `${escapeHtml(start)} - ${escapeHtml(end.split(' ')[1] || '')}`.trim();
      const slotId = Number(slot?.timeslotId);
      const slotKey = Number.isFinite(slotId) ? String(slotId) : '';
      const openAttr = slotKey && openSlotIds.has(slotKey) ? ' open' : '';
      const booked = Number(slot?.bookedCount);
      const cap = Number(slot?.maxCapacity);
      const capLabel = Number.isFinite(booked) && Number.isFinite(cap) ? `${booked}/${cap}` : '--';
      const priceLabel = escapeHtml(formatPrice(slot?.price));
      const members = Array.isArray(slot?.members) ? slot.members : [];
      const membersHtml = members.length
        ? members.map((m) => {
            const membershipPlan = String(m?.membershipPlanName || '').trim();
            const membershipStatus = String(m?.membershipStatus || '').trim();
            const verificationCode = String(m?.bookingVerificationCode || '').trim();
            const pricePaid = escapeHtml(formatPrice(m?.pricePaid));
            const attendance = attendanceKey(m, slot);
            return `
              <div class="member-line">
                <div class="member-line-main">
                  <div class="member-line-name">${escapeHtml(memberText(m))}</div>
                  <div>${escapeHtml(statusLabel(attendance))}</div>
                </div>
                <div class="member-line-pills">
                  <span class="member-pill">${pricePaid}</span>
                  ${verificationCode ? `<span class="member-pill code" title="Member check-in verification code">Code ${escapeHtml(verificationCode)}</span>` : ''}
                  ${membershipPlan ? `<span class="member-pill ${membershipStatusClass(membershipStatus)}">${escapeHtml(membershipPlan)}</span>` : ''}
                </div>
                ${memberActionsHtml(m, slot)}
              </div>
            `;
          }).join('')
        : '<div class="member-line">No members yet.</div>';

      return `
        <div class="card booking-card">
          <div class="booking-main">
            <div class="booking-meta">
              <div class="booking-title">${venue}</div>
              <div class="booking-sub">${timeLabel}</div>
              <div class="booking-sub">Price: ${priceLabel}</div>
            </div>
            <div class="booking-right">
              <span class="status approved">Occupied ${escapeHtml(capLabel)}</span>
            </div>
          </div>
          <details class="members-menu" data-slot-id="${escapeHtml(slotKey)}"${openAttr}>
            <summary>Booking records (${members.length})</summary>
            <div class="members-list">${membersHtml}</div>
          </details>
        </div>
      `;
    };

    const renderGroupedView = (slots) => {
      if (!groupedView || !emptyEl) return;
      const openSlotIds = new Set(
        Array.from(groupedView.querySelectorAll('.members-menu[open][data-slot-id]'))
          .map((el) => String(el.getAttribute('data-slot-id') || '').trim())
          .filter(Boolean)
      );
      groupedView.innerHTML = '';
      if (!Array.isArray(slots) || slots.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }

      const groups = new Map();
      slots.forEach((slot) => {
        const key = String(slot?.startTime || '').slice(0, 10);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(slot);
      });

      const keys = [...groups.keys()].sort((a, b) => a.localeCompare(b));
      keys.forEach((key) => {
        const section = document.createElement('div');
        section.className = 'group-section';
        const header = document.createElement('div');
        header.className = 'group-header';
        header.textContent = `Date: ${key}`;
        section.appendChild(header);
        const list = document.createElement('div');
        list.className = 'group-list';
        list.innerHTML = groups.get(key).map((slot) => renderSlotCard(slot, openSlotIds)).join('');
        section.appendChild(list);
        groupedView.appendChild(section);
      });

      emptyEl.style.display = keys.length ? 'none' : 'block';
    };

    const refreshData = async () => {
      if (groupedView) groupedView.innerHTML = '';
      if (emptyEl) {
        emptyEl.style.display = 'block';
        emptyEl.textContent = 'Loading bookings...';
      }
      try {
        slotBookings = await loadSlotBookings();
        renderStats(slotBookings);
        if (emptyEl) emptyEl.textContent = 'No bookings found.';
        if (groupedView) groupedView.style.display = 'grid';
        renderGroupedView(slotBookings);
      } catch (err) {
        console.error(err);
        if (emptyEl) {
          emptyEl.style.display = 'block';
          emptyEl.textContent = (err && err.message) ? err.message : 'Failed to load bookings.';
        }
      }
    };

    const updateBookingStatus = async (bookingId, nextStatus, buttonEl) => {
      if (!activeClubId || !bookingId || !nextStatus) return;
      const previousText = buttonEl ? buttonEl.textContent : '';
      if (buttonEl) {
        buttonEl.disabled = true;
        buttonEl.textContent = 'Saving...';
      }
      try {
        const res = await authFetch(`/api/my/clubs/${encodeURIComponent(String(activeClubId))}/bookings/${encodeURIComponent(String(bookingId))}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: nextStatus })
        });
        if (!res.ok) {
          throw new Error((await readTextSafe(res)) || 'Failed to update booking status.');
        }
        const payload = await res.json().catch(() => ({}));
        slotBookings = slotBookings.map((slot) => ({
          ...slot,
          members: (slot.members || []).map((member) => (
            Number(member?.bookingId) === bookingId
              ? {
                  ...member,
                  status: String(payload?.status || nextStatus || member?.status || '').trim(),
                  attendanceState: String(payload?.attendanceState || '').trim()
                }
              : member
          ))
        }));
        renderStats(slotBookings);
        renderGroupedView(slotBookings);
      } catch (err) {
        console.error(err);
        window.alert((err && err.message) ? err.message : 'Failed to update booking status.');
      } finally {
        if (buttonEl) {
          buttonEl.disabled = false;
          buttonEl.textContent = previousText;
        }
      }
    };

    const handleBookingActionClick = (event) => {
      const button = event.target.closest('[data-booking-id][data-next-status]');
      if (!button) return;
      event.preventDefault();
      const bookingId = Number(button.getAttribute('data-booking-id'));
      const nextStatus = String(button.getAttribute('data-next-status') || '').trim().toUpperCase();
      if (!Number.isFinite(bookingId) || !nextStatus) return;
      updateBookingStatus(bookingId, nextStatus, button);
    };

    groupedView?.addEventListener('click', handleBookingActionClick);

    refreshBtn?.addEventListener('click', refreshData);

    (async () => {
      activeClubId = await resolveClubId();
      if (!activeClubId) {
        if (emptyEl) {
          emptyEl.style.display = 'block';
          emptyEl.textContent = 'No club found for this account.';
        }
        return;
      }
      await refreshData();
    })();

    const infoOverlay = document.getElementById('infoOverlay');
    const infoTitle = document.getElementById('infoTitle');
    const infoBody = document.getElementById('infoBody');
    const infoMap = {
      privacy: {
        title: 'Privacy',
        body: `
          <p>We only store the information needed to manage bookings and memberships.</p>
          <p>Your account data is kept locally in this demo and is not shared with third parties.</p>
          <p>You can request deletion at any time by contacting the admin.</p>
        `
      },
      terms: {
        title: 'Terms',
        body: `
          <p>Bookings are first-come, first-served and subject to club capacity.</p>
          <p>Members must follow club rules and respect facility policies.</p>
          <p>Repeated no-shows may result in booking restrictions.</p>
        `
      },
      help: {
        title: 'Help',
        body: `
          <p>This page shows real booking records from your club slots.</p>
          <p>Use Refresh to fetch the latest members and booked counts.</p>
          <p>Contact support at support@example.com for further help.</p>
        `
      }
    };

    const openInfo = (key) => {
      const data = infoMap[key];
      if (!data || !infoOverlay) return;
      if (infoTitle) infoTitle.textContent = data.title;
      if (infoBody) infoBody.innerHTML = data.body;
      infoOverlay.classList.add('open');
      document.body.classList.add('no-scroll');
    };

    const closeInfo = () => {
      if (!infoOverlay) return;
      infoOverlay.classList.remove('open');
      document.body.classList.remove('no-scroll');
    };

    document.querySelectorAll('.info-trigger').forEach((btn) => {
      btn.addEventListener('click', () => openInfo(btn.dataset.info));
    });
    infoOverlay?.addEventListener('click', (evt) => { if (evt.target === infoOverlay) closeInfo(); });
    infoOverlay?.querySelector('.info-close')?.addEventListener('click', closeInfo);
  </script>
</body>
</html>
